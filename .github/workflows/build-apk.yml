name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'android-app/**'
      - 'kundli.html'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

permissions:
  contents: write   # needed to publish a Release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync latest kundli.html into android-app assets
        run: cp kundli.html android-app/app/src/main/assets/kundli.html

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle 8.7
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Generate Gradle wrapper
        working-directory: android-app
        run: gradle wrapper --gradle-version 8.7

      - name: Build debug APK
        working-directory: android-app
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: kundli-debug-apk
          path: android-app/app/build/outputs/apk/debug/app-debug.apk

      - name: Publish APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Kundli APK build ${{ github.run_number }}
          body: |
            Auto-built debug APK for personal install.
            Download the `.apk` file below, open it on your Android phone, and tap Install.
          files: android-app/app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
