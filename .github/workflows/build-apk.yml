name: Build Android APK

# Runs on every push to main + on manual dispatch.
# Removed path filter so APK and HTML stay strictly in sync — every push
# rebuilds the APK with the latest index.html embedded.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # needed to publish a Release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clean stale assets (remove any leftover kundli.html so it's not in the APK)
        run: rm -f android-app/app/src/main/assets/kundli.html

      - name: Sync latest index.html → android assets
        run: |
          cp index.html android-app/app/src/main/assets/index.html
          echo "Asset size: $(wc -c < android-app/app/src/main/assets/index.html) bytes"
          ls -la android-app/app/src/main/assets/

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle 8.7
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Generate Gradle wrapper
        working-directory: android-app
        run: gradle wrapper --gradle-version 8.7

      - name: Build debug APK
        working-directory: android-app
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Confirm APK exists
        run: |
          test -f android-app/app/build/outputs/apk/debug/app-debug.apk && \
          echo "APK built: $(ls -la android-app/app/build/outputs/apk/debug/app-debug.apk)" || \
          (echo "APK MISSING"; exit 1)

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: kundli-debug-apk
          path: android-app/app/build/outputs/apk/debug/app-debug.apk

      - name: Publish APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Kundli APK build ${{ github.run_number }}
          body: |
            Auto-built debug APK with the latest `index.html` embedded.
            APK and HTML are now strictly synced — every push triggers a rebuild.
            Download `app-debug.apk` and install on your Android phone.
          files: android-app/app/build/outputs/apk/debug/app-debug.apk
          make_latest: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
