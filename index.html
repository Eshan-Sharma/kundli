// Maas-wise — keyed by this repo's solar-month names (Vaishakha, Ashadha, Pausha etc.)
const MAAS_GUIDANCE = {
  "Chaitra":      { approx:"Mar–Apr", avoid:"Gud (jaggery)",                      prefer:"Chana" },
  "Vaishakha":    { approx:"Apr–May", avoid:"Tel (oil)",                          prefer:"Bel" },
  "Jyeshtha":     { approx:"May–Jun", avoid:"Long travel / exertion (\"panth\")", prefer:"Shayan — afternoon rest" },
  "Ashadha":      { approx:"Jun–Jul", avoid:"Bel",                                prefer:"Khel — physical activity" },
  "Shravana":     { approx:"Jul–Aug", avoid:"Saag (leafy greens)",                prefer:"Harre (haritaki)" },
  "Bhadrapada":   { approx:"Aug–Sep", avoid:"Mahi / dahi (buttermilk, curd)",     prefer:"Til (sesame)" },
  "Ashwina":      { approx:"Sep–Oct", avoid:"Karela (bitter gourd)",              prefer:"Gud, daily" },
  "Kartika":      { approx:"Oct–Nov", avoid:"Dahi (curd)",                        prefer:"Mool (radish)", variant:"Some sources also list brinjal and jeera as avoid" },
  "Margashirsha": { approx:"Nov–Dec", avoid:"Jeera (cumin)",                      prefer:"Tel (oil)" },
  "Pausha":       { approx:"Dec–Jan", avoid:"Dhaniya (coriander) — \"cooling\"",  prefer:"Doodh (milk)" },
  "Magha":        { approx:"Jan–Feb", avoid:"Mishri (rock sugar)",                prefer:"Ghee-khichdi", variant:"Some sources also list mooli and dhaniya as avoid" },
  "Phalguna":     { approx:"Feb–Mar", avoid:"Chana (gram)",                       prefer:"Wake early, bathe daily" }
};

function renderDietarySection(pan) {
  const wpTithi = (pan.tithiNum % 15) + 1;   // 1..15
  const tithiData = TITHI_AVOID[wpTithi - 1] || null;
  const vaarData  = VAAR_AVOID[pan.weekday];
  const maasData  = MAAS_GUIDANCE[pan.hinduMonth];
  const nakData   = NAKSHATRA_VRIKSHA[pan.nakshatra.idx];

  const variantHtml = (v) => v ? `<div class="small" style="color:var(--muted);margin-top:2px;font-style:italic;">${v}</div>` : "";
  const reasonHtml  = (r) => r ? `<div class="small" style="color:var(--muted);margin-top:2px;">→ ${r}</div>` : "";

  let inner = "";
  // Nakshatra Vriksha
  if (nakData) {
    inner += `<div class="info-cell" style="border-left-color:var(--good);margin-bottom:8px;">
      <div class="lbl">${t('Nakshatra Vriksha')} — ${pan.nakshatra.name}</div>
      <div class="val" style="font-size:14px;">🌳 ${nakData.tree}</div>
      ${variantHtml(nakData.variant)}
      <div class="small" style="margin-top:4px;">Tradition: plant and nurture this tree; avoid eating its produce or harming it. Strongest for your janma nakshatra.</div>
    </div>`;
  }
  // Tithi — use actual tithi name from panchang (so Shukla 15 shows "Purnima", Krishna 15 shows "Amavasya")
  if (tithiData) {
    inner += `<div class="info-cell" style="border-left-color:var(--bad);margin-bottom:8px;">
      <div class="lbl">${t('Tithi')} ${t(pan.tithiName)} — ${t('Avoid')}</div>
      <div class="val" style="font-size:14px;">🚫 ${tithiData.avoid}</div>
      ${variantHtml(tithiData.variant)}
      ${reasonHtml(tithiData.reason)}
    </div>`;
  }
  // Vaar
  if (vaarData) {
    inner += `<div class="info-cell" style="border-left-color:var(--bad);margin-bottom:8px;">
      <div class="lbl">${t(WEEKDAY_NAMES[pan.weekday])} (${vaarData.graha}) — ${t('Avoid')}</div>
      <div class="val" style="font-size:14px;">🚫 ${vaarData.avoid}</div>
    </div>`;
  }
  // Maas
  if (maasData) {
    inner += `<div class="info-cell" style="margin-bottom:8px;">
      <div class="lbl">${t(pan.hinduMonth)} (${maasData.approx})</div>
      <div class="val" style="font-size:14px;"><span style="color:var(--bad)">🚫 ${t('Avoid')}:</span> ${maasData.avoid}</div>
      <div class="val" style="font-size:14px;margin-top:4px;"><span style="color:var(--good)">✓ ${t('Prefer')}:</span> ${maasData.prefer}</div>
      ${variantHtml(maasData.variant)}
    </div>`;
  }

  const disclaimer = `<div class="small" style="margin-top:8px;color:var(--muted);font-style:italic;line-height:1.5;">
    These notes come from traditional Hindu texts (Brahmavaivarta Purana and traditional dohas) and from classical Vedic astrology. They are presented as cultural and scriptural guidance — the texts frame them partly in health terms, but this is not clinical nutrition or medical advice. Regional traditions differ on several entries.
  </div>`;

  return `<details open style="margin-top:14px;">
    <summary style="color:var(--accent);font-weight:600;cursor:pointer;">${t('Traditional Dietary Guidance')}</summary>
    <div style="margin-top:10px;">${inner}${disclaimer}</div>
  </details>`;
}

function festivalsForPanchang(pan) {
  // within-paksha 1-indexed tithi
  const wpTithi = (pan.tithiNum % 15) + 1;
  const fests = [];
  for (const f of FESTIVALS) {
    if (f.p !== pan.paksha) continue;
    if (f.t !== wpTithi) continue;
    if (f.m && f.m !== pan.hinduMonth) continue;
    fests.push(f);
  }
  // Makar Sankranti: Sun in Capricorn (sidereal sign 9) — special solar event
  if (pan.sunSign === 9) {
    // Mark only first day of solar Capricorn — approximation: tithi-independent. Skip for now or check date.
  }
  return fests;
}

// ============================================================
// MUHURAT PANE — calendar with day/week/month/year toggle
// ============================================================
let MUHURAT_MODE = "day";   // day | week | month | year

function renderMuhuratPane() {
  if (!SELF_DATA) return;
  const date = CAL_DATE || new Date();
  // Toolbar (same as Panchang)
  let toolbarHtml = `
    <div class="cal-toolbar">
      <button class="nav-btn" onclick="muhuratNav(-1)">◀</button>
      <input id="muhuratDate" type="date" value="${ymd(date)}" onchange="muhuratJump(this.value)"/>
      <button class="nav-btn" onclick="muhuratNav(1)">▶</button>
      <button class="nav-btn" onclick="muhuratToday()">${t('Today')}</button>
      <div class="modes">
        <button data-mhm="day"   class="${MUHURAT_MODE==='day'?'active':'inactive'}"   onclick="muhuratMode('day')">${t('Day')}</button>
        <button data-mhm="week"  class="${MUHURAT_MODE==='week'?'active':'inactive'}"  onclick="muhuratMode('week')">${t('Week')}</button>
        <button data-mhm="month" class="${MUHURAT_MODE==='month'?'active':'inactive'}" onclick="muhuratMode('month')">${t('Month')}</button>
        <button data-mhm="year"  class="${MUHURAT_MODE==='year'?'active':'inactive'}"  onclick="muhuratMode('year')">${t('Year')}</button>
      </div>
    </div>
  `;
  let body = "";
  if      (MUHURAT_MODE === "day")   body = renderMuhuratDay(date);
  else if (MUHURAT_MODE === "week")  body = renderMuhuratWeek(date);
  else if (MUHURAT_MODE === "month") body = renderMuhuratMonth(date);
  else if (MUHURAT_MODE === "year")  body = renderMuhuratYear(date);
  document.getElementById("pane-muhurat").innerHTML = toolbarHtml + body;
  // Ensure the live Hindu Clock ticker is running iff the clock card is on-screen
  if (document.getElementById("hinduClockCard")) startHinduClock();
  else stopHinduClock();
}

function muhuratMode(m) { MUHURAT_MODE = m; renderMuhuratPane(); }
function muhuratNav(dir) {
  const d = new Date(CAL_DATE);
  if (MUHURAT_MODE === "day") d.setDate(d.getDate()+dir);
  else if (MUHURAT_MODE === "week") d.setDate(d.getDate()+dir*7);
  else if (MUHURAT_MODE === "month") d.setMonth(d.getMonth()+dir);
  else if (MUHURAT_MODE === "year") d.setFullYear(d.getFullYear()+dir);
  CAL_DATE = d;
  renderMuhuratPane();
}
function muhuratJump(v) { if (!v) return; const [y,m,d]=v.split("-").map(Number); CAL_DATE = new Date(y,m-1,d); renderMuhuratPane(); }
function muhuratToday() { const t = new Date(); CAL_DATE = new Date(t.getFullYear(), t.getMonth(), t.getDate()); renderMuhuratPane(); }
function muhuratJumpAndDay(s) { muhuratJump(s); muhuratMode('day'); }

function renderMuhuratDay(date) {
  const tz = CURRENT ? CURRENT.input.tz : 5.5;
  const lat = CURRENT ? CURRENT.input.lat : 28.6139;
  const lon = CURRENT ? CURRENT.input.lon : 77.2090;
  const pan = computePanchang(date.getFullYear(), date.getMonth()+1, date.getDate(), lat, lon, tz);
  const dateStr = `${date.getDate()} ${monthName(date.getMonth()+1)} ${date.getFullYear()}`;
  const wdName = t(WEEKDAY_NAMES[pan.weekday]);
  const sun = pan.sun;
  // Hindu Clock only makes sense for today
  const today = new Date();
  const showClock = ymd(date) === ymd(new Date(today.getFullYear(), today.getMonth(), today.getDate()));
  let html = `
    ${showClock ? renderHinduClock() : ""}
    ${(() => {
       // Time windows for transient panchang elements (these are NOT all-day).
       const Y3 = date.getFullYear(), M3 = date.getMonth()+1, D3 = date.getDate();
       const jdNoonUT3 = julianDay(Y3, M3, D3, 12 - tz);
       const nakWin = nakshatraWindowJD(jdNoonUT3);
       const yogaWin = nityayogaWindowJD(jdNoonUT3);
       const nakRange = `${fmtJDLocal(nakWin.startJD, tz, Y3, M3, D3)} → ${fmtJDLocal(nakWin.endJD, tz, Y3, M3, D3)}`;
       const yogaRange = `${fmtJDLocal(yogaWin.startJD, tz, Y3, M3, D3)} → ${fmtJDLocal(yogaWin.endJD, tz, Y3, M3, D3)}`;
       return `<div class="card">
         <h3 style="color:var(--accent);">${wdName}, ${dateStr}</h3>
         <div class="small" style="margin-top:6px;">${t('Tithi')}: ${t(pan.paksha)} ${t(pan.tithiName)} &nbsp;•&nbsp; ${t('Karana')}: ${pan.karanaName}</div>
         <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:8px;margin-top:10px;">
           <div class="info-cell">
             <div class="lbl">${t('Nakshatra')}</div>
             <div class="val">${pan.nakshatra.name} (Pada ${pan.nakshatra.pada})</div>
             <div class="small mono" style="color:var(--text-3);margin-top:2px;">⏱ ${nakRange}</div>
           </div>
           <div class="info-cell">
             <div class="lbl">${t('Yoga')}</div>
             <div class="val">${pan.yogaName} ${pan.isYogaBad?`<span class="badge bad">${t('Inauspicious')}</span>`:''}</div>
             <div class="small mono" style="color:var(--text-3);margin-top:2px;">⏱ ${yogaRange}</div>
           </div>
         </div>
       </div>`;
    })()}
    ${pan.specialYogas.length ? `<div class="card">
      <h3 style="color:var(--accent);margin-bottom:10px;">${t('Special Yogas Today')}</h3>
      ${(() => {
        const Y2 = date.getFullYear(), M2 = date.getMonth()+1, D2 = date.getDate();
        const jdNoonUT2 = julianDay(Y2, M2, D2, 12 - tz);
        return pan.specialYogas.map(y => {
          const winA = specialYogaActiveWindowJD(y.name, Y2, M2, D2, lat, lon, tz, jdNoonUT2);
          const win = winA || nityayogaWindowJD(jdNoonUT2);
          const start = fmtJDLocal(win.startJD, tz, Y2, M2, D2);
          const end   = fmtJDLocal(win.endJD,   tz, Y2, M2, D2);
          return `<div class="info-cell" style="border-left-color:${y.type==='good'?'var(--good)':'var(--bad)'};margin-bottom:8px;">
            <div class="lbl">${y.type==='good'?t('Auspicious'):t('Inauspicious')} · Active window</div>
            <div class="val">${y.name}</div>
            <div class="small mono" style="margin-top:2px;color:var(--accent);">⏱ ${start} → ${end}</div>
            <div class="small">${y.note}</div>
          </div>`;
        }).join("");
      })()}
    </div>` : ""}
  `;
  if (sun.sunrise !== null) {
    html += `
    <div class="card">
      <h3 style="color:var(--accent);margin-bottom:10px;">${t('Sunrise')} / ${t('Sunset')} & ${t('Muhurat')}</h3>
      <div class="info-row">
        <div class="info-cell"><div class="lbl">${t('Sunrise')}</div><div class="val">${fmtTime(sun.sunrise)}</div></div>
        <div class="info-cell"><div class="lbl">${t('Solar Noon')}</div><div class="val">${fmtTime(sun.solarNoon)}</div></div>
        <div class="info-cell"><div class="lbl">${t('Sunset')}</div><div class="val">${fmtTime(sun.sunset)}</div></div>
        <div class="info-cell"><div class="lbl">${t('Day Length')}</div><div class="val">${sun.dayLengthHrs.toFixed(2)} h</div></div>
        <div class="info-cell" style="border-left-color:var(--good);"><div class="lbl">${t('Abhijit Muhurta')} <span class="badge good">${t('Auspicious')}</span></div><div class="val">${fmtTime(pan.abhijit.start)} – ${fmtTime(pan.abhijit.end)}</div></div>
        <div class="info-cell" style="border-left-color:var(--good);"><div class="lbl">${t('Brahma Muhurta')} <span class="badge good">${t('Auspicious')}</span></div><div class="val">${fmtTime(pan.brahma.start)} – ${fmtTime(pan.brahma.end)}</div></div>
        <div class="info-cell" style="border-left-color:var(--bad);"><div class="lbl">${t('Rahu Kaal')} <span class="badge bad">${t('Avoid')}</span></div><div class="val">${fmtTime(pan.rahu.start)} – ${fmtTime(pan.rahu.end)}</div></div>
        <div class="info-cell" style="border-left-color:var(--bad);"><div class="lbl">${t('Yamaganda')} <span class="badge bad">${t('Avoid')}</span></div><div class="val">${fmtTime(pan.yama.start)} – ${fmtTime(pan.yama.end)}</div></div>
        <div class="info-cell" style="border-left-color:var(--bad);"><div class="lbl">${t('Gulika Kaal')} <span class="badge bad">${t('Avoid')}</span></div><div class="val">${fmtTime(pan.gulika.start)} – ${fmtTime(pan.gulika.end)}</div></div>
      </div>
    </div>
    <div class="card">
      <h3 style="color:var(--accent);margin-bottom:10px;">${t('Choghadia')}</h3>
      <div class="twin-cols">
        <div>
          <table><thead><tr><th colspan="3" style="text-align:center;">${t('Day Choghadia')}</th></tr><tr><th>Slot</th><th>Time</th><th>Type</th></tr></thead>
            <tbody>${pan.choghadia.day.map(c => `<tr style="border-left:3px solid var(--${c.type==='good'?'good':c.type==='bad'?'bad':'accent'});${isCurrentChoghadia(c, date)?'background:var(--accent-soft);':''}"><td><b>${c.name}</b>${isCurrentChoghadia(c, date)?' <span class="chip accent" style="padding:1px 6px;font-size:9px;">NOW</span>':''}</td><td>${fmtTime(c.start)} – ${fmtTime(c.end)}</td><td>${c.type}</td></tr>`).join("")}</tbody>
          </table>
        </div>
        <div>
          <table><thead><tr><th colspan="3" style="text-align:center;">${t('Night Choghadia')}</th></tr><tr><th>Slot</th><th>Time</th><th>Type</th></tr></thead>
            <tbody>${pan.choghadia.night.map(c => `<tr style="border-left:3px solid var(--${c.type==='good'?'good':c.type==='bad'?'bad':'accent'});${isCurrentChoghadia(c, date)?'background:var(--accent-soft);':''}"><td><b>${c.name}</b>${isCurrentChoghadia(c, date)?' <span class="chip accent" style="padding:1px 6px;font-size:9px;">NOW</span>':''}</td><td>${fmtTime(c.start)} – ${fmtTime(c.end)}</td><td>${c.type}</td></tr>`).join("")}</tbody>
          </table>
        </div>
      </div>
    </div>`;
  }
  html += renderMuhuratTaraSection();
  return html;
}

// Tara — Star-cycle reference embedded in the Muhurat day view. Same 9-Tara × 3-cycle

function renderMuhuratTaraSection() {

  ).join("");

function muhuratTaraStart(idx) {

}

// ---- Muhurat WEEK view ----
function renderMuhuratWeek(date) {
  const start = new Date(date); start.setDate(start.getDate() - start.getDay());
  const tz = CURRENT ? CURRENT.input.tz : 5.5;
  const lat = CURRENT ? CURRENT.input.lat : 28.6139;
  const lon = CURRENT ? CURRENT.input.lon : 77.2090;
  const today = new Date();
  const todayStr = ymd(new Date(today.getFullYear(), today.getMonth(), today.getDate()));
  let html = '<div class="week-grid">';
  for (let i = 0; i < 7; i++) {
    const d = new Date(start); d.setDate(start.getDate() + i);
    const pan = computePanchang(d.getFullYear(), d.getMonth()+1, d.getDate(), lat, lon, tz);
    const isToday = ymd(d) === todayStr;
    const yogaLine = pan.specialYogas.length
      ? `<div class="small" style="color:var(--good);margin-top:4px;">★ ${pan.specialYogas.map(y=>y.name.replace(' Yoga','')).join(', ')}</div>` : "";
    html += `<div class="day-card ${isToday?'today':''}" onclick="muhuratJumpAndDay('${ymd(d)}')">
      <div class="d-wd">${t(WEEKDAY_SHORT[d.getDay()])}</div>
      <div class="d-date">${d.getDate()} ${monthName(d.getMonth()+1)}</div>
      <div class="d-moon" style="margin-top:6px;">☀ ${fmtTime(pan.sun.sunrise)} – ${fmtTime(pan.sun.sunset)}</div>
      <div class="small" style="margin-top:4px;color:var(--good);">${t('Abhijit Muhurta')}: ${fmtTime(pan.abhijit.start)}–${fmtTime(pan.abhijit.end)}</div>
      <div class="small" style="color:var(--bad);">${t('Rahu Kaal')}: ${fmtTime(pan.rahu.start)}–${fmtTime(pan.rahu.end)}</div>
      ${yogaLine}
    </div>`;
  }
  html += '</div>';
  return html;
}

// ---- Muhurat MONTH view ----
function renderMuhuratMonth(date) {
  const y = date.getFullYear(), m = date.getMonth();
  const first = new Date(y, m, 1);
  const lastDay = new Date(y, m+1, 0).getDate();
  const startDow = first.getDay();
  const tz = CURRENT ? CURRENT.input.tz : 5.5;
  const lat = CURRENT ? CURRENT.input.lat : 28.6139;
  const lon = CURRENT ? CURRENT.input.lon : 77.2090;
  const today = new Date();
  const todayStr = ymd(new Date(today.getFullYear(), today.getMonth(), today.getDate()));
  let html = `<h3 style="color:var(--accent);text-align:center;margin-bottom:10px;">${monthName(m+1)} ${y}</h3>`;
  html += '<div class="month-grid">';
  for (const wd of ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"]) html += `<div class="mh">${t(wd)}</div>`;
  for (let i = 0; i < startDow; i++) html += '<div class="month-cell empty"></div>';
  for (let d = 1; d <= lastDay; d++) {
    const pan = computePanchang(y, m+1, d, lat, lon, tz);
    const dateObj = new Date(y, m, d);
    const isToday = ymd(dateObj) === todayStr;
    // Auspiciousness signal
    let bgTint = "";
    const goodYogas = pan.specialYogas.filter(s => s.type === 'good').length;
    const badYogas  = pan.specialYogas.filter(s => s.type === 'bad').length;
    if (goodYogas > 0) bgTint = "background:rgba(106,176,76,0.12);";
    else if (badYogas > 0) bgTint = "background:rgba(231,76,60,0.10);";
    const yogaShort = pan.specialYogas.map(s => {
      const sh = s.name === "Guru Pushya Yoga" ? "GP" : s.name === "Ravi Pushya Yoga" ? "RP" : s.name === "Sarvartha Siddhi Yoga" ? "SS" : s.name === "Amrita Siddhi Yoga" ? "AS" : "!";
      const cls = s.type === 'good' ? 'good' : 'bad';
      return `<span class="badge ${cls}" style="padding:0 4px;font-size:9px;" title="${s.name}">${sh}</span>`;
    }).join('');
    html += `<div class="month-cell ${isToday?'today':''}" style="${bgTint}" onclick="muhuratJumpAndDay('${ymd(dateObj)}')">
      <div class="mc-date">${d}</div>
      <div class="small" style="font-size:10px;color:var(--good);">☀ ${fmtTime(pan.sun.sunrise)}</div>
      <div class="small" style="font-size:10px;color:var(--bad);">R ${fmtTime(pan.rahu.start)}</div>
      <div style="text-align:center;margin-top:2px;">${yogaShort}</div>
    </div>`;
  }
  html += '</div>';
  html += `<p class="small" style="margin-top:10px;">Each cell: date • sunrise time • Rahu Kaal start • yoga badges (<b>GP</b>=Guru Pushya, <b>RP</b>=Ravi Pushya, <b>SS</b>=Sarvartha Siddhi, <b>AS</b>=Amrita Siddhi). Green-tinted days have auspicious yogas; red-tinted have inauspicious ones.</p>`;
  return html;
}

// ---- Muhurat YEAR view ----
function renderMuhuratYear(date) {
  const y = date.getFullYear();
  const tz = CURRENT ? CURRENT.input.tz : 5.5;
  const lat = CURRENT ? CURRENT.input.lat : 28.6139;
  const lon = CURRENT ? CURRENT.input.lon : 77.2090;
  const today = new Date();
  const todayStr = ymd(new Date(today.getFullYear(), today.getMonth(), today.getDate()));
  let html = `<h3 style="color:var(--accent);text-align:center;margin-bottom:10px;">${y}</h3>`;
  html += '<div class="year-grid">';
  for (let m = 0; m < 12; m++) {
    const lastDay = new Date(y, m+1, 0).getDate();
    const startDow = new Date(y, m, 1).getDay();
    html += `<div class="year-month"><h4>${monthName(m+1)}</h4><div class="yg">`;
    for (const wd of ["S","M","T","W","T","F","S"]) html += `<div class="yh">${wd}</div>`;
    for (let i = 0; i < startDow; i++) html += '<div class="yc empty"></div>';
    for (let d = 1; d <= lastDay; d++) {
      const pan = computePanchang(y, m+1, d, lat, lon, tz);
      const dateObj = new Date(y, m, d);
      const isToday = ymd(dateObj) === todayStr;
      let bgTint = "";
      const goodYogas = pan.specialYogas.filter(s => s.type === 'good').length;
      const badYogas  = pan.specialYogas.filter(s => s.type === 'bad').length;
      if (goodYogas > 0) bgTint = "background:rgba(106,176,76,0.18);";
      else if (badYogas > 0) bgTint = "background:rgba(231,76,60,0.12);";
      const marker = goodYogas > 0 ? "★" : badYogas > 0 ? "✗" : "·";
      const markCls = goodYogas > 0 ? "var(--good)" : badYogas > 0 ? "var(--bad)" : "var(--muted)";
      html += `<div class="yc ${isToday?'today':''}" style="${bgTint}" onclick="muhuratJumpAndDay('${ymd(dateObj)}')">
        <div class="dt">${d}</div>
        <div style="font-size:9px;color:${markCls};">${marker}</div>
      </div>`;
    }
    html += '</div></div>';
  }
  html += '</div>';
  html += `<p class="small" style="margin-top:10px;">★ = day has an auspicious yoga (Guru Pushya, Ravi Pushya, Sarvartha Siddhi, or Amrita Siddhi). ✗ = day has an inauspicious yoga (Vyatipata, Vaidhriti, etc.). Click any day for full muhurat detail.</p>`;
  return html;
}

function setTheme(t) { document.documentElement.setAttribute("data-theme", t); localStorage.setItem("kundliTheme", t); updateThemeIcon(t); renderSettings(); }
function setLang(l) { LANG = l; localStorage.setItem("kundliLang", LANG); applyLanguage(); renderSettings(); }
// Any change to ayanamsa, node mode, or house system invalidates every position
// downstream — rebuild SELF (and PARTNER if loaded), then refresh all visible panes.
function recomputeAll() {
  if (SELF_DATA) {
    const inp = SELF_DATA.input;
    SELF_DATA = buildPersonData(inp);
    if (ACTIVE_PERSON === "self") CURRENT = SELF_DATA;
  }
  if (PARTNER_DATA) {
    PARTNER_DATA = buildPersonData(PARTNER_DATA.input);
    if (ACTIVE_PERSON === "partner") CURRENT = PARTNER_DATA;
  }
  try {
    renderPersonSwitcher();
    renderOverview(); renderRashi(); renderBhava(); renderNavamsa(); renderMoon();
    renderDivisional(); renderShadbala(); renderDasha(); renderTransit();
    renderPanchangPane(); renderMuhuratPane();
    renderMatchTab();
    renderRemindersPane(); renderSettings();
  } catch(e) { console.warn("recomputeAll:", e); }
}
function setAyanamsa(id)    { localStorage.setItem("kundliAyanamsa", id);     recomputeAll(); }
function setNodeMode(m)     { localStorage.setItem("kundliNodeMode", m);      recomputeAll(); }
function setHouseSystem(s)  { localStorage.setItem("kundliHouseSystem", s);   recomputeAll(); }

// ============================================================
// SAVED KUNDLIS — localStorage persistence
// ============================================================
//   kundliSelf     → last-used Self birth input
//   kundliPartner  → last-used Partner birth input
//   kundliProfiles → array of named profiles: { name, input, savedAt }
function loadJSON(k) { try { return JSON.parse(localStorage.getItem(k) || "null"); } catch { return null; } }
function saveJSON(k, v) { localStorage.setItem(k, JSON.stringify(v)); }
function saveSelfInput(inp)    { saveJSON("kundliSelf", inp); }
function saveSelfInputFromForm(){ const inp = getInput("1"); if (inp) saveSelfInput(inp); }
function loadSelfInput()       { return loadJSON("kundliSelf"); }
function savePartnerInput(inp) { saveJSON("kundliPartner", inp); }
function loadPartnerInput()    { return loadJSON("kundliPartner"); }
function loadProfiles()        { return loadJSON("kundliProfiles") || []; }
function saveProfiles(arr)     { saveJSON("kundliProfiles", arr); }

function populateSelfForm(inp) {
  if (!inp) return;
  document.getElementById("name1").value = inp.name || "Native";
  const ge = document.getElementById("gender1"); if (ge) ge.value = inp.gender || "M";
  document.getElementById("dob1").value  = `${inp.year}-${String(inp.month).padStart(2,'0')}-${String(inp.day).padStart(2,'0')}`;
  const h = Math.floor(inp.hour);
  const m = Math.floor((inp.hour - h) * 60);
  const s = Math.floor((((inp.hour - h) * 60) - m) * 60);
  document.getElementById("tob1").value = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  document.getElementById("lat1").value = inp.lat;
  document.getElementById("lon1").value = inp.lon;
  document.getElementById("tz1").value  = inp.tz;
}

function saveCurrentAsProfile() {
  if (!SELF_DATA) { alert("Generate a kundli first, then save it as a profile."); return; }
  const nameEl = document.getElementById("profileName");
  const name = (nameEl ? nameEl.value.trim() : "") || SELF_DATA.input.name || `Profile ${loadProfiles().length + 1}`;
  const arr = loadProfiles();
  arr.push({ name, input: SELF_DATA.input, savedAt: Date.now() });
  saveProfiles(arr);
  if (nameEl) nameEl.value = "";
  renderSettings();
}

function loadProfileToForm(idx) {
  const arr = loadProfiles();
  const p = arr[idx]; if (!p) return;
  populateSelfForm(p.input);
  generateChart();
  navTo("kundli");
}

function deleteProfileAndRefresh(idx) {
  const arr = loadProfiles();
  appConfirm(`Delete profile "${arr[idx].name}"?`, () => {
    arr.splice(idx, 1);
    saveProfiles(arr);
    renderSettings();
  }, { yesText: "Delete", dangerous: true });
}

// Read partner-form values without computing (for save before match)
// Triggered when either gender select changes. Re-runs the match so Boy/Girl roles
// (which drive Varna's rank-comparison and Tara's direction) update instantly.
function onGenderChanged(which) {
  if (which === "self" && SELF_DATA) {
    const v = (document.getElementById("gender1")||{}).value || "M";
    SELF_DATA.input.gender = v;
    saveSelfInput(SELF_DATA.input);
  }
  if (which === "partner" && PARTNER_DATA) {
    const v = (document.getElementById("genderG")||{}).value || "F";
    PARTNER_DATA.input.gender = v;
    savePartnerInput(PARTNER_DATA.input);
  }
  // Re-run match only if a partner is loaded (both forms have data)
  if (SELF_DATA && PARTNER_DATA) runMatch();
}

function readPartnerFormInput() {
  const dob = document.getElementById("dobG"); if (!dob || !dob.value) return null;
  const tob = document.getElementById("tobG"); if (!tob || !tob.value) return null;
  const [y,m,d] = dob.value.split("-").map(Number);
  const [hh,mm,ss] = tob.value.split(":").map(Number);
  const tz = parseFloat(document.getElementById("tzG").value);
  const lat = parseFloat(document.getElementById("latG").value);
  const lon = parseFloat(document.getElementById("lonG").value);
  const localHour = hh + (mm||0)/60 + ((ss||0))/3600;
  const ge = document.getElementById("genderG");
  return {
    name: (document.getElementById("nameG").value || "Partner"),
    gender: ge ? ge.value : "F",
    year: y, month: m, day: d, hour: localHour, tz, lat, lon,
    jd: julianDay(y, m, d, localHour - tz)
  };
}

function populatePartnerForm(inp) {
  if (!inp) return;
  document.getElementById("nameG").value = inp.name || "Partner";
  const ge = document.getElementById("genderG"); if (ge) ge.value = inp.gender || "F";
  document.getElementById("dobG").value  = `${inp.year}-${String(inp.month).padStart(2,'0')}-${String(inp.day).padStart(2,'0')}`;
  const h = Math.floor(inp.hour);
  const m = Math.floor((inp.hour - h) * 60);
  const s = Math.floor((((inp.hour - h) * 60) - m) * 60);
  document.getElementById("tobG").value = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  document.getElementById("latG").value = inp.lat;
  document.getElementById("lonG").value = inp.lon;
  document.getElementById("tzG").value  = inp.tz;
}

// =============== SAVED KUNDLI MODAL ===============
// Opens from 📁 Saved or 💾 Save buttons on Kundli (target='self') / Milan (target='partner').
// Same profile list — LOAD routes data into Self or Partner slot independently.
let SAVED_TARGET = "self";
let FOCUS_SAVE = false;  // true when opened via 💾 Save (focus the name input)

// Pulls the current name from the active form, falling back to in-memory data.
function currentNameFor(target) {
  if (target === "self") {
    const el = document.getElementById("name1");
    if (el && el.value && el.value.trim()) return el.value.trim();
    if (SELF_DATA) return SELF_DATA.input.name;
    return "";
  } else {
    const el = document.getElementById("nameG");
    if (el && el.value && el.value.trim()) return el.value.trim();
    if (PARTNER_DATA) return PARTNER_DATA.input.name;
    return "";
  }
}

function openSavedModal(target, focusSave) {
  SAVED_TARGET = target;
  FOCUS_SAVE = !!focusSave;
  renderSavedModal();
  document.getElementById("savedKundliModal").style.display = "block";
  // After render, focus the name input if opened via Save
  if (FOCUS_SAVE) {
    setTimeout(() => {
      const i = document.getElementById("modalSaveName");
      if (i) { i.focus(); i.select(); }
    }, 50);
  }
}
function closeSavedModal() {
  document.getElementById("savedKundliModal").style.display = "none";
}

function renderSavedModal() {
  const profiles = loadProfiles();
  const tgt = SAVED_TARGET;
  const tgtLabel = tgt === "self" ? "Self" : "Partner";
  // Pre-fill the save name from the current form for this section
  const prefillName = currentNameFor(tgt);
  const rows = profiles.length ? profiles.map((p, i) => `
    <tr>
      <td><b>${p.name}</b></td>
      <td>${p.input.day}-${monthName(p.input.month)}-${p.input.year}</td>
      <td>${p.input.lat.toFixed(2)}, ${p.input.lon.toFixed(2)}</td>
      <td style="white-space:nowrap;">
        <button style="width:auto;padding:4px 10px;" onclick="loadSavedToTarget(${i})">Load as ${tgtLabel}</button>
        <button style="width:auto;padding:4px 10px;background:var(--panel2);color:var(--text);" onclick="deleteFromModal(${i})">×</button>
      </td>
    </tr>`).join("") : `<tr><td colspan="4" class="small" style="font-style:italic;">No saved kundlis yet. Save your first one above.</td></tr>`;
  document.getElementById("savedKundliModalBody").innerHTML = `
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
      <h3 style="flex:1;margin:0;">Saved Kundlis — ${tgtLabel}</h3>
      <button style="width:auto;padding:6px 12px;background:var(--panel2);color:var(--text);" onclick="closeSavedModal()">✕</button>
    </div>
    <p class="small" style="margin-bottom:10px;">Save the currently-loaded ${tgtLabel} (name pre-filled from the ${tgtLabel === 'Self' ? 'Birth Details' : 'Partner'} form — edit if you like), or load any saved kundli into the ${tgtLabel} slot. Stored locally on this device.</p>
    <div style="display:flex;gap:8px;align-items:end;flex-wrap:wrap;margin-bottom:14px;">
      <input id="modalSaveName" type="text" value="${prefillName.replace(/"/g, '&quot;')}" placeholder="${tgt==='self'?'e.g., Me, Mom':'e.g., Bride, Friend'}" onkeydown="if(event.key==='Enter'){event.preventDefault();quickSaveCurrent('${tgt}',true);}" style="width:auto;flex:1;min-width:160px;"/>
      <button style="width:auto;padding:6px 14px;" onclick="quickSaveCurrent('${tgt}', true)">💾 Save current ${tgtLabel}</button>
    </div>
    <div class="scroll-x"><table>
      <thead><tr><th>Name</th><th>Born</th><th>Place</th><th></th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>
  `;
}

// Loads a saved kundli into Self or Partner slot, instantly, without changing
// the active tab. Whatever tab the user is on stays active — Self loads regenerate
// in place; Partner loads re-run the match in place. Switching from one loaded
// kundli to another is now immediate.
function loadSavedToTarget(idx) {
  const arr = loadProfiles();
  const p = arr[idx]; if (!p) return;
  closeSavedModal();
  if (SAVED_TARGET === "self") {
    populateSelfForm(p.input);
    generateChart();   // re-renders all panes; active tab is preserved
  } else {
    populatePartnerForm(p.input);
    // Only run match if Self exists (it always does after generateChart)
    if (SELF_DATA) runMatch();
  }
}

function deleteFromModal(idx) {
  const arr = loadProfiles();
  appConfirm(`Delete profile "${arr[idx].name}"?`, () => {
    arr.splice(idx, 1);
    saveProfiles(arr);
    renderSavedModal();
  }, { yesText: "Delete", dangerous: true });
}

// Save the current Self or Partner as a named profile.
// The name is pre-filled from the section's form. Modal stays open after save
// so the user sees the new entry appear in the list below.
function quickSaveCurrent(target, fromModal) {
  let inp;
  if (target === "self") {
    // Always read live form values so the latest edits are captured
    inp = getInput("1") || (SELF_DATA ? SELF_DATA.input : null);
    if (!inp) { alert("Please fill the birth form first."); return; }
  } else {
    inp = readPartnerFormInput();
    if (!inp) { alert("Please fill the partner's birth details first."); return; }
  }
  let name = inp.name;
  if (fromModal) {
    const el = document.getElementById("modalSaveName");
    if (el && el.value.trim()) name = el.value.trim();
  }
  if (!name) name = `Profile ${loadProfiles().length + 1}`;
  const arr = loadProfiles();
  arr.push({ name, input: inp, savedAt: Date.now() });
  saveProfiles(arr);
  renderSavedModal();   // refresh list so the new entry is visible
}

        : `<p class="small" style="margin-top:10px;font-style:italic;">No saved profiles yet — click + Save above.</p>`}
    </div>
  `;
}

// ============================================================
// HINDU CLOCK — live ghati / pal / vipal + 8-pahar system.
// 60 ghati per day, 1 ghati = 24 min, 1 ghati = 60 pal (1 pal = 24 sec),
// 1 pal = 60 vipal (1 vipal = 0.4 sec). Pahars: NOT fixed 3-hour blocks —
// each is one-quarter of the ACTUAL day or night length (sunrise→sunset / sunset→next-sunrise).
// 1 pahar = 7.5 ghatis. Day and night pahars differ in length (only ~equal at the equinox).
// ============================================================

// Standard 8-pahar dataset (index 1..8). Sanskrit + colloquial + descriptive note.
const PAHAR_DATA = [
  { num:1, period:"day",   sanskrit:"Purvahna",  colloquial:"Pehla pahar",          note:"Begins at sunrise; early morning." },
  { num:2, period:"day",   sanskrit:"Madhyahna", colloquial:"Do-pahar",             note:"Around midday; the everyday word 'dopahar' (afternoon) derives from this." },
  { num:3, period:"day",   sanskrit:"Aparahna",  colloquial:"Seh pahar",            note:"Afternoon; 'seh pahar' loosely came to mean evening in common speech." },
  { num:4, period:"day",   sanskrit:"Sayahna",   colloquial:"Chautha pahar",        note:"Late afternoon; ends at sunset." },
  { num:5, period:"night", sanskrit:"Pradosh",   colloquial:"Pehla pahar (raat)",   note:"Begins at sunset; early night." },
  { num:6, period:"night", sanskrit:"Nishith",   colloquial:"Do-pahar (raat)",      note:"Late night, around midnight." },
  { num:7, period:"night", sanskrit:"Triyama",   colloquial:"Seh pahar (raat)",     note:"Deep night / pre-dawn." },
  { num:8, period:"night", sanskrit:"Usha",      colloquial:"Chautha pahar (raat)", note:"Dawn pahar; ends at sunrise. Brahma muhurta falls within this pahar." }
];

// Returns ghati/pal/vipal-since-sunrise + isDay only. Pahar is now in computePahar().
function hinduClockState(nowH, sunrise, sunset) {
  if (sunrise === null || sunset === null || isNaN(sunrise) || isNaN(sunset))
    return { ghati:0, pal:0, vipal:0, isDay:true };
  const isDay = (nowH >= sunrise && nowH < sunset);
  let elapsed; // hours since sunrise (always positive)
  if (nowH >= sunrise) elapsed = nowH - sunrise;
  else elapsed = (24 - sunrise) + nowH;
  const totalSec = elapsed * 3600;
  const ghati = Math.floor(totalSec / 1440);
  const pal   = Math.floor((totalSec - ghati * 1440) / 24);
  const vipal = Math.floor((totalSec - ghati * 1440 - pal * 24) / 0.4);
  return { ghati, pal, vipal, isDay };
}

// Compute the current pahar — one-quarter of the actual day/night interval.
// Critical: pahars are NOT fixed 3-hour blocks. Day = sunrise→sunset / 4; Night = sunset→next sunrise / 4.
// Handles the post-midnight-before-sunrise case correctly by using *yesterday's* sunset.
// Returns { available, num(1-8), period, sanskrit, colloquial, note, startHour, endHour, progress, paharLengthMin }.
// On polar / no-sunrise-or-sunset edge cases returns { available:false } and the UI shows a fallback message.
function computePahar(now, lat, lon, tz) {
  const y = now.getFullYear(), m = now.getMonth()+1, d = now.getDate();
  const sunToday = sunRiseSet(y, m, d, lat, lon, tz);
  const nowH = now.getHours() + now.getMinutes()/60 + now.getSeconds()/3600;

  if (sunToday.sunrise === null || isNaN(sunToday.sunrise) ||
      sunToday.sunset  === null || isNaN(sunToday.sunset)) {
    return { available:false, reason:"No sunrise or sunset at this location/date (polar)." };
  }

  // ---- DAY PAHAR ----
  if (nowH >= sunToday.sunrise && nowH < sunToday.sunset) {
    const dayLen = sunToday.sunset - sunToday.sunrise;
    const inDay = nowH - sunToday.sunrise;
    const plen = dayLen / 4;
    const idx = Math.min(3, Math.floor(inDay / plen));   // 0..3 → pahars 1..4
    const data = PAHAR_DATA[idx];
    return {
      available: true,
      num: data.num, period: "day",
      sanskrit: data.sanskrit, colloquial: data.colloquial, note: data.note,
      startHour: sunToday.sunrise + idx * plen,
      endHour:   sunToday.sunrise + (idx + 1) * plen,
      progress:  (inDay - idx * plen) / plen,
      paharLengthMin: plen * 60
    };
  }

  // ---- NIGHT PAHAR ----
  // Two sub-cases: after today's sunset (night spans into tomorrow), OR
  // before today's sunrise (night STARTED yesterday at yesterday's sunset).
  let nightStartH, nightLen, inNight;
  if (nowH >= sunToday.sunset) {
    // Need tomorrow's sunrise to bound the night
    const tmrw = new Date(now.getTime() + 86400000);
    const sunTmrw = sunRiseSet(tmrw.getFullYear(), tmrw.getMonth()+1, tmrw.getDate(), lat, lon, tz);
    if (sunTmrw.sunrise === null || isNaN(sunTmrw.sunrise))
      return { available:false, reason:"Tomorrow's sunrise unavailable (polar transition)." };
    nightStartH = sunToday.sunset;
    nightLen = (24 - sunToday.sunset) + sunTmrw.sunrise;
    inNight = nowH - sunToday.sunset;
  } else {
    // Post-midnight, pre-today-sunrise — use yesterday's sunset
    const yest = new Date(now.getTime() - 86400000);
    const sunYest = sunRiseSet(yest.getFullYear(), yest.getMonth()+1, yest.getDate(), lat, lon, tz);
    if (sunYest.sunset === null || isNaN(sunYest.sunset))
      return { available:false, reason:"Yesterday's sunset unavailable (polar transition)." };
    nightStartH = sunYest.sunset;             // hour-of-day on yesterday, but we treat the timeline linearly
    nightLen = (24 - sunYest.sunset) + sunToday.sunrise;
    inNight = (24 - sunYest.sunset) + nowH;
  }
  const plen = nightLen / 4;
  const idx = Math.min(3, Math.floor(inNight / plen));   // 0..3 → pahars 5..8
  const data = PAHAR_DATA[4 + idx];
  // For display: start/end on the 0..24 wall clock (may wrap past midnight).
  let startHour = nightStartH + idx * plen;
  let endHour   = nightStartH + (idx + 1) * plen;
  while (startHour >= 24) startHour -= 24;
  while (endHour   >= 24) endHour   -= 24;
  return {
    available: true,
    num: data.num, period: "night",
    sanskrit: data.sanskrit, colloquial: data.colloquial, note: data.note,
    startHour, endHour,
    progress: (inNight - idx * plen) / plen,
    paharLengthMin: plen * 60
  };
}

function renderHinduClock() {
  const now = new Date();
  const lat = CURRENT ? CURRENT.input.lat : 28.6139;
  const lon = CURRENT ? CURRENT.input.lon : 77.2090;
  const tz  = CURRENT ? CURRENT.input.tz  : 5.5;
  const sun = sunRiseSet(now.getFullYear(), now.getMonth()+1, now.getDate(), lat, lon, tz);
  const nowH = now.getHours() + now.getMinutes()/60 + now.getSeconds()/3600;
  const s = hinduClockState(nowH, sun.sunrise, sun.sunset);
  const p = computePahar(now, lat, lon, tz);
  const ts = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
  // Pahar block — the only part of this card that changed.
  // Shows: number 1-8 of 8, Sanskrit + colloquial name, period (day/night), actual start/end times, progress.
  let paharHtml;
  if (!p.available) {
    paharHtml = `
      <div class="clock-row">
        <div><div class="lbl">Current Pahar</div>
          <div class="val">Unavailable</div>
          <div class="sub" style="font-size:11px;color:var(--text-3);">${p.reason || 'No sunrise/sunset at this location/date.'}</div>
        </div>
        <div class="right">${ts}</div>
      </div>
      <div class="clock-progress"><div style="width:0%;"></div></div>
    `;
  } else {
    const paharMin = Math.round(p.paharLengthMin);
    paharHtml = `
      <div class="clock-row">
        <div style="flex:1;min-width:0;">
          <div class="lbl">Current Pahar · ${p.num} / 8 · ${p.period === 'day' ? 'Day' : 'Night'}</div>
          <div class="val">${p.sanskrit}
            <span class="chip" style="font-size:10px;padding:2px 7px;margin-left:6px;vertical-align:middle;">${p.colloquial}</span>
          </div>
          <div class="sub" style="color:var(--text-2);font-family:'JetBrains Mono',monospace;font-size:11px;margin-top:3px;">
            ${fmtTime(p.startHour)} – ${fmtTime(p.endHour)} · ${paharMin} min long
          </div>
        </div>
        <div class="right">${ts}</div>
      </div>
      <div class="clock-progress"><div style="width:${Math.floor(p.progress*100)}%;"></div></div>
    `;
  }
  return `
    <div id="hinduClockCard" class="clock-card">
      <div class="section-h" style="padding:0;color:var(--accent);">Hindu Clock <span class="sub" style="color:var(--text-3);">since today's sunrise · ${s.isDay ? 'Day' : 'Night'}</span></div>
      <div class="clock-grid">
        <div class="unit ghati"><div class="val">${String(s.ghati).padStart(2,'0')}</div><div class="lbl">Ghati</div><div class="sub">24 min each</div></div>
        <div class="unit"><div class="val">${String(s.pal).padStart(2,'0')}</div><div class="lbl">Pal</div><div class="sub">24 sec each</div></div>
        <div class="unit"><div class="val">${String(s.vipal).padStart(2,'0')}</div><div class="lbl">Vipal</div><div class="sub">0.4 sec each</div></div>
      </div>
      ${paharHtml}
    </div>
  `;
}

    const el = document.getElementById("hinduClockCard");

    el.outerHTML = renderHinduClock();
  };

}
function stopHinduClock() {

}

// Returns true if the given choghadia slot covers "now" (and dateObj is today)
function isCurrentChoghadia(c, dateObj) {
  const now = new Date();
  if (dateObj.getFullYear() !== now.getFullYear() ||
      dateObj.getMonth() !== now.getMonth() ||
      dateObj.getDate() !== now.getDate()) return false;
  const h = now.getHours() + now.getMinutes()/60 + now.getSeconds()/3600;
  if (c.start <= c.end) return h >= c.start && h < c.end;
  return h >= c.start || h < c.end; // wraps past midnight
}

// ============================================================
// REMINDERS — condition-based notifications. Stored in localStorage.
// A reminder triggers whenever today's panchang matches all its set
// conditions (any null condition is "any"). Supports:
//   - tithi (1..15 within paksha) + paksha (Shukla/Krishna/any)
//   - vaar (weekday 0..6)
//   - nakshatra (0..26)
//   - hindu month (Chaitra...Phalguna)
//   - gregorian month-day (MM-DD repeats yearly) or full YYYY-MM-DD (once)
//   - yoga (0..26)
//   - recurrence: 'repeat' (every match) or 'once' (auto-deactivate after fire)
// ============================================================
function loadReminders() { return loadJSON("kundliReminders") || []; }
function saveReminders(arr) {
  saveJSON("kundliReminders", arr);
  // Mirror to native (Android) for widgets + native daily notification scheduling.
  // On web/desktop window.KundliBridge is undefined → no-op.
  try { if (window.KundliBridge && window.KundliBridge.setReminders) window.KundliBridge.setReminders(JSON.stringify(arr)); } catch(e) {}
}

function reminderMatchesPanchang(r, pan, dateObj) {
  if (!r.active) return false;
  const wpTithi = (pan.tithiNum % 15) + 1;
  if (r.tithi && r.tithi !== wpTithi) return false;
  if (r.paksha && r.paksha !== "any" && r.paksha !== pan.paksha) return false;
  if (r.vaar !== null && r.vaar !== undefined && r.vaar !== pan.weekday) return false;
  if (r.nakshatra !== null && r.nakshatra !== undefined && r.nakshatra !== pan.nakshatra.idx) return false;
  if (r.month && r.month !== pan.hinduMonth) return false;
  if (r.yoga !== null && r.yoga !== undefined && r.yoga !== pan.yogaNum) return false;
  if (r.date) {
    const yyyymmdd = ymd(dateObj);
    const mmdd = yyyymmdd.slice(5);
    if (r.date.length === 10) {
      if (r.date !== yyyymmdd) return false;
    } else if (r.date.length === 5) {
      if (r.date !== mmdd) return false;
    }
  }
  const anyCondition = r.tithi || (r.vaar !== null && r.vaar !== undefined) || (r.nakshatra !== null && r.nakshatra !== undefined) || r.month || r.date || (r.yoga !== null && r.yoga !== undefined) || r.paksha === "Shukla" || r.paksha === "Krishna";
  if (!anyCondition) return false;
  // Recurrence gate
  const rec = r.recurrence || "repeat";
  if (rec === "repeat") return true;
  const last = r.lastFired;
  if (!last) return true;
  const lastDate = new Date(last);
  if (rec === "once") return false; // already fired once
  if (rec === "yearly")  return lastDate.getFullYear() !== dateObj.getFullYear();
  if (rec === "monthly") return !(lastDate.getFullYear() === dateObj.getFullYear() && lastDate.getMonth() === dateObj.getMonth());
  return true;
}

// Mark today's matching reminders as fired (call once when displaying today's panchang).
// This is what auto-deactivates "once" and prevents re-fire within yearly/monthly windows.
function markRemindersFiredFor(dateObj) {
  const todayStr = ymd(dateObj);
  const arr = loadReminders();
  let dirty = false;
  if (!CURRENT) return;
  const pan = computePanchang(dateObj.getFullYear(), dateObj.getMonth()+1, dateObj.getDate(), CURRENT.input.lat, CURRENT.input.lon, CURRENT.input.tz);
  for (const r of arr) {
    if (!reminderMatchesPanchang(r, pan, dateObj)) continue;
    const last = r.lastFired ? ymd(new Date(r.lastFired)) : null;
    if (last !== todayStr) { r.lastFired = dateObj.getTime(); dirty = true; }
    if ((r.recurrence || "repeat") === "once") { r.active = false; dirty = true; }
  }
  if (dirty) saveReminders(arr);
}

function remindersForDate(dateObj) {
  if (!CURRENT) return [];
  const tz = CURRENT.input.tz, lat = CURRENT.input.lat, lon = CURRENT.input.lon;
  const pan = computePanchang(dateObj.getFullYear(), dateObj.getMonth()+1, dateObj.getDate(), lat, lon, tz);
  return loadReminders().filter(r => reminderMatchesPanchang(r, pan, dateObj));
}

function renderRemindersPane() {
  const reminders = loadReminders();
  const today = new Date();
  const todayMatches = remindersForDate(today);
  let listHtml = "";

  } else {
    listHtml = reminders.map((r, i) => {
      const matching = todayMatches.some(m => m.id === r.id);
      const cond = describeReminder(r);
      return `<div class="card">
        <div style="display:flex;align-items:flex-start;gap:12px;">
          <div style="flex:1;min-width:0;">
            <div style="display:flex;align-items:center;gap:8px;">
              <h3 style="font-family:'Inter';font-size:16px;font-weight:600;color:var(--text);margin:0;">${escapeHtml(r.name)}</h3>
              ${matching ? `<span class="chip accent">Today</span>` : ""}
              ${!r.active ? `<span class="chip">Paused</span>` : ""}
            </div>
            ${r.message ? `<p style="color:var(--text-2);font-size:13px;margin-top:6px;">${escapeHtml(r.message)}</p>` : ""}
            <p style="color:var(--text-3);font-size:12px;margin-top:8px;">${cond}</p>
          </div>
          <div style="display:flex;flex-direction:column;gap:4px;">
            <button class="secondary" onclick="editReminder(${i})" style="padding:6px 10px;" title="Edit"><svg style="width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;"><use href="#i-edit"/></svg></button>
            <button class="secondary" onclick="toggleReminderActive(${i})" style="padding:6px 10px;" title="${r.active?'Pause':'Resume'}">${r.active?'⏸':'▶'}</button>
            <button class="danger" onclick="deleteReminder(${i})" style="padding:6px 10px;" title="Delete"><svg style="width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;"><use href="#i-trash"/></svg></button>
          </div>
        </div>
      </div>`;
    }).join("");
  }

  const todayHtml = todayMatches.length > 0 ? `
    <div class="festival">
      <div class="emoji">🔔</div>

        <div class="label">Triggered today</div>

      </div>
    </div>` : "";

  document.getElementById("pane-reminders").innerHTML = `
    <div class="section-h">Reminders <button onclick="openReminderEditor(null)" style="padding:6px 12px;display:inline-flex;align-items:center;gap:6px;"><svg style="width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;"><use href="#i-plus"/></svg> Add reminder</button></div>
    ${todayHtml}
    ${listHtml}
  `;
}

function describeReminder(r) {
  const parts = [];
  if (r.tithi) {
    const px = r.paksha && r.paksha !== "any" ? `${r.paksha} ` : "";
    parts.push(`${px}Tithi ${r.tithi}`);
  } else if (r.paksha && r.paksha !== "any") {
    parts.push(r.paksha + " Paksha");
  }
  if (r.vaar !== null && r.vaar !== undefined) parts.push(WEEKDAY_NAMES[r.vaar]);
  if (r.nakshatra !== null && r.nakshatra !== undefined) parts.push("Nak: " + NAKSHATRAS[r.nakshatra][0]);
  if (r.month) parts.push(r.month);
  if (r.yoga !== null && r.yoga !== undefined) parts.push("Yoga: " + YOGA_NAMES[r.yoga]);
  if (r.date) parts.push("Date: " + r.date);
  if (parts.length === 0) parts.push("(no conditions — would fire daily)");
  return "When: " + parts.join(" · ");
}

function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

// In-app confirm dialog. Replaces window.confirm(), which Android WebView silently
// suppresses when no WebChromeClient is set (the cause of "delete not working on mobile").
// Usage: appConfirm("Delete X?", () => { /* do delete */ });
function appConfirm(message, onYes, opts) {
  const o = opts || {};
  const existing = document.getElementById("appConfirm");
  if (existing) existing.remove();
  const div = document.createElement("div");
  div.id = "appConfirm";
  div.className = "modal";
  div.style.display = "block";
  div.innerHTML = `
    <div class="modal-backdrop" onclick="document.getElementById('appConfirm').remove()"></div>
    <div class="modal-card" style="max-width:380px;">
      <p style="font-size:15px;line-height:1.5;color:var(--text);margin-bottom:18px;">${escapeHtml(message)}</p>
      <div style="display:flex;gap:8px;justify-content:flex-end;">
        <button class="secondary" id="appConfirmNo">${o.cancelText || 'Cancel'}</button>
        <button class="${o.dangerous ? 'danger' : ''}" id="appConfirmYes">${o.yesText || 'Confirm'}</button>
      </div>
    </div>
  `;
  document.body.appendChild(div);
  document.getElementById("appConfirmNo").onclick = () => div.remove();
  document.getElementById("appConfirmYes").onclick = () => { div.remove(); try { onYes(); } catch(e){ console.error(e); } };
}

// Click → auto-fills the editor fields below; user can save immediately or tweak.

// Applies a preset to the editor — RESETS all condition fields first so picking a
// different preset gives a clean override (no leftover conditions from the previous one).
function applyReminderPreset(presetId) {
  const p = REMINDER_PRESETS.find(x => x.id === presetId); if (!p) return;
  const f = p.fields;
  const set = (id, v) => { const el = document.getElementById(id); if (el) el.value = (v === undefined || v === null ? "" : v); };
  // Always overwrite the name with the preset's name (so switching presets renames cleanly)
  document.getElementById("rmName").value = p.name;
  // Reset every condition field, then set only those in the preset
  set("rmTithi", f.tithi);
  set("rmPaksha", f.paksha || "any");
  set("rmVaar", f.vaar);
  set("rmNak", f.nakshatra);
  set("rmMonth", f.month);
  set("rmYoga", f.yoga);
  set("rmDate", f.date);
}

          <option value="repeat" ${(!r.recurrence||r.recurrence==='repeat')?'selected':''}>Repeat — fires every day the conditions match</option>

function saveReminderFromEditor() {
  const name = document.getElementById("rmName").value.trim();
  if (!name) { alert("Please give the reminder a name."); return; }
  const get = id => { const v = document.getElementById(id).value; return v === "" ? null : v; };
  const getInt = id => { const v = get(id); return v === null ? null : parseInt(v); };
  const r = {
    id: EDITING_REMINDER === null ? ("r" + Date.now()) : loadReminders()[EDITING_REMINDER].id,
    name,
    message: document.getElementById("rmMsg").value.trim(),
    paksha:   document.getElementById("rmPaksha").value,
    tithi:    getInt("rmTithi"),
    vaar:     getInt("rmVaar"),
    nakshatra: getInt("rmNak"),
    month:    get("rmMonth"),
    yoga:     getInt("rmYoga"),
    date:     get("rmDate"),
    recurrence: get("rmRecurrence") || "repeat",
    active:   true,
    createdAt: Date.now(),
    lastFired: (EDITING_REMINDER !== null ? loadReminders()[EDITING_REMINDER].lastFired : null)
  };
  const arr = loadReminders();
  if (EDITING_REMINDER === null) arr.push(r);
  else arr[EDITING_REMINDER] = r;
  saveReminders(arr);
  closeSavedModal();
  renderRemindersPane();
}

function editReminder(idx) { openReminderEditor(idx); }
function deleteReminder(idx) {
  const arr = loadReminders();
  appConfirm(`Delete reminder "${arr[idx].name}"?`, () => {
    arr.splice(idx, 1);
    saveReminders(arr);
    renderRemindersPane();
  }, { yesText: "Delete", dangerous: true });
}
function deleteReminderFromEditor() {
  if (EDITING_REMINDER === null) { closeSavedModal(); return; }
  const arr = loadReminders();
  appConfirm(`Delete reminder "${arr[EDITING_REMINDER].name}"?`, () => {
    arr.splice(EDITING_REMINDER, 1);
    saveReminders(arr);
    closeSavedModal();
    renderRemindersPane();
  }, { yesText: "Delete", dangerous: true });
}
function toggleReminderActive(idx) {
  const arr = loadReminders();
  arr[idx].active = !arr[idx].active;
  saveReminders(arr);
  renderRemindersPane();
}

// ============================================================
// PRASHNA KUNDLI — Horary astrology DECISION-SUPPORT TOOL.
//
// PHILOSOPHY: This module does NOT pronounce verdicts. It surfaces every
// factor a Vedic astrologer would weigh — significators, lagna ripeness,
// Moon's state, Tajika aspects between selected significators, Ithasala
// (applying/separating connections with orbs), sub-yogas (Kamboola,
// Nakta, Yamaya, Manau), and timing estimates — and lets the astrologer
// judge. The astrologer drives by clicking houses on the chart.
//
// REFERENCES: Prashna Marga (Kerala school), Tajika Neelakanthi (Persian-
// influenced Sanskrit horary), classical Parashari for house meanings.
//
// ENGINE: Uses the existing offline planetary engine (Brown's lunar theory
// + simplified VSOP for grahas + mean Rahu). A future upgrade could swap
// in astronomy-engine for higher precision — the analyzer API would not
// change, since it consumes a positions table.
// ============================================================

const PRASHNA_HOUSE_SIG = [
  { num:1,  names:["Lagna","Tanu"],     gloss:"Self, body, the question itself, the querent's overall situation, mind, vitality." },
  { num:2,  names:["Dhana"],            gloss:"Wealth, family, speech, immediate accumulated assets, food. (Lost-item recovery is read here.)" },
  { num:3,  names:["Sahaja"],           gloss:"Siblings, courage, short journeys, communication, hands, the querent's drive." },
  { num:4,  names:["Sukha","Bandhu"],   gloss:"Mother, home, property, vehicles, mental peace, deep emotional comfort." },
  { num:5,  names:["Putra","Vidya"],    gloss:"Children, intelligence, education, mantra, devotion, speculative gain, romance." },
  { num:6,  names:["Ari","Shatru"],     gloss:"Enemies, disputes, litigation, debts, disease, service, daily routine work." },
  { num:7,  names:["Yuvati","Kalatra"], gloss:"Spouse, marriage, partnerships, business, opponents in court, the public-facing other." },
  { num:8,  names:["Ayur","Randhra"],   gloss:"Longevity, sudden events, transformations, occult, hidden matters, inheritance." },
  { num:9,  names:["Dharma","Bhagya"],  gloss:"Father, guru, fortune, dharma, long journeys, pilgrimage, higher knowledge." },
  { num:10, names:["Karma"],            gloss:"Career, status, authority, profession, action in the world, public recognition." },
  { num:11, names:["Labha"],            gloss:"Gains, income, elder siblings, friends, fulfilled wishes, networks." },
  { num:12, names:["Vyaya","Moksha"],   gloss:"Loss, expenditure, foreign places, hospitalisation, isolation, liberation, the unseen." }
];
const PRASHNA_HOUSE_KARAKA = {
  1:["Su"], 2:["Ju"], 3:["Ma"], 4:["Mo"], 5:["Ju"], 6:["Ma","Sa"],
  7:["Ve"], 8:["Sa"], 9:["Ju","Su"], 10:["Su","Me","Ju","Sa"], 11:["Ju"], 12:["Sa","Ke"]
};

// Tajika deeptamsha (orbs) in degrees
const DEEPTAMSHA = { Su:15, Mo:12, Ma:8, Me:7, Ju:9, Ve:7, Sa:9 };
const PRASHNA_BENEFICS = ["Ju","Ve","Me"];
const PRASHNA_MALEFICS = ["Sa","Ma","Su","Ra","Ke"];

// Approximate daily speed of each planet (deg/day) — used as fallback for
// Ithasala timing when finite-difference fails.
const APPROX_SPEED = { Su:0.986, Mo:13.176, Ma:0.524, Me:1.383, Ju:0.083, Ve:1.602, Sa:0.034, Ra:-0.053, Ke:-0.053 };

function pSpeed(planet, jd) {
  if (planet === "As") return 360;
  if (planet === "Su") return 0.986;
  if (planet === "Mo") return 13.176;
  if (planet === "Ra" || planet === "Ke") return -0.053;
  const pmap = { Ma:"mars", Me:"mercury", Ju:"jupiter", Ve:"venus", Sa:"saturn" };
  const key = pmap[planet]; if (!key) return APPROX_SPEED[planet] || 1;
  const l1 = planetGeoLongitude(key, jd - 0.5);
  const l2 = planetGeoLongitude(key, jd + 0.5);
  let d = l2 - l1; if (d > 180) d -= 360; if (d < -180) d += 360;
  return d;  // deg/day; negative = retrograde
}

// === Tajika: sign-offset aspect map (forward count) ===
// 0=conj, 3=sextile (3rd), 4=square (4th), 5=trine (5th), 7=opposition,
// 9=trine (9th), 10=square (10th), 11=sextile (11th). Hostile: 0,4,7,10. Friendly: 3,5,9,11.
function tajikaAspect(sign1, sign2) {
  const d = ((sign2 - sign1) + 12) % 12;
  if (d === 0)  return { offset:d, name:"Conjunction",       type:"hostile",  strength:"very strong" };
  if (d === 3)  return { offset:d, name:"3rd-house sextile", type:"friendly", strength:"moderate" };
  if (d === 4)  return { offset:d, name:"4th-house square",  type:"hostile",  strength:"strong" };
  if (d === 5)  return { offset:d, name:"5th-house trine",   type:"friendly", strength:"strong" };
  if (d === 7)  return { offset:d, name:"Opposition (7th)",  type:"hostile",  strength:"very strong" };
  if (d === 9)  return { offset:d, name:"9th-house trine",   type:"friendly", strength:"strong" };
  if (d === 10) return { offset:d, name:"10th-house square", type:"hostile",  strength:"strong" };
  if (d === 11) return { offset:d, name:"11th-house sextile",type:"friendly", strength:"moderate" };
  return null;
}

// === Ithasala (applying/separating connection) between two grahas ===
function ithasala(p1, p2, positions, jd) {
  if (p1 === p2 || p1 === "Ra" || p1 === "Ke" || p2 === "Ra" || p2 === "Ke")
    return { hasAspect:false, reason:"Tajika excludes nodes." };
  const l1 = positions[p1].sidereal, l2 = positions[p2].sidereal;
  const s1 = Math.floor(l1/30),     s2 = Math.floor(l2/30);
  const aspect = tajikaAspect(s1, s2);
  if (!aspect) return { hasAspect:false, reason:"No Tajika aspect between current signs." };
  const speed1 = pSpeed(p1, jd), speed2 = pSpeed(p2, jd);
  const fasterIsFirst = Math.abs(speed1) > Math.abs(speed2);
  const fasterP = fasterIsFirst ? p1 : p2;
  const slowerP = fasterIsFirst ? p2 : p1;
  const fastDeg = (fasterIsFirst ? l1 : l2) % 30;
  const slowDeg = (fasterIsFirst ? l2 : l1) % 30;
  // Within the same sign-offset pattern, the faster's degree-in-sign should be LESS than slower's
  // for the aspect to be applying (faster planet hasn't reached the same degree yet).
  const degGap = slowDeg - fastDeg;
  const speedFast = fasterIsFirst ? speed1 : speed2;
  const speedSlow = fasterIsFirst ? speed2 : speed1;
  const relSpeed = speedFast - speedSlow;
  const applying = (degGap > 0 && relSpeed > 0) || (degGap < 0 && relSpeed < 0);
  const absGap = Math.abs(degGap);
  const allowedOrb = ((DEEPTAMSHA[p1] || 6) + (DEEPTAMSHA[p2] || 6)) / 2;
  const inOrb = absGap <= allowedOrb;
  // Days to perfection (only meaningful if applying)
  const daysToPerfection = applying && relSpeed !== 0 ? absGap / Math.abs(relSpeed) : null;
  // Manau: significator changes sign before aspect perfects
  let manau = false;
  if (applying && daysToPerfection !== null) {
    const timeFastToBoundary = (30 - fastDeg) / Math.max(0.001, Math.abs(speedFast));
    const timeSlowToBoundary = (30 - slowDeg) / Math.max(0.001, Math.abs(speedSlow));
    if (timeFastToBoundary < daysToPerfection || timeSlowToBoundary < daysToPerfection) manau = true;
  }
  let classification;
  if (manau) classification = "Manau — connection breaks (significator changes sign before perfection)";
  else if (applying && absGap < 1) classification = "Poorna — near-exact, fully formed";
  else if (applying && inOrb)      classification = "Vartamana — Ithasala (applying, within orb)";
  else if (applying && !inOrb)     classification = "Bhavishya — will form later, currently out of orb";
  else                             classification = "Ishrafa — separating (already past)";
  return {
    hasAspect:true, aspect, applying, inOrb, manau,
    classification,
    fasterP, slowerP,
    speed1: speed1.toFixed(3), speed2: speed2.toFixed(3),
    relSpeed: relSpeed.toFixed(3),
    degGap: degGap.toFixed(2),
    allowedOrb: allowedOrb.toFixed(1),
    daysToPerfection: daysToPerfection !== null ? daysToPerfection.toFixed(1) : null
  };
}

// === Sub-yogas: Kamboola, Nakta, Yamaya ===
function subYogas(p1, p2, positions, jd) {
  const out = [];
  // Kamboola — Moon supports the Ithasala by aspecting both planets via Tajika and applying to one of them
  if (p1 !== "Mo" && p2 !== "Mo") {
    const moonAsp1 = tajikaAspect(Math.floor(positions.Mo.sidereal/30), Math.floor(positions[p1].sidereal/30));
    const moonAsp2 = tajikaAspect(Math.floor(positions.Mo.sidereal/30), Math.floor(positions[p2].sidereal/30));
    if (moonAsp1 && moonAsp2) {
      const ith1 = ithasala("Mo", p1, positions, jd);
      const ith2 = ithasala("Mo", p2, positions, jd);
      if ((ith1.applying && ith1.inOrb) || (ith2.applying && ith2.inOrb))
        out.push({ name:"Kamboola", note:"Moon supports the connection — Moon aspects both significators and is applying to at least one. Auspicious reinforcement." });
    }
  }
  // Nakta / Yamaya — a third planet relays light between two grahas that lack a direct Tajika aspect
  const a12 = tajikaAspect(Math.floor(positions[p1].sidereal/30), Math.floor(positions[p2].sidereal/30));
  if (!a12) {
    const candidates = ["Su","Mo","Ma","Me","Ju","Ve","Sa"].filter(p => p !== p1 && p !== p2);
    for (const p3 of candidates) {
      const a13 = tajikaAspect(Math.floor(positions[p1].sidereal/30), Math.floor(positions[p3].sidereal/30));
      const a23 = tajikaAspect(Math.floor(positions[p2].sidereal/30), Math.floor(positions[p3].sidereal/30));
      if (a13 && a23) {
        const fast13 = Math.abs(pSpeed(p1,jd)) > Math.abs(pSpeed(p3,jd)) ? p1 : p3;
        // Nakta: third planet is faster than both → translates light
        const sp1 = Math.abs(pSpeed(p1,jd)), sp2 = Math.abs(pSpeed(p2,jd)), sp3 = Math.abs(pSpeed(p3,jd));
        if (sp3 > sp1 && sp3 > sp2)      out.push({ name:`Nakta via ${PLANET_FULL[p3]}`, note:`Faster ${PLANET_FULL[p3]} translates light between ${PLANET_FULL[p1]} and ${PLANET_FULL[p2]} — connection is mediated, not direct.` });
        else if (sp3 < sp1 && sp3 < sp2) out.push({ name:`Yamaya via ${PLANET_FULL[p3]}`, note:`Slower ${PLANET_FULL[p3]} collects light from both significators — a gathering of effects, indirect mediation.` });
        break;
      }
    }
  }
  return out;
}

// === Planet state (combustion, dignity, etc.) ===
function combustionOrb(p) {
  return { Mo:12, Me:14, Ma:17, Ju:11, Ve:10, Sa:15 }[p] || null;
}
function planetState(p, positions) {
  if (p === "As" || p === "Su") return { combust: false };
  const orb = combustionOrb(p); if (!orb) return { combust: false };
  let diff = Math.abs(positions[p].sidereal - positions.Su.sidereal);
  if (diff > 180) diff = 360 - diff;
  return { combust: diff < orb, sunDistance: diff.toFixed(1), combustOrb: orb };
}
function planetDignity(p, positions) {
  const sign = Math.floor(positions[p].sidereal / 30);
  if (EXALT[p] && EXALT[p][0] === sign) return "Exalted";
  if (DEBIL[p] && DEBIL[p][0] === sign) return "Debilitated";
  if (OWN_SIGNS[p] && OWN_SIGNS[p].includes(sign)) return "Own sign";
  const lord = SIGN_LORDS[sign];
  if (FRIENDS[p] && FRIENDS[p].includes(lord)) return "Friendly sign";
  if (ENEMIES[p] && ENEMIES[p].includes(lord)) return "Enemy sign";
  return "Neutral sign";
}

// === PAC: Position · Aspect · Conjunction (Parashari analysis of any planet) ===
// Special drishti: Mars 4 & 8; Jupiter 5 & 9; Saturn 3 & 10; Rahu/Ketu 5, 7, 9 (per common modern usage).
// All planets aspect the 7th house from themselves.
const PARASHARI_SPECIAL_DRISHTI = { Ma:[4,8], Ju:[5,9], Sa:[3,10], Ra:[5,7,9], Ke:[5,7,9] };

function aspectsOnPlanet(targetP, positions) {
  const targetSign = Math.floor(positions[targetP].sidereal / 30);
  const out = [];
  for (const p of ["Su","Mo","Ma","Me","Ju","Ve","Sa","Ra","Ke"]) {
    if (p === targetP) continue;
    const pSign = Math.floor(positions[p].sidereal / 30);
    const housesAhead = ((targetSign - pSign) + 12) % 12;  // 0..11
    const drishtiHouse = housesAhead + 1;                  // 1..12
    if (drishtiHouse === 7) { out.push({ planet: p, type: "7th drishti" }); continue; }
    const special = PARASHARI_SPECIAL_DRISHTI[p];
    if (special && special.includes(drishtiHouse)) out.push({ planet: p, type: `${drishtiHouse}th drishti` });
  }
  return out;
}
function conjunctionsOf(targetP, positions) {
  const targetSign = Math.floor(positions[targetP].sidereal / 30);
  const out = [];
  for (const p of ["Su","Mo","Ma","Me","Ju","Ve","Sa","Ra","Ke"]) {
    if (p === targetP) continue;
    if (Math.floor(positions[p].sidereal/30) === targetSign) out.push(p);
  }
  return out;
}
// Renders a compact PAC block for one planet (planet's name shown by caller)
function renderPAC(p, positions, ascSign) {
  const sgn = Math.floor(positions[p].sidereal / 30);
  const deg = (positions[p].sidereal - sgn*30).toFixed(2);
  const house = ((sgn - ascSign + 12) % 12) + 1;
  const dignity = (p === "Ra" || p === "Ke") ? "—" : planetDignity(p, positions);
  const state = planetState(p, positions);
  const flags = [];
  if (positions[p].retro && p !== "Su" && p !== "Mo") flags.push(`<span class="chip warn">Retrograde</span>`);
  if (state.combust) flags.push(`<span class="chip bad">Combust (${state.sunDistance}° from Sun)</span>`);
  if (EXALT[p] && EXALT[p][0]===sgn) flags.push(`<span class="chip good">Exalted</span>`);
  if (DEBIL[p] && DEBIL[p][0]===sgn) flags.push(`<span class="chip bad">Debilitated</span>`);
  if (OWN_SIGNS[p] && OWN_SIGNS[p].includes(sgn)) flags.push(`<span class="chip good">Own sign</span>`);
  const aspects = aspectsOnPlanet(p, positions);
  const conj = conjunctionsOf(p, positions);
  const afflictions = afflictionsForPlanet(p, positions, ascSign);
  return `
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:8px;margin-top:6px;">
      <div class="info-cell"><div class="lbl">Position</div>
        <div class="val">${SIGNS[sgn]} · ${deg}° · House ${house}</div>
        <div class="small" style="margin-top:3px;color:var(--text-2);">${dignity}</div>
        ${flags.length?`<div style="margin-top:6px;">${flags.join(" ")}</div>`:""}
      </div>
      <div class="info-cell"><div class="lbl">Aspects received <span class="small" style="color:var(--text-3);font-weight:400;">(Parashari drishti)</span></div>
        <div class="val">${aspects.length ? aspects.map(a => `<span class="chip" style="margin:1px;">${PLANET_FULL[a.planet]} <span class="small" style="color:var(--text-3);">${a.type}</span></span>`).join(" ") : "<span class='small' style='color:var(--text-3);'>None</span>"}</div>
      </div>
      <div class="info-cell"><div class="lbl">Conjunctions <span class="small" style="color:var(--text-3);font-weight:400;">(same sign)</span></div>
        <div class="val">${conj.length ? conj.map(p => `<span class="chip" style="margin:1px;">${PLANET_FULL[p]}</span>`).join(" ") : "<span class='small' style='color:var(--text-3);'>None — alone in sign</span>"}</div>
      </div>
      ${afflictions.length ? `<div class="info-cell" style="border-left:3px solid var(--warn);"><div class="lbl">Affliction flags</div><div class="val small">${afflictions.join(" · ")}</div></div>` : ""}
    </div>
  `;
}

// === Lagna ripeness ===
function lagnaRipeness(ascLongitude) {
  const within = ascLongitude % 30;
  if (within < 3)  return { phase: "Early (< 3°)",  note: "Matter is just beginning — premature; outcome not yet ripened." };
  if (within > 27) return { phase: "Late (> 27°)", note: "Sign-changing — matter is at the end; outcome may already be decided, slipping past." };
  return { phase: `Middle (${within.toFixed(1)}°)`, note: "Matter has unfolded enough to be readable; no over-early or over-late signal." };
}
function signModality(sign) {
  // 0,3,6,9 = movable (chara) — fast outcomes
  // 1,4,7,10 = fixed (sthira) — slow, stable outcomes
  // 2,5,8,11 = dual (dwiswabhava) — mixed/oscillating
  const mod = sign % 3;
  if (mod === 0) return { kind: "Movable (Chara)", timing: "Fast — outcomes resolve quickly" };
  if (mod === 1) return { kind: "Fixed (Sthira)",  timing: "Slow — outcomes resolve steadily, with delay" };
  return                  { kind: "Dual (Dwiswabhava)", timing: "Mixed — outcomes oscillate, multiple turns possible" };
}

// === Moon analysis ===
function moonAnalysis(positions) {
  const moonSign = Math.floor(positions.Mo.sidereal / 30);
  const nak = nakshatraOf(positions.Mo.sidereal);
  // Paksha & tithi
  const diff = mod360(positions.Mo.sidereal - positions.Su.sidereal);
  const tithiNum = Math.floor(diff / 12);
  const paksha = tithiNum < 15 ? "Shukla (waxing)" : "Krishna (waning)";
  // Gandanta — last 3°20' of water sign or first 3°20' of fire sign
  const within = positions.Mo.sidereal % 30;
  const elemMod = moonSign % 4;
  const gandanta = (elemMod === 3 && within > 26.667) || (elemMod === 0 && within < 3.333);
  // Combustion
  const combust = planetState("Mo", positions).combust;
  // Malefic association (in same sign as malefic, or adjacent signs aspected)
  const malefAssoc = [];
  for (const m of ["Ma","Sa","Ra","Ke"]) {
    if (Math.floor(positions[m].sidereal/30) === moonSign) malefAssoc.push(PLANET_FULL[m]);
  }
  return {
    sign: SIGNS[moonSign], nak, paksha, tithiNum,
    gandanta, combust, malefAssoc,
    tithiName: ["Pratipada","Dwitiya","Tritiya","Chaturthi","Panchami","Shashthi","Saptami","Ashtami","Navami","Dashami","Ekadashi","Dwadashi","Trayodashi","Chaturdashi","Purnima","Pratipada","Dwitiya","Tritiya","Chaturthi","Panchami","Shashthi","Saptami","Ashtami","Navami","Dashami","Ekadashi","Dwadashi","Trayodashi","Chaturdashi","Amavasya"][tithiNum]
  };
}

// === Affliction flags ===
function afflictionsForPlanet(p, positions, ascSign) {
  const out = [];
  const sign = Math.floor(positions[p].sidereal / 30);
  const house = ((sign - ascSign + 12) % 12) + 1;
  if ([6,8,12].includes(house)) out.push(`In trik house ${house} — affliction or weakness`);
  if (planetState(p, positions).combust) out.push("Combust by Sun (Asta)");
  if (positions[p].retro && p !== "Su" && p !== "Mo") out.push("Retrograde");
  // Papakartari — hemmed by malefics on both sides
  const prevSign = (sign + 11) % 12;
  const nextSign = (sign + 1) % 12;
  const malefInPrev = ["Ma","Sa","Ra","Ke","Su"].some(m => Math.floor(positions[m].sidereal/30) === prevSign);
  const malefInNext = ["Ma","Sa","Ra","Ke","Su"].some(m => Math.floor(positions[m].sidereal/30) === nextSign);
  if (malefInPrev && malefInNext && p !== "Su" && p !== "Ma" && p !== "Sa") out.push("Papakartari (hemmed by malefics)");
  return out;
}

// === Hora lord (planetary hour) ===
const PLANETARY_HORA_SEQUENCE = ["Su","Ve","Me","Mo","Sa","Ju","Ma"]; // Chaldean order
function horaLord(weekday, hourFromSunrise) {
  const WEEKDAY_LORDS = ["Su","Mo","Ma","Me","Ju","Ve","Sa"];
  const startIdx = PLANETARY_HORA_SEQUENCE.indexOf(WEEKDAY_LORDS[weekday]);
  const idx = (startIdx + Math.floor(hourFromSunrise) + 7000) % 7;
  return PLANETARY_HORA_SEQUENCE[idx];
}

function castPrashna() {
  const dob = document.getElementById("pqDate").value;
  const tob = document.getElementById("pqTime").value;
  const lat = parseFloat(document.getElementById("pqLat").value);
  const lon = parseFloat(document.getElementById("pqLon").value);
  const tz  = parseFloat(document.getElementById("pqTz").value);
  if (!dob || !tob) { alert("Please set the date and time of the question."); return; }
  const [y,m,d] = dob.split("-").map(Number);
  const [hh,mm,ss] = tob.split(":").map(Number);
  const localHour = hh + (mm||0)/60 + ((ss||0))/3600;
  const utHour = localHour - tz;
  const jd = julianDay(y, m, d, utHour);
  const { positions } = computePositions(jd, lat, lon);
  const ascSign = Math.floor(positions.As.sidereal / 30);
  PRASHNA_STATE = {
    jd, year:y, month:m, day:d, hour: localHour, lat, lon, tz,
    positions, ascSign,
    selectedHouses: new Set([1]),  // Lagna selected by default
    querentOverride: null, matterOverride: null,
    notes: PRASHNA_STATE ? PRASHNA_STATE.notes : ""
  };
  renderPrashnaDossier();
}

// === Clickable North-Indian Prashna chart ===
function drawPrashnaChart(positions, selectedHouses) {
  const ascSign = Math.floor(positions.As.sidereal / 30);
  const signsInHouses = [];
  for (let i = 0; i < 12; i++) signsInHouses.push((ascSign + i) % 12);
  const planetsInHouses = Array.from({length:12}, ()=>[]);
  const order = ["As","Su","Mo","Ma","Me","Ju","Ve","Sa","Ra","Ke"];
  for (const p of order) {
    const s = Math.floor(positions[p].sidereal / 30);
    const houseIdx = (s - ascSign + 12) % 12;
    planetsInHouses[houseIdx].push({ p, retro: positions[p].retro, deg: positions[p].sidereal - s*30 });
  }
  // Click-target polygons for the 12 houses of the North-Indian diamond
  // Coordinate refs assume a 320x320 SVG, same as drawNorthIndianChart.
  const polyForHouse = [
    null,
    "120,10 200,10 160,90",          // H1 top diamond
    "10,10 120,10 80,90 80,90",      // H2 top-left small
    "10,10 80,90 10,160",            // H3 left top
    "10,160 80,90 160,160 80,230",   // H4 left center
    "10,160 80,230 10,310",          // H5 left bottom
    "10,310 80,230 200,310",         // H6 bottom-left small (approx)
    "120,310 200,310 160,230",       // H7 bottom diamond
    "200,310 310,310 240,230",       // H8 bottom-right small
    "240,230 310,160 310,310",       // H9 right bottom
    "240,230 310,160 240,90 160,160",// H10 right center
    "310,10 310,160 240,90",         // H11 right top
    "200,10 310,10 240,90"           // H12 top-right small
  ];
  // House center points (for labels)
  const housePoints = [null,
    {x:160,y:60},{x:80,y:40},{x:40,y:80},{x:80,y:160},{x:40,y:240},
    {x:80,y:280},{x:160,y:260},{x:240,y:280},{x:280,y:240},{x:240,y:160},
    {x:280,y:80},{x:240,y:40}
  ];
  const W = 320, H = 320;
  let svg = `<svg class="kundli-svg pr-chart" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">`;
  // Clickable invisible polygons FIRST (under labels)
  for (let h = 1; h <= 12; h++) {
    const selected = selectedHouses.has(h);
    svg += `<polygon points="${polyForHouse[h]}" fill="${selected?'rgba(255,140,66,0.10)':'transparent'}" stroke="${selected?'var(--accent)':'transparent'}" stroke-width="${selected?1.5:0}" style="cursor:pointer;" onclick="togglePrashnaHouse(${h})"/>`;
  }
  // Frame
  svg += `<rect class="outer" x="10" y="10" width="${W-20}" height="${H-20}"/>`;
  svg += `<line x1="10" y1="10" x2="${W-10}" y2="${H-10}"/>`;
  svg += `<line x1="${W-10}" y1="10" x2="10" y2="${H-10}"/>`;
  svg += `<line x1="${W/2}" y1="10" x2="${W-10}" y2="${H/2}"/>`;
  svg += `<line x1="${W-10}" y1="${H/2}" x2="${W/2}" y2="${H-10}"/>`;
  svg += `<line x1="${W/2}" y1="${H-10}" x2="10" y2="${H/2}"/>`;
  svg += `<line x1="10" y1="${H/2}" x2="${W/2}" y2="10"/>`;
  // Labels
  for (let h = 1; h <= 12; h++) {
    const pt = housePoints[h];
    const sign = signsInHouses[h-1];
    const planets = planetsInHouses[h-1];
    svg += `<text class="sign-num" x="${pt.x}" y="${pt.y - 8}" text-anchor="middle" style="font-size:8px;fill:var(--text-3);pointer-events:none;">H${h}</text>`;
    svg += `<text class="sign-num" x="${pt.x}" y="${pt.y + 4}" text-anchor="middle" style="pointer-events:none;">${sign+1}</text>`;
    planets.forEach((p, i) => {
      const py = pt.y + 16 + i * 11;
      const cls = p.retro ? "ret" : "";
      svg += `<text class="planet ${cls}" x="${pt.x}" y="${py}" text-anchor="middle" style="pointer-events:none;">${p.p}</text>`;
    });
  }
  svg += `</svg>`;
  return svg;
}

function togglePrashnaHouse(h) {
  if (!PRASHNA_STATE) return;
  const s = PRASHNA_STATE.selectedHouses;
  if (s.has(h)) s.delete(h); else s.add(h);
  if (s.size === 0) s.add(1);  // never zero — always keep Lagna selected
  renderPrashnaDossier();
}

function setPrashnaSig(role, planet) {
  if (!PRASHNA_STATE) return;
  if (role === "querent") PRASHNA_STATE.querentOverride = planet || null;
  else PRASHNA_STATE.matterOverride = planet || null;
  renderPrashnaDossier();
}
