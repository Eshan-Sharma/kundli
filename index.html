          return `<tr><td><b>${PLANET_FULL[p]}</b></td><td>${SIGNS[sg]}</td><td class="mono">${dn}</td><td>${hs}</td><td>${nk.name} P${nk.pada}</td><td>${dig}</td><td>${flags.join(" ")||"—"}</td></tr>`;
        }).join("")}</tbody>
      </table>
    </div>

    <div class="section-h">Astrologer's Reading</div>
    <div class="card">
      <p class="small" style="color:var(--text-2);margin-bottom:8px;">Your own interpretation of this chart. Saved with the chart for your personal track record.</p>
      <textarea id="prNotes" rows="4" style="width:100%;resize:vertical;min-height:80px;" placeholder="What you read in the chart, the verdict you gave, and (later) the actual outcome…">${escapeHtml(s.notes||'')}</textarea>
    </div>
  `;
  let dossierEl = document.getElementById("prashnaDossier");
  if (!dossierEl) {
    // Form not present (e.g., we re-rendered just the dossier) — recreate
    renderPrashnaForm();
    dossierEl = document.getElementById("prashnaDossier");
  }
  dossierEl.innerHTML = html;
}

function renderHouseDossier(s) {
  const positions = s.positions;
  const ascSign = s.ascSign;
  const sel = Array.from(s.selectedHouses).sort((a,b)=>a-b);
  const cards = sel.map(h => {
    const hsig = PRASHNA_HOUSE_SIG[h-1];
    const sgn = (ascSign + h - 1) % 12;
    const lord = SIGN_LORDS[sgn];
    const occupants = ["Su","Mo","Ma","Me","Ju","Ve","Sa","Ra","Ke"].filter(p => Math.floor(positions[p].sidereal/30) === sgn);
    const karakas = (PRASHNA_HOUSE_KARAKA[h] || []).map(p => PLANET_FULL[p]).join(", ");
    return `<div class="card">
      <div style="display:flex;gap:10px;align-items:center;margin-bottom:8px;flex-wrap:wrap;">
        <span class="chip accent" style="font-weight:700;">H${h}</span>
        <h3 style="font-family:'Inter';font-size:15px;margin:0;color:var(--text);">${hsig.names.join(" · ")}</h3>
        <span class="small" style="color:var(--text-3);">${SIGNS[sgn]} · Lord ${PLANET_FULL[lord]}</span>
      </div>
      <p class="small" style="color:var(--text-2);line-height:1.55;">${hsig.gloss}</p>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;">
        <div class="info-cell"><div class="lbl">Natural karaka</div><div class="val">${karakas||"—"}</div></div>
        <div class="info-cell"><div class="lbl">Occupants of this house</div><div class="val">${occupants.length?occupants.map(p=>PLANET_FULL[p]).join(", "):"None"}</div></div>
      </div>
      <div style="margin-top:12px;padding-top:10px;border-top:1px solid var(--border);">
        <div class="eyebrow" style="color:var(--accent);">PAC of house lord — ${PLANET_FULL[lord]}</div>
        ${renderPAC(lord, positions, ascSign)}
      </div>
    </div>`;
  }).join("");
  return `<div class="section-h">Selected Houses — Lord PAC <span class="sub">${sel.length} house${sel.length===1?'':'s'} selected · tap chart to add/remove</span></div>${cards}`;
}

function renderConnectionAnalysis(s, querentSig, matterSig) {
  if (querentSig === matterSig) {
    return `<div class="section-h">Querent ↔ Matter Connection</div>
      <div class="card">
        <p style="color:var(--text);">Querent significator and matter significator are the same planet (<b>${PLANET_FULL[querentSig]}</b>). Self-contained — the querent IS the matter. Read this planet's own state, dignity, and house placement directly.</p>
      </div>`;
  }
  const positions = s.positions; const jd = s.jd;
  const ith = ithasala(querentSig, matterSig, positions, jd);
  const subs = subYogas(querentSig, matterSig, positions, jd);
  let body = "";
  if (!ith.hasAspect) {
    body = `<div class="card"><p style="color:var(--text);"><b>${PLANET_FULL[querentSig]}</b> and <b>${PLANET_FULL[matterSig]}</b> do not share a Tajika aspect. ${ith.reason||""}</p>
      ${subs.length?`<p class="small" style="margin-top:8px;color:var(--text-2);">However, indirect mediations exist: ${subs.map(s=>s.name).join(" · ")}.</p>`:""}
    </div>`;
  } else {
    const a = ith.aspect;
    const verdictClass = ith.classification.startsWith("Vartamana") ? "good" : ith.classification.startsWith("Poorna") ? "good" : ith.classification.startsWith("Manau") ? "warn" : ith.classification.startsWith("Ishrafa") ? "bad" : "warn";
    body = `<div class="card">
      <div class="card-row">
        <div class="ic ${verdictClass}"><svg><use href="#i-${verdictClass==='good'?'check':'ban'}"/></svg></div>
        <div class="info">
          <div class="lbl">Tajika aspect · ${a.type}</div>
          <div class="val">${a.name} · ${a.strength}</div>
          <div class="small" style="color:var(--text-2);margin-top:2px;">${ith.classification}</div>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-top:12px;">
        <div class="info-cell"><div class="lbl">Faster significator</div><div class="val">${PLANET_FULL[ith.fasterP]}</div></div>
        <div class="info-cell"><div class="lbl">Degree gap</div><div class="val mono">${ith.degGap}°</div></div>
        <div class="info-cell"><div class="lbl">Allowed orb</div><div class="val mono">${ith.allowedOrb}°</div></div>
        <div class="info-cell"><div class="lbl">Applying?</div><div class="val">${ith.applying?"Yes":"No (separating)"}</div></div>
        <div class="info-cell"><div class="lbl">Within orb?</div><div class="val">${ith.inOrb?"Yes":"No"}</div></div>
        ${ith.daysToPerfection?`<div class="info-cell"><div class="lbl">Days to perfection</div><div class="val mono">${ith.daysToPerfection}</div></div>`:""}
      </div>
      ${subs.length?`<div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--border);">
        <div class="lbl" style="font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-3);font-weight:600;margin-bottom:6px;">Sub-yogas detected</div>
        ${subs.map(y => `<div class="card-row"><div class="ic good"><svg><use href="#i-sparkles"/></svg></div><div class="info"><div class="val">${y.name}</div><div class="small" style="color:var(--text-2);">${y.note}</div></div></div>`).join("")}
      </div>`:""}
      <p class="small" style="margin-top:14px;color:var(--text-3);font-style:italic;line-height:1.5;">Tajika Neelakanthi · Ithasala classification of an applying aspect within Deeptamsha (orb) sum-halves. The astrologer judges weight in context.</p>
    </div>`;
  }
  return `<div class="section-h">Querent ↔ Matter Connection <span class="sub">${PLANET_FULL[querentSig]} → ${PLANET_FULL[matterSig]}</span></div>${body}`;
}

function renderMoonAndAfflictions(s) {
  const positions = s.positions;
  const ascSign = s.ascSign;
  const moon = moonAnalysis(positions);
  const moonFlags = [];
  if (moon.gandanta) moonFlags.push("Gandanta — at sandhi between water & fire, unstable.");
  if (moon.combust) moonFlags.push("Combust by Sun — Moon's signal is overpowered.");
  if (moon.malefAssoc.length > 0) moonFlags.push(`Conjunct with malefic: ${moon.malefAssoc.join(", ")}.`);
  // Trik occupants
  const trikHouses = [6, 8, 12];
  const trikOccupants = [];
  for (const p of ["Su","Mo","Ma","Me","Ju","Ve","Sa","Ra","Ke"]) {
    const sgn = Math.floor(positions[p].sidereal / 30);
    const hs = ((sgn - ascSign + 12) % 12) + 1;
    if (trikHouses.includes(hs)) trikOccupants.push({ p, house: hs });
  }
  return `<div class="section-h">Moon · Affliction Flags</div>
    <div class="card">
      <div class="card-row">
        <div class="ic good"><svg><use href="#i-moon"/></svg></div>
        <div class="info">
          <div class="lbl">Moon</div>
          <div class="val">${moon.sign} · ${moon.nak.name} (Pada ${moon.nak.pada}) · Nak lord ${PLANET_FULL[moon.nak.lord]}</div>
          <div class="small" style="color:var(--text-2);margin-top:4px;">${moon.paksha} · ${moon.tithiName}</div>
        </div>
      </div>
      ${moonFlags.length ? moonFlags.map(f => `<div class="card-row"><div class="ic bad"><svg><use href="#i-ban"/></svg></div><div class="info"><div class="val" style="font-size:13px;">${f}</div></div></div>`).join("") : `<div class="card-row"><div class="ic good"><svg><use href="#i-check"/></svg></div><div class="info"><div class="val">No special Moon afflictions flagged.</div></div></div>`}
    </div>
    ${trikOccupants.length ? `<div class="card" style="margin-top:10px;">
      <div class="eyebrow">Trik-house occupants (6 · 8 · 12)</div>
      ${trikOccupants.map(o => `<div class="card-row"><div class="ic warn"><svg><use href="#i-ban"/></svg></div><div class="info"><div class="val">${PLANET_FULL[o.p]} in ${o.house}H</div><div class="small" style="color:var(--text-2);">House of dispute / sudden change / loss — note for the matter in question.</div></div></div>`).join("")}
    </div>` : ""}`;
}

// Tara cycle rotation — the standard table assumes Ashwini = Janma (index 0).
// User can pick any of the 27 nakshatras as the cycle start; the 9-Tara grid
// rotates accordingly. The cycle is purely positional (Janma · Sampat · Vipat ·
// Kshema · Pratyari · Sadhaka · Vadha · Mitra · Ati-Mitra), so a shift of N just
// adds N modulo 27 to every cell.
const TARA_LABELS = [
  { name:"Janma",    san:"जन्म",                 nature:"Body — caution" },
  { name:"Sampat",   san:"सम्पत्",                nature:"Wealth — <b>auspicious</b>" },
  { name:"Vipat",    san:"विपत्",                 nature:"Danger — <b>malefic</b>" },
  { name:"Kshema",   san:"क्षेम",                 nature:"Prosperity — <b>auspicious</b>" },
  { name:"Pratyari", san:"प्रत्यरि",              nature:"Obstacle — <b>malefic</b>" },
  { name:"Sadhaka",  san:"साधक",                 nature:"Achievement — <b>auspicious</b>" },
  { name:"Vadha",    san:"वध / नैधन",             nature:"Destruction — <b>malefic</b>" },
  { name:"Mitra",    san:"मित्र",                 nature:"Friend — <b>auspicious</b>" },
  { name:"Ati-Mitra",san:"अतिमित्र / परम मित्र",  nature:"Best friend — <b>auspicious</b>" },
];

function renderLearnTaraTable(startIdx) {
  // startIdx = nakshatra index (0..26) chosen as Janma.
  let html = `<table><thead><tr><th>#</th><th>Tara</th><th>Sanskrit</th><th>Nature</th><th>Cycle 1</th><th>Cycle 2</th><th>Cycle 3</th></tr></thead><tbody>`;
  for (let t = 0; t < 9; t++) {
    const c1 = NAKSHATRAS[(startIdx + t) % 27][0];
    const c2 = NAKSHATRAS[(startIdx + 9  + t) % 27][0];
    const c3 = NAKSHATRAS[(startIdx + 18 + t) % 27][0];
    const isStart = (t === 0);
    html += `<tr${isStart ? ' style="background:var(--accent-soft);"' : ''}>
      <td>${t+1}</td>
      <td><b>${TARA_LABELS[t].name}</b></td>
      <td>${TARA_LABELS[t].san}</td>
      <td>${TARA_LABELS[t].nature}</td>
      <td>${c1}</td><td>${c2}</td><td>${c3}</td>
    </tr>`;
  }
  html += `</tbody></table>`;
  return html;
}

function learnTaraStart(idx) {
  const wrap = document.getElementById("taraTableWrap");
  if (wrap) wrap.innerHTML = renderLearnTaraTable(idx);
}

function renderLearnPane() {
  document.getElementById("pane-learn").innerHTML = `
    <div class="hero">
      <div class="eyebrow">Learn</div>
      <div class="h-date display" style="font-size:28px;">Ashtakoota Guna Milan</div>
      <p class="small" style="color:var(--text-2);margin-top:8px;line-height:1.55;">A working reference to the eight <i>kootas</i> of Vedic horoscope matching: what each one measures, the full nakshatra/rashi classification behind it, how points are awarded, and the classical Sanskrit basis where it can be quoted reliably.</p>
    </div>

    <div class="card learn-section">
      <div class="section-h">0 · The system at a glance</div>
      <p><i>Ashtakoota</i> (अष्टकूट, "eight aspects") matching, also called <i>Guna Milan</i>, compares the <b>Moon</b> of the bride and groom — their Moon sign (<i>rashi</i>) and Moon nakshatra (<i>janma nakshatra</i>). The Lagna/ascendant is <i>not</i> used here, because the Moon governs <i>manas</i> (mind and emotion), which is what marriage compatibility is judged on. The eight kootas carry a graded weight totalling <b>36 points</b> (<i>guna</i>).</p>
      <div class="scroll-x"><table>
        <thead><tr><th>#</th><th>Koota</th><th>Sanskrit</th><th>Max</th><th>Judges</th></tr></thead>
        <tbody>
          <tr><td>1</td><td>Varna</td><td>वर्ण</td><td>1</td><td>Ego, work-temperament, spiritual grade</td></tr>
          <tr><td>2</td><td>Vashya</td><td>वश्य</td><td>2</td><td>Mutual control, attraction, who yields</td></tr>
          <tr><td>3</td><td>Tara / Dina</td><td>तारा / दिन</td><td>3</td><td>Health, longevity, destiny, well-being</td></tr>
          <tr><td>4</td><td>Yoni</td><td>योनि</td><td>4</td><td>Physical/sexual compatibility, instinct</td></tr>
          <tr><td>5</td><td>Graha Maitri</td><td>ग्रहमैत्री</td><td>5</td><td>Mental affinity, intellect, friendship</td></tr>
          <tr><td>6</td><td>Gana</td><td>गण</td><td>6</td><td>Temperament, character, conduct</td></tr>
          <tr><td>7</td><td>Bhakoot / Rashi</td><td>भकूट / राशि</td><td>7</td><td>Family welfare, wealth, emotional flow</td></tr>
          <tr><td>8</td><td>Nadi</td><td>नाडी</td><td>8</td><td>Physiology, genes, health of progeny</td></tr>
        </tbody>
      </table></div>
      <p>The classical authorities for this scheme are the <i>muhurta</i> (electional) and <i>samhita</i> texts — principally <b>Muhurta Chintamani</b> (Daivajna Rama, 16th c.) in its <i>Vivaha Prakarana</i>, the <b>Narada Samhita</b>, <b>Jyotirnibandha</b>, <b>Brihat Jyotisarnava</b> and similar compendia. Exact verse wording varies between recensions and editions; the verses quoted below in Devanagari are given in their commonly reproduced form.</p>
      <p>A practical note before the details: classical texts themselves warn that Guna Milan is a <i>first filter</i>, not a verdict. The individual charts (longevity, 7th house, Venus, Mars/Manglik status, dasha sequence) and mutual house overlays carry as much or more weight than the 36-point score.</p>
    </div>

    <details class="card learn-section" open>
      <summary><span class="section-h" style="display:inline;padding:0;">1 · Varna Koota — वर्ण (1 point)</span></summary>
      <p><b>What it measures.</b> <i>Varna</i> here is a technical astrological category derived purely from the <b>Moon's rashi</b> — it is not a person's social caste. It indicates the grade of ego, the natural work-temperament, and spiritual orientation. Four varnas are ranked: Brahmin (highest) → Kshatriya → Vaishya → Shudra.</p>
      <p><b>Classification — by Moon sign (the authoritative method):</b></p>
      <div class="scroll-x"><table>
        <thead><tr><th>Varna</th><th>Element (<i>tattva</i>)</th><th>Moon signs</th></tr></thead>
        <tbody>
          <tr><td>Brahmin (ब्राह्मण)</td><td>Water (जल)</td><td>Cancer, Scorpio, Pisces</td></tr>
          <tr><td>Kshatriya (क्षत्रिय)</td><td>Fire (अग्नि)</td><td>Aries, Leo, Sagittarius</td></tr>
          <tr><td>Vaishya (वैश्य)</td><td>Air (वायु)</td><td>Gemini, Libra, Aquarius</td></tr>
          <tr><td>Shudra (शूद्र)</td><td>Earth (पृथ्वी)</td><td>Taurus, Virgo, Capricorn</td></tr>
        </tbody>
      </table></div>
      <p>(Some traditions also derive Varna directly from the nakshatra, which yields more than four classes; standard Ashtakoota uses the rashi method above. To go from a nakshatra to its rashi, use the nakshatra→rashi table in the Appendix.)</p>
      <p><b>Matching rule.</b> The groom's varna should be <b>equal to or higher than</b> the bride's. If so → <b>1 point</b>; if the bride's varna is higher → <b>0</b>.</p>
      <div class="scroll-x"><table>
        <thead><tr><th>Bride ↓ \\ Groom →</th><th>Brahmin</th><th>Kshatriya</th><th>Vaishya</th><th>Shudra</th></tr></thead>
        <tbody>
          <tr><td><b>Brahmin</b></td><td>1</td><td>0</td><td>0</td><td>0</td></tr>
          <tr><td><b>Kshatriya</b></td><td>1</td><td>1</td><td>0</td><td>0</td></tr>
          <tr><td><b>Vaishya</b></td><td>1</td><td>1</td><td>1</td><td>0</td></tr>
          <tr><td><b>Shudra</b></td><td>1</td><td>1</td><td>1</td><td>1</td></tr>
        </tbody>
      </table></div>
      <p><b>Note on the sample report you have:</b> both being Kshatriya is a same-varna match → 1/1, which is why that report calls it "good in all respects."</p>
      <p>A 0 in Varna is considered the <i>mildest</i> of all defects and is routinely set aside if the rest of the chart is sound. A classical verse assigns each varna-group its own "operative" dosha:</p>
      <blockquote class="learn-verse">
        <div class="san">नाडीदोषोऽस्ति विप्राणां वर्णदोषोऽस्ति भूभुजाम् ।<br>वैश्यानां गणदोषः स्यात् शूद्राणां योनिदूषणम् ॥</div>
        <div class="tr"><i>"Nadi-dosha tells chiefly for Brahmins, Varna-dosha for Kshatriyas (rulers), Gana-dosha for Vaishyas, and Yoni-dosha for Shudras."</i></div>
      </blockquote>
    </details>

    <details class="card learn-section">
      <summary><span class="section-h" style="display:inline;padding:0;">2 · Vashya Koota — वश्य (2 points)</span></summary>
      <p><b>What it measures.</b> <i>Vashya</i> means "control / amenability." It shows the natural power balance — who instinctively yields to whom, and how readily the two can be "won over" by each other. Based on the <b>Moon's rashi</b>, grouped into five animal/being categories.</p>
      <p><b>Classification — by Moon sign:</b></p>
      <div class="scroll-x"><table>
        <thead><tr><th>Vashya group</th><th>Sanskrit</th><th>Moon signs</th></tr></thead>
        <tbody>
          <tr><td>Quadruped</td><td>Chatushpada (चतुष्पद)</td><td>Aries, Taurus, 2nd half of Sagittarius, 1st half of Capricorn</td></tr>
          <tr><td>Human / Biped</td><td>Dwipada / Manava / Nara (द्विपद / मानव)</td><td>Gemini, Virgo, Libra, Aquarius, 1st half of Sagittarius</td></tr>
          <tr><td>Aquatic</td><td>Jalachara (जलचर)</td><td>Cancer, Pisces, 2nd half of Capricorn</td></tr>
          <tr><td>Wild animal</td><td>Vanachara / Vanchar (वनचर)</td><td>Leo</td></tr>
          <tr><td>Insect</td><td>Keeta (कीट)</td><td>Scorpio</td></tr>
        </tbody>
      </table></div>
      <p>(A simplified variant — used by some software — does not split Sagittarius or Capricorn and treats Leo and Scorpio simply as their own categories. The table above is the widely taught classical form.)</p>
      <p><b>Matching.</b> Same group → full <b>2</b>. The general principle: where one category naturally "preys on" or overpowers the other, points drop sharply; mutually neutral or friendly groups get partial points. One commonly used scoring matrix:</p>
      <div class="scroll-x"><table>
        <thead><tr><th>Bride ↓ \\ Groom →</th><th>Quadruped</th><th>Human</th><th>Aquatic</th><th>Wild (Leo)</th><th>Insect (Scorpio)</th></tr></thead>
        <tbody>
          <tr><td><b>Quadruped</b></td><td>2</td><td>1</td><td>1</td><td>0</td><td>1</td></tr>
          <tr><td><b>Human</b></td><td>0</td><td>2</td><td>1</td><td>1</td><td>1</td></tr>
          <tr><td><b>Aquatic</b></td><td>1</td><td>1</td><td>2</td><td>1</td><td>1</td></tr>
          <tr><td><b>Wild (Leo)</b></td><td>0</td><td>0</td><td>0</td><td>2</td><td>0</td></tr>
          <tr><td><b>Insect (Scorpio)</b></td><td>1</td><td>1</td><td>1</td><td>0</td><td>2</td></tr>
        </tbody>
      </table></div>
      <p>Vashya is the koota with the <b>most variation between authorities</b> — different texts and software give slightly different sub-values (0, 0.5, 1, 1.5). Treat the principle (same = full, predator/prey = nil) as fixed and the fractional values as edition-dependent. "Vanchar–Vanchar" in your sample report is a same-group match → full 2 points.</p>
    </details>

    <details class="card learn-section">
      <summary><span class="section-h" style="display:inline;padding:0;">3 · Tara / Dina Koota — तारा / दिन (3 points)</span></summary>
      <p><b>What it measures.</b> <i>Tara</i> ("star") judges health, longevity, fortune and mutual well-being. It is reckoned by <b>counting nakshatras</b> from one partner's janma nakshatra to the other's. The 27 nakshatras cycle through <b>9 Taras</b>, three times over.</p>
      <p><b>The 9 Taras and their nakshatras:</b></p>
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:10px;">
        <label class="small" style="color:var(--text-3);text-transform:uppercase;letter-spacing:0.08em;">Start cycle from</label>
        <select onchange="learnTaraStart(parseInt(this.value))" style="width:auto;min-width:160px;font-size:13px;">
          ${NAKSHATRAS.map((nk, i) => `<option value="${i}">${i+1}. ${nk[0]}</option>`).join("")}
        </select>
        <span class="small" style="color:var(--text-3);">— pick any nakshatra as Janma; the rest of the 9-Tara cycle rotates accordingly.</span>
      </div>
      <div class="scroll-x" id="taraTableWrap">${renderLearnTaraTable(0)}</div>
      <p>The malefic Taras are the <b>3rd (Vipat), 5th (Pratyari), and 7th (Vadha)</b>. The 1st (Janma) is treated as neutral-to-cautionary.</p>
      <p><b>Calculation rule.</b></p>
      <ol class="learn-list">
        <li>Count from the <b>groom's</b> nakshatra to the <b>bride's</b> (inclusive); divide the count by 9; note the remainder.</li>
        <li>If the remainder is <b>3, 5, or 7</b> → that direction scores 0; any other remainder → 1.5.</li>
        <li>Repeat counting from the <b>bride's</b> nakshatra to the <b>groom's</b>; same rule, again worth 1.5.</li>
        <li>Total Tara score = sum of the two directions: <b>0, 1.5, or 3</b>.</li>
      </ol>
      <p>In the sample report, "boy = Janma tara, girl = Vipat tara" means one direction landed on a malefic Tara — hence the "normal, not excellent" verdict and a reduced score.</p>
    </details>

    <details class="card learn-section">

      <p><b>What it measures.</b> Also called <i>Rashyadhipati</i> matching. It judges mental affinity, intellect and friendship by comparing the <b>lords of the two Moon rashis</b> and their natural (<i>naisargika</i>) friendship.</p>
      <p><b>Rashi lords:</b></p>

      <p><b>Scoring</b> — compare lord-of-bride's-rashi with lord-of-groom's-rashi (the relationship can be asymmetric, e.g. Sun is friend to Mercury but Mercury is enemy to Moon, so check both directions):</p>

    <details class="card learn-section">
      <summary><span class="section-h" style="display:inline;padding:0;">6 · Gana Koota — गण (6 points)</span></summary>
      <p><b>What it measures.</b> <i>Gana</i> judges temperament, conduct and overall character. The 27 nakshatras split into <b>3 Ganas</b>.</p>
      <p><b>The 3 Ganas and their nakshatras:</b></p>
      <div class="scroll-x"><table>
        <thead><tr><th>Gana</th><th>Sanskrit</th><th>Nature</th><th>Nakshatras</th></tr></thead>
        <tbody>
          <tr><td>Deva</td><td>देव</td><td>Divine — gentle, refined, generous</td><td>Ashwini, Mrigashira, Punarvasu, Pushya, Hasta, Swati, Anuradha, Shravana, Revati</td></tr>
          <tr><td>Manushya</td><td>मनुष्य / मनुज</td><td>Human — mixed, ambitious, sociable</td><td>Bharani, Rohini, Ardra, Purva Phalguni, Uttara Phalguni, Purva Ashadha, Uttara Ashadha, Purva Bhadrapada, Uttara Bhadrapada</td></tr>
          <tr><td>Rakshasa</td><td>राक्षस</td><td>Demonic — forceful, self-willed, intense</td><td>Krittika, Ashlesha, Magha, Chitra, Vishakha, Jyeshtha, Mula, Dhanishta, Shatabhisha</td></tr>
        </tbody>
      </table></div>
      <p><b>Matching matrix</b> (bride's gana down the side, groom's across the top — note it is <b>asymmetric</b>):</p>
      <div class="scroll-x"><table>
        <thead><tr><th>Bride ↓ \\ Groom →</th><th>Deva</th><th>Manushya</th><th>Rakshasa</th></tr></thead>
        <tbody>
          <tr><td><b>Deva</b></td><td>6</td><td>6</td><td>0</td></tr>
          <tr><td><b>Manushya</b></td><td>5</td><td>6</td><td>0</td></tr>
          <tr><td><b>Rakshasa</b></td><td>1</td><td>0</td><td>6</td></tr>
        </tbody>
      </table></div>
      <p><b>Gana Dosha</b> arises chiefly when one partner is <b>Deva/Manushya and the other Rakshasa</b> — and is considered most severe when the <b>bride</b> is Rakshasa and the <b>groom</b> is Deva. In the sample report (boy Manushya, girl Rakshasa) the score is 0, which is why it flags arguments and dominance struggles.</p>
      <p><b>Cancellation (<i>parihara</i>) of Gana Dosha</b> — traditionally the defect is treated as nullified if:</p>
      <ul class="learn-list">
        <li>the lords of the two Moon rashis are <b>friends</b>, or are the <b>same</b> planet; or</li>
        <li>the <i>navamsha</i> lords of the two rashis differ; or</li>
        <li>the couple have the <b>same Moon rashi</b> (even with different nakshatras); or</li>
        <li>there is a clean Bhakoot (no Rashi-dosha) — a sound Bhakoot is said to absorb Gana-dosha on its own.</li>
      </ul>
    </details>

    <details class="card learn-section">
      <summary><span class="section-h" style="display:inline;padding:0;">7 · Bhakoot / Rashi Koota — भकूट / राशि (7 points)</span></summary>
      <p><b>What it measures.</b> <i>Bhakoot</i> (also <i>Rashi Koota</i>) judges family welfare, wealth, emotional flow and overall household harmony. It compares the <b>mutual positions of the two Moon rashis</b> — counting how many signs one Moon sits from the other, in both directions.</p>
      <p><b>Rule.</b> Count the position of each rashi from the other. If the pair falls into <b>2/12, 5/9, or 6/8</b> → <b>0 points (Bhakoot Dosha)</b>. Any other mutual position → <b>7 points</b>.</p>
      <div class="scroll-x"><table>
        <thead><tr><th>Quality</th><th>Points</th><th>Mutual rashi positions</th></tr></thead>
        <tbody>
          <tr><td>Auspicious</td><td>7</td><td>1, 3, 4, 7, 10, 11 (e.g. 1–1, 3–11, 4–10, 7–7)</td></tr>
          <tr><td>Dosha</td><td>0</td><td>2nd/12th, 5th/9th, 6th/8th</td></tr>
        </tbody>
      </table></div>
      <p><b>The three Bhakoot doshas:</b></p>
      <div class="scroll-x"><table>
        <thead><tr><th>Dosha</th><th>Position</th><th>Traditionally indicates</th></tr></thead>
        <tbody>
          <tr><td>Dwirdwadasha (द्विर्द्वादश)</td><td>2 / 12</td><td>Strain on wealth and finances</td></tr>
          <tr><td>Nava-Pancham (नवपञ्चम)</td><td>5 / 9</td><td>Difficulty regarding children / progeny</td></tr>
          <tr><td>Shadashtak (षडष्टक)</td><td>6 / 8</td><td>Health problems, friction, even danger</td></tr>
        </tbody>
      </table></div>
      <p><b>Cancellation (<i>parihara</i>) of Bhakoot Dosha</b> — classically the defect is set aside when:</p>
      <ul class="learn-list">
        <li>the <b>lord of both Moon rashis is the same planet</b> (e.g. Aries &amp; Scorpio, both Mars; Taurus &amp; Libra, both Venus); or</li>
        <li>the two rashi-lords are <b>mutual friends</b>; or</li>
        <li>there is <b>Tara-shuddhi</b> (a clean Tara/Dina koota) and <b>rashi strength</b>; or</li>
        <li>for Shadashtak specifically: a <b>"friendly Shadashtak"</b> (Aries–Scorpio, Taurus–Libra, Gemini–Capricorn, Cancer–Sagittarius, Leo–Pisces, Virgo–Aquarius) is treated as benign, whereas an <b>"enemy Shadashtak"</b> (Aries–Virgo, Taurus–Sagittarius, Gemini–Scorpio, Cancer–Aquarius, Leo–Capricorn, Libra–Pisces) should be rejected.</li>
      </ul>
      <p>A widely repeated caution: if <b>Nadi Dosha and a Shadashtak Bhakoot Dosha occur together</b>, the match is rejected outright regardless of total score.</p>
      <p>The sample report's "excellent sign combination" means the two Moon signs fall in one of the favourable mutual positions → full 7 points.</p>
    </details>

    <details class="card learn-section">
      <summary><span class="section-h" style="display:inline;padding:0;">8 · Nadi Koota — नाडी (8 points)</span></summary>
      <p><b>What it measures.</b> <i>Nadi</i> carries the <b>highest weight</b> of all eight kootas. It maps to the three Ayurvedic <i>doshas</i> and judges physiological constitution, genetic compatibility, and — most importantly — the <b>health and viability of children</b>.</p>
      <p><b>The 3 Nadis and their nakshatras:</b></p>
      <div class="scroll-x"><table>
        <thead><tr><th>Nadi</th><th>Ayurvedic</th><th>Element</th><th>Nakshatras</th></tr></thead>
        <tbody>
          <tr><td>Adi (आदि)</td><td>Vata</td><td>Wind</td><td>Ashwini, Ardra, Punarvasu, Uttara Phalguni, Hasta, Jyeshtha, Mula, Shatabhisha, Purva Bhadrapada</td></tr>
          <tr><td>Madhya (मध्य)</td><td>Pitta</td><td>Bile</td><td>Bharani, Mrigashira, Pushya, Purva Phalguni, Chitra, Anuradha, Purva Ashadha, Dhanishta, Uttara Bhadrapada</td></tr>
          <tr><td>Antya (अन्त्य)</td><td>Kapha</td><td>Phlegm</td><td>Krittika, Rohini, Ashlesha, Magha, Swati, Vishakha, Uttara Ashadha, Shravana, Revati</td></tr>
        </tbody>
      </table></div>
      <p><b>Rule.</b> The couple must have <b>different Nadis</b> → <b>8 points</b>. <b>Same Nadi</b> → <b>0 points (Nadi Dosha)</b>. There are no partial scores.</p>
      <p>Same-Nadi is treated as the most serious single defect in the whole system — classically associated with health problems for the couple and risk to progeny — so a high total (even 28+) with Nadi Dosha is still considered unsafe unless cancelled.</p>
      <p><b>Cancellation (<i>parihara</i>) of Nadi Dosha</b> — the classical verse and its standard reading:</p>
      <blockquote class="learn-verse">
        <div class="san">राश्यैक्ये च द्वयोर्भिन्नमृक्षं स्वान्त्यर्क्षयोस्त्रये राशियुग्मम् ।<br>नाडीदोषो नो गणानां च दोषो नक्षत्रैक्ये पादभेदे शुभं स्यात् ॥</div>
      </blockquote>
      <p>The conditions it and allied texts describe:</p>
      <ul class="learn-list">
        <li>the couple share the <b>same janma nakshatra but different <i>padas</i></b> (quarters); or</li>
        <li>the couple have the <b>same Moon rashi but different nakshatras</b>; or</li>
        <li>the couple have <b>different Moon rashis but the same nakshatra</b>; or</li>
        <li>the shared nakshatra is one that spans two rashis and they fall in the <b>different rashi-portions</b>; or</li>
        <li>the Nadi is the same but the <i>nakshatra lord</i> differs and other kootas are strong.</li>
      </ul>
      <p>In the sample report (boy Madhya, girl Antya) the Nadis differ → full 8 points, the strongest possible result.</p>
    </details>

    <details class="card learn-section">
      <summary><span class="section-h" style="display:inline;padding:0;">9 · Reading the total score</span></summary>
      <div class="scroll-x"><table>
        <thead><tr><th>Total (out of 36)</th><th>Traditional verdict</th></tr></thead>
        <tbody>
          <tr><td>Below 18</td><td>Not recommended</td></tr>
          <tr><td>18 – 24</td><td>Acceptable / average (<i>madhyama</i>)</td></tr>
          <tr><td>25 – 32</td><td>Very good (<i>shubha</i>)</td></tr>
          <tr><td>33 – 36</td><td>Excellent (<i>uttama</i>) — extremely rare</td></tr>
        </tbody>
      </table></div>
      <p><b>18</b> is the conventional minimum. But three overrides matter more than the headline number:</p>
      <ol class="learn-list">
        <li><b>Nadi Dosha</b> (8 points lost) — many astrologers will not pass a match on this alone, even at 28+, unless a genuine <i>parihara</i> applies.</li>
        <li><b>Bhakoot Dosha</b> (7 points lost) — if Bhakoot is afflicted, the score bands above shift down; some hold that no match with an uncancelled Bhakoot dosha is truly "excellent."</li>
        <li><b>Gana Dosha</b> with bride = Rakshasa, groom = Deva — flagged for serious temperament conflict.</li>
      </ol>
      <p>The lower-value kootas (Varna, Vashya, Tara) losing points is considered minor and routinely tolerated.</p>
    </details>

    <details class="card learn-section">
      <summary><span class="section-h" style="display:inline;padding:0;">10 · Important caveats</span></summary>
      <ul class="learn-list">
        <li><b>Guna Milan is a screening tool, not a verdict.</b> Every classical source insists the <i>individual</i> charts be read first — longevity, the 7th house and its lord, Venus (for men) and Jupiter/Mars (for women), Manglik/Kuja dosha, and the running dasha. A 32/36 score over two fragile charts is weaker than 20/36 over two sound ones.</li>
        <li><b>Manglik (Kuja) Dosha is separate</b> from Ashtakoota and is checked independently; classically a Manglik should be matched with a Manglik.</li>
        <li><b>Regional systems differ.</b> What is described here is the North-Indian <b>Ashtakoota</b> (8 kootas / 36 points). South-Indian practice often uses the <b>Dashakoota</b> (10 kootas), adding Mahendra, Stree-Deergha, Vedha and Rajju koota, and weights Rajju and Vedha heavily.</li>
        <li><b>Recensions vary.</b> Sub-point values in Vashya and Graha Maitri, the exact malefic-Tara set, and even some nakshatra-to-yoni assignments differ slightly between texts and between software implementations. The <i>structure</i> is stable; the decimals are not.</li>
        <li><b>"Varna" and "caste"</b> are not the same thing here — in this system Varna is a four-fold category read off the Moon's sign, used as a temperament indicator.</li>
        <li>This is a traditional belief system. It is presented here descriptively, as the rules are actually stated in the classical literature.</li>
      </ul>
    </details>
