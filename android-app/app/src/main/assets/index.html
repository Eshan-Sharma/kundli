}
function stopHinduClock() {
  if (HINDU_CLOCK_TIMER) { clearInterval(HINDU_CLOCK_TIMER); HINDU_CLOCK_TIMER = null; }
}

// Returns true if the given choghadia slot covers "now" (and dateObj is today)
function isCurrentChoghadia(c, dateObj) {
  const now = new Date();
  if (dateObj.getFullYear() !== now.getFullYear() ||
      dateObj.getMonth() !== now.getMonth() ||
      dateObj.getDate() !== now.getDate()) return false;
  const h = now.getHours() + now.getMinutes()/60 + now.getSeconds()/3600;
  if (c.start <= c.end) return h >= c.start && h < c.end;
  return h >= c.start || h < c.end; // wraps past midnight
}

// ============================================================
// REMINDERS — condition-based notifications. Stored in localStorage.
// A reminder triggers whenever today's panchang matches all its set
// conditions (any null condition is "any"). Supports:
//   - tithi (1..15 within paksha) + paksha (Shukla/Krishna/any)
//   - vaar (weekday 0..6)
//   - nakshatra (0..26)
//   - hindu month (Chaitra...Phalguna)
//   - gregorian month-day (MM-DD repeats yearly) or full YYYY-MM-DD (once)
//   - yoga (0..26)
//   - recurrence: 'repeat' (every match) or 'once' (auto-deactivate after fire)
// ============================================================
function loadReminders() { return loadJSON("kundliReminders") || []; }
function saveReminders(arr) {
  saveJSON("kundliReminders", arr);
  // Mirror to native (Android) for widgets + native daily notification scheduling.
  // On web/desktop window.KundliBridge is undefined → no-op.
  try { if (window.KundliBridge && window.KundliBridge.setReminders) window.KundliBridge.setReminders(JSON.stringify(arr)); } catch(e) {}
}

function reminderMatchesPanchang(r, pan, dateObj) {
  if (!r.active) return false;
  const wpTithi = (pan.tithiNum % 15) + 1;
  if (r.tithi && r.tithi !== wpTithi) return false;
  if (r.paksha && r.paksha !== "any" && r.paksha !== pan.paksha) return false;
  if (r.vaar !== null && r.vaar !== undefined && r.vaar !== pan.weekday) return false;
  if (r.nakshatra !== null && r.nakshatra !== undefined && r.nakshatra !== pan.nakshatra.idx) return false;
  if (r.month && r.month !== pan.hinduMonth) return false;
  if (r.yoga !== null && r.yoga !== undefined && r.yoga !== pan.yogaNum) return false;
  if (r.date) {
    const yyyymmdd = ymd(dateObj);
    const mmdd = yyyymmdd.slice(5);
    if (r.date.length === 10) {
      if (r.date !== yyyymmdd) return false;
    } else if (r.date.length === 5) {
      if (r.date !== mmdd) return false;
    }
  }
  const anyCondition = r.tithi || (r.vaar !== null && r.vaar !== undefined) || (r.nakshatra !== null && r.nakshatra !== undefined) || r.month || r.date || (r.yoga !== null && r.yoga !== undefined) || r.paksha === "Shukla" || r.paksha === "Krishna";
  if (!anyCondition) return false;
  // Recurrence gate
  const rec = r.recurrence || "repeat";
  if (rec === "repeat") return true;
  const last = r.lastFired;
  if (!last) return true;
  const lastDate = new Date(last);
  if (rec === "once") return false; // already fired once
  if (rec === "yearly")  return lastDate.getFullYear() !== dateObj.getFullYear();
  if (rec === "monthly") return !(lastDate.getFullYear() === dateObj.getFullYear() && lastDate.getMonth() === dateObj.getMonth());
  return true;
}

// Mark today's matching reminders as fired (call once when displaying today's panchang).
// This is what auto-deactivates "once" and prevents re-fire within yearly/monthly windows.
function markRemindersFiredFor(dateObj) {
  const todayStr = ymd(dateObj);
  const arr = loadReminders();
  let dirty = false;
  if (!CURRENT) return;
  const pan = computePanchang(dateObj.getFullYear(), dateObj.getMonth()+1, dateObj.getDate(), CURRENT.input.lat, CURRENT.input.lon, CURRENT.input.tz);
  for (const r of arr) {
    if (!reminderMatchesPanchang(r, pan, dateObj)) continue;
    const last = r.lastFired ? ymd(new Date(r.lastFired)) : null;
    if (last !== todayStr) { r.lastFired = dateObj.getTime(); dirty = true; }
    if ((r.recurrence || "repeat") === "once") { r.active = false; dirty = true; }
  }
  if (dirty) saveReminders(arr);
}

function remindersForDate(dateObj) {
  if (!CURRENT) return [];
  const tz = CURRENT.input.tz, lat = CURRENT.input.lat, lon = CURRENT.input.lon;
  const pan = computePanchang(dateObj.getFullYear(), dateObj.getMonth()+1, dateObj.getDate(), lat, lon, tz);
  return loadReminders().filter(r => reminderMatchesPanchang(r, pan, dateObj));
}

function renderRemindersPane() {
  const reminders = loadReminders();
  const today = new Date();
  const todayMatches = remindersForDate(today);
  let listHtml = "";
  if (reminders.length === 0) {
    listHtml = `<div class="card"><p style="color:var(--text-2);text-align:center;padding:20px;">No reminders yet. Tap "Add reminder" to create your first one.</p></div>`;
  } else {
    listHtml = reminders.map((r, i) => {
      const matching = todayMatches.some(m => m.id === r.id);
      const cond = describeReminder(r);
      return `<div class="card">
        <div style="display:flex;align-items:flex-start;gap:12px;">
          <div style="flex:1;min-width:0;">
            <div style="display:flex;align-items:center;gap:8px;">
              <h3 style="font-family:'Inter';font-size:16px;font-weight:600;color:var(--text);margin:0;">${escapeHtml(r.name)}</h3>
              ${matching ? `<span class="chip accent">Today</span>` : ""}
              ${!r.active ? `<span class="chip">Paused</span>` : ""}
            </div>
            ${r.message ? `<p style="color:var(--text-2);font-size:13px;margin-top:6px;">${escapeHtml(r.message)}</p>` : ""}
            <p style="color:var(--text-3);font-size:12px;margin-top:8px;">${cond}</p>
          </div>
          <div style="display:flex;flex-direction:column;gap:4px;">
            <button class="secondary" onclick="editReminder(${i})" style="padding:6px 10px;" title="Edit"><svg style="width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;"><use href="#i-edit"/></svg></button>
            <button class="secondary" onclick="toggleReminderActive(${i})" style="padding:6px 10px;" title="${r.active?'Pause':'Resume'}">${r.active?'⏸':'▶'}</button>
            <button class="danger" onclick="deleteReminder(${i})" style="padding:6px 10px;" title="Delete"><svg style="width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;"><use href="#i-trash"/></svg></button>
          </div>
        </div>
      </div>`;
    }).join("");
  }

  const todayHtml = todayMatches.length > 0 ? `
    <div class="festival">
      <div class="emoji">🔔</div>
      <div class="text">
        <div class="label">Triggered today</div>
        <div class="name">${todayMatches.map(r => escapeHtml(r.name)).join(", ")}</div>
      </div>
    </div>` : "";

  document.getElementById("pane-reminders").innerHTML = `
    <div class="section-h">Reminders <button onclick="openReminderEditor(null)" style="padding:6px 12px;display:inline-flex;align-items:center;gap:6px;"><svg style="width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;"><use href="#i-plus"/></svg> Add reminder</button></div>
    ${todayHtml}
    ${listHtml}
  `;
}

function describeReminder(r) {
  const parts = [];
  if (r.tithi) {
    const px = r.paksha && r.paksha !== "any" ? `${r.paksha} ` : "";
    parts.push(`${px}Tithi ${r.tithi}`);
  } else if (r.paksha && r.paksha !== "any") {
    parts.push(r.paksha + " Paksha");
  }
  if (r.vaar !== null && r.vaar !== undefined) parts.push(WEEKDAY_NAMES[r.vaar]);
  if (r.nakshatra !== null && r.nakshatra !== undefined) parts.push("Nak: " + NAKSHATRAS[r.nakshatra][0]);
  if (r.month) parts.push(r.month);
  if (r.yoga !== null && r.yoga !== undefined) parts.push("Yoga: " + YOGA_NAMES[r.yoga]);
  if (r.date) parts.push("Date: " + r.date);
  if (parts.length === 0) parts.push("(no conditions — would fire daily)");
  return "When: " + parts.join(" · ");
}

function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

// In-app confirm dialog. Replaces window.confirm(), which Android WebView silently
// suppresses when no WebChromeClient is set (the cause of "delete not working on mobile").
// Usage: appConfirm("Delete X?", () => { /* do delete */ });
function appConfirm(message, onYes, opts) {
  const o = opts || {};
  const existing = document.getElementById("appConfirm");
  if (existing) existing.remove();
  const div = document.createElement("div");
  div.id = "appConfirm";
  div.className = "modal";
  div.style.display = "block";
  div.innerHTML = `
    <div class="modal-backdrop" onclick="document.getElementById('appConfirm').remove()"></div>
    <div class="modal-card" style="max-width:380px;">
      <p style="font-size:15px;line-height:1.5;color:var(--text);margin-bottom:18px;">${escapeHtml(message)}</p>
      <div style="display:flex;gap:8px;justify-content:flex-end;">
        <button class="secondary" id="appConfirmNo">${o.cancelText || 'Cancel'}</button>
        <button class="${o.dangerous ? 'danger' : ''}" id="appConfirmYes">${o.yesText || 'Confirm'}</button>
      </div>
    </div>
  `;
  document.body.appendChild(div);
  document.getElementById("appConfirmNo").onclick = () => div.remove();
  document.getElementById("appConfirmYes").onclick = () => { div.remove(); try { onYes(); } catch(e){ console.error(e); } };
}

// One-tap presets for the most common reminder patterns.
// Click → auto-fills the editor fields below; user can save immediately or tweak.
const REMINDER_PRESETS = [
  { id:"ekadashi", icon:"🌙", label:"Every Ekadashi",       name:"Ekadashi",          fields:{ tithi:11 } },
  { id:"pradosh",  icon:"🪔", label:"Every Pradosh (13)",    name:"Pradosh Vrat",      fields:{ tithi:13 } },
  { id:"purnima",  icon:"🌕", label:"Every Purnima",         name:"Purnima",           fields:{ tithi:15, paksha:"Shukla" } },
  { id:"amavasya", icon:"🌑", label:"Every Amavasya",        name:"Amavasya",          fields:{ tithi:15, paksha:"Krishna" } },
  { id:"sank",     icon:"🐘", label:"Sankashti Chaturthi",   name:"Sankashti",         fields:{ tithi:4, paksha:"Krishna" } },
  { id:"vinayaka", icon:"🐘", label:"Vinayaka Chaturthi",    name:"Vinayaka Chaturthi",fields:{ tithi:4, paksha:"Shukla" } },
  { id:"tuesday",  icon:"♂",  label:"Every Tuesday",         name:"Tuesday (Hanuman)", fields:{ vaar:2 } },
  { id:"saturday", icon:"♄",  label:"Every Saturday",        name:"Saturday (Shani)",  fields:{ vaar:6 } },
  { id:"mula",     icon:"✨",  label:"Every Mula Nakshatra",  name:"Mula Nakshatra",   fields:{ nakshatra:18 } },
];
// Applies a preset to the editor — RESETS all condition fields first so picking a
// different preset gives a clean override (no leftover conditions from the previous one).
function applyReminderPreset(presetId) {
  const p = REMINDER_PRESETS.find(x => x.id === presetId); if (!p) return;
  const f = p.fields;
  const set = (id, v) => { const el = document.getElementById(id); if (el) el.value = (v === undefined || v === null ? "" : v); };
  // Always overwrite the name with the preset's name (so switching presets renames cleanly)
  document.getElementById("rmName").value = p.name;
  // Reset every condition field, then set only those in the preset
  set("rmTithi", f.tithi);
  set("rmPaksha", f.paksha || "any");
  set("rmVaar", f.vaar);
  set("rmNak", f.nakshatra);
  set("rmMonth", f.month);
  set("rmYoga", f.yoga);
  set("rmDate", f.date);
}

let EDITING_REMINDER = null;  // index into reminders array, or null for new
function openReminderEditor(idx) {
  EDITING_REMINDER = idx;
  const arr = loadReminders();
  const r = (idx === null) ? { active: true, paksha: "any" } : arr[idx];
  const opt = (val, label, selected) => `<option value="${val}" ${selected==val?'selected':''}>${label}</option>`;
  const nakOpts = NAKSHATRAS.map((n,i) => opt(i, n[0], r.nakshatra)).join("");
  const yogaOpts = YOGA_NAMES.map((y,i) => opt(i, y, r.yoga)).join("");
  const monthOpts = HINDU_SOLAR_MONTH.map(m => `<option value="${m}" ${r.month===m?'selected':''}>${m}</option>`).join("");
  const html = `
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">
      <h3 style="flex:1;margin:0;">${idx === null ? 'New Reminder' : 'Edit Reminder'}</h3>
      <button class="ghost" onclick="closeSavedModal()" style="padding:6px;"><svg style="width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;"><use href="#i-x"/></svg></button>
    </div>
    <p class="small" style="color:var(--text-2);margin-bottom:10px;">Pick a preset to auto-fill, or set conditions manually below. The reminder fires on days that match <b>all</b> set conditions.</p>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--border);">
      ${REMINDER_PRESETS.map(p => `<button class="secondary" style="padding:5px 10px;font-size:12px;" onclick="applyReminderPreset('${p.id}')">${p.icon} ${escapeHtml(p.label)}</button>`).join("")}
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
      <div style="grid-column:1/-1;"><label style="font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:0.1em;">Name *</label>
        <input id="rmName" value="${r.name?escapeHtml(r.name):''}" placeholder="Ekadashi Vrat" /></div>
      <div style="grid-column:1/-1;"><label style="font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:0.1em;">Message (optional)</label>
        <input id="rmMsg" value="${r.message?escapeHtml(r.message):''}" placeholder="Fast today, no rice" /></div>

      <div><label style="font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:0.1em;">Paksha</label>
        <select id="rmPaksha">
          <option value="any" ${r.paksha==='any'||!r.paksha?'selected':''}>Any</option>
          <option value="Shukla" ${r.paksha==='Shukla'?'selected':''}>Shukla (waxing)</option>
          <option value="Krishna" ${r.paksha==='Krishna'?'selected':''}>Krishna (waning)</option>
        </select></div>
      <div><label style="font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:0.1em;">Tithi (1–15)</label>
        <select id="rmTithi"><option value="">Any</option>${Array.from({length:15}, (_,i) => opt(i+1, `${i+1} · ${TITHI_NAMES[i]}`, r.tithi)).join("")}</select></div>

      <div><label style="font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:0.1em;">Weekday</label>
        <select id="rmVaar"><option value="">Any</option>${WEEKDAY_NAMES.map((w,i) => opt(i, w, r.vaar)).join("")}</select></div>
      <div><label style="font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:0.1em;">Nakshatra</label>
        <select id="rmNak"><option value="">Any</option>${nakOpts}</select></div>

      <div><label style="font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:0.1em;">Hindu Month</label>
        <select id="rmMonth"><option value="">Any</option>${monthOpts}</select></div>
      <div><label style="font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:0.1em;">Yoga</label>
        <select id="rmYoga"><option value="">Any</option>${yogaOpts}</select></div>

      <div style="grid-column:1/-1;"><label style="font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:0.1em;">Gregorian Date (optional)</label>
        <input id="rmDate" type="text" value="${r.date||''}" placeholder="YYYY-MM-DD for one-time, or MM-DD for every year" /></div>

      <div style="grid-column:1/-1;"><label style="font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:0.1em;">Recurrence</label>
        <select id="rmRecurrence">
          <option value="repeat" ${(!r.recurrence||r.recurrence==='repeat')?'selected':''}>Repeat — fires every day the conditions match</option>
          <option value="once" ${r.recurrence==='once'?'selected':''}>Once — auto-deactivate after the first match</option>
          <option value="yearly" ${r.recurrence==='yearly'?'selected':''}>Yearly — fires once per Gregorian year on the next match</option>
          <option value="monthly" ${r.recurrence==='monthly'?'selected':''}>Monthly — fires once per Gregorian month on the next match</option>
        </select>
        <div class="small" style="color:var(--text-3);margin-top:4px;">Tip: combine with conditions. E.g., Tithi 11 + Repeat = every Ekadashi. Date "08-15" + Yearly = once a year on 15 August.</div>
      </div>

      <div style="grid-column:1/-1;display:flex;justify-content:flex-end;gap:8px;margin-top:6px;">
        ${idx !== null ? `<button class="danger" onclick="deleteReminderFromEditor()">Delete</button>` : ""}
        <button class="secondary" onclick="closeSavedModal()">Cancel</button>
        <button onclick="saveReminderFromEditor()">Save reminder</button>
      </div>
    </div>
  `;
  document.getElementById("savedKundliModalBody").innerHTML = html;
  document.getElementById("savedKundliModal").style.display = "block";
}

function saveReminderFromEditor() {
  const name = document.getElementById("rmName").value.trim();
  if (!name) { alert("Please give the reminder a name."); return; }
  const get = id => { const v = document.getElementById(id).value; return v === "" ? null : v; };
  const getInt = id => { const v = get(id); return v === null ? null : parseInt(v); };
  const r = {
    id: EDITING_REMINDER === null ? ("r" + Date.now()) : loadReminders()[EDITING_REMINDER].id,
    name,
    message: document.getElementById("rmMsg").value.trim(),
    paksha:   document.getElementById("rmPaksha").value,
    tithi:    getInt("rmTithi"),
    vaar:     getInt("rmVaar"),
    nakshatra: getInt("rmNak"),
    month:    get("rmMonth"),
    yoga:     getInt("rmYoga"),
    date:     get("rmDate"),
    recurrence: get("rmRecurrence") || "repeat",
    active:   true,
    createdAt: Date.now(),
    lastFired: (EDITING_REMINDER !== null ? loadReminders()[EDITING_REMINDER].lastFired : null)
  };
  const arr = loadReminders();
  if (EDITING_REMINDER === null) arr.push(r);
  else arr[EDITING_REMINDER] = r;
  saveReminders(arr);
  closeSavedModal();
  renderRemindersPane();
}

function editReminder(idx) { openReminderEditor(idx); }
function deleteReminder(idx) {
  const arr = loadReminders();
  appConfirm(`Delete reminder "${arr[idx].name}"?`, () => {
    arr.splice(idx, 1);
    saveReminders(arr);
    renderRemindersPane();
  }, { yesText: "Delete", dangerous: true });
}
function deleteReminderFromEditor() {
  if (EDITING_REMINDER === null) { closeSavedModal(); return; }
  const arr = loadReminders();
  appConfirm(`Delete reminder "${arr[EDITING_REMINDER].name}"?`, () => {
    arr.splice(EDITING_REMINDER, 1);
    saveReminders(arr);
    closeSavedModal();
    renderRemindersPane();
  }, { yesText: "Delete", dangerous: true });
}
function toggleReminderActive(idx) {
  const arr = loadReminders();
  arr[idx].active = !arr[idx].active;
  saveReminders(arr);
  renderRemindersPane();
}

// ---------- INIT ----------
initCityDropdown();
// On load: restore last-saved Self input (if any) into the form, then auto-generate.
window.addEventListener("load", () => {
  const saved = loadSelfInput();
  if (saved) populateSelfForm(saved);
  setTimeout(() => generateChart(), 200);
});
</script>
