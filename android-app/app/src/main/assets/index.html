function runMatch() {
  const nameG = document.getElementById("nameG").value || "Partner";
  const dobG = document.getElementById("dobG").value;
  const tobG = document.getElementById("tobG").value;
  const latG = parseFloat(document.getElementById("latG").value);
  const lonG = parseFloat(document.getElementById("lonG").value);
  const tzG  = parseFloat(document.getElementById("tzG").value);
  if (!dobG || !tobG) { alert("Enter partner DOB and time."); return; }
  const [y,m,d] = dobG.split("-").map(Number);
  const [hh,mm,ss] = tobG.split(":").map(Number);
  const localHour = hh + (mm||0)/60 + (ss||0)/3600;
  const utHour = localHour - tzG;
  const jd = julianDay(y, m, d, utHour);
  const partnerInput = { name: nameG, year:y, month:m, day:d, hour: localHour, tz: tzG, lat: latG, lon: lonG, jd };

  // Build full partner chart (positions, dasha, shadbala) so it can be viewed as a full kundli.
  PARTNER_DATA = buildPersonData(partnerInput);
  savePartnerInput(partnerInput);  // auto-save partner to localStorage
  const inpG = partnerInput;
  const pG = PARTNER_DATA.positions;

  // Build koota data for both — A is always SELF, B is always PARTNER
  const A = SELF_DATA.positions;
  const aMoonSign = Math.floor(A.Mo.sidereal / 30);
  const aNak = nakshatraOf(A.Mo.sidereal);
  const aData = { moonLongSid: A.Mo.sidereal, moonSign: aMoonSign, nakIdx: aNak.idx, nakPada: aNak.pada };

  const bMoonSign = Math.floor(pG.Mo.sidereal / 30);
  const bNak = nakshatraOf(pG.Mo.sidereal);
  const bData = { moonLongSid: pG.Mo.sidereal, moonSign: bMoonSign, nakIdx: bNak.idx, nakPada: bNak.pada };

  const result = ashtakoot(aData, bData);

  // Refresh the header switcher so user can jump to partner's full kundli
  renderPersonSwitcher();

  // Side-by-side chart comparison panel
  const sbsHtml = renderSideBySide(SELF_DATA, PARTNER_DATA);

  let html = sbsHtml + `
    <h3 style="color:var(--accent);margin-top:18px;">Compatibility Result (Ashtakoot Milan)</h3>
    <div class="match-summary">
      <div class="info-cell">
        <div class="lbl">${SELF_DATA.input.name}</div>
        <div class="val">Moon: ${SIGNS[aMoonSign]}, ${aNak.name} (Pada ${aNak.pada})</div>
      </div>
      <div class="info-cell">
        <div class="lbl">${inpG.name}</div>
        <div class="val">Moon: ${SIGNS[bMoonSign]}, ${bNak.name} (Pada ${bNak.pada})</div>
      </div>
    </div>
    <div class="info-cell" style="text-align:center;">
      <div class="lbl">Ashtakoot Score</div>
      <div class="match-score">${result.total} / 36</div>
      <div class="small">${result.total >= 18 ? "Acceptable match (≥18 considered favourable)" : "Below 18 — match needs careful examination"}</div>
    </div>
    <div class="scroll-x"><table class="koota-table">
      <thead><tr><th>Koota</th><th>Points</th><th>Out of</th><th>Notes</th></tr></thead>
      <tbody>`;
  const notes = {
    "Varna":"Spiritual/work compatibility (Brahmin > Kshatriya > Vaishya > Shudra)",
    "Vashya":"Mutual control / dominance",
    "Tara":"Health, longevity & destiny compatibility",
    "Yoni":"Sexual & instinctive compatibility (via animal symbols)",
    "Graha Maitri":"Friendship of Moon-sign lords (mental compatibility)",
    "Gana":"Temperament: Deva, Manushya, Rakshasa",
    "Bhakoot":"Family welfare, prosperity (Moon-sign distance)",
    "Nadi":"Health & progeny (Adi/Madhya/Antya)"
  };
  for (const k of Object.keys(result.points)) {
    const [p, max] = result.points[k];
    html += `<tr><td><b>${k}</b></td><td>${p}</td><td>${max}</td><td class="small">${notes[k]}</td></tr>`;
  }
  html += `</tbody></table></div>`;

  // Dosha cards
  html += `<h3 style="color:var(--accent);margin-top:20px;">Dosha Analysis</h3>
    <p class="small">Each dosha shows the classical rule, this chart's specific finding, and the verdict. Status: <span class="badge good">NO DOSHA</span> = the configuration doesn't trigger the dosha. <span class="badge good">CANCELLED</span> = dosha exists but a classical exception cancels it. <span class="badge warn">MITIGATED</span> = dosha exists, no classical exception, but a modern/non-classical softening applies — treat with care. <span class="badge bad">ACTIVE</span> = dosha is present with no recognised cancellation.</p>`;
  for (const dn of ["Gana","Bhakoot","Nadi"]) {
    const d = result.doshas[dn];
    const status = d.status; // no_dosha | cancelled | partial | active
    const statusTxt = {no_dosha:"DOSHA INVALID", cancelled:"DOSHA INVALID", partial:"PARTIALLY VALID", active:"DOSHA VALID"}[status];
    const pointsTxt = `${d.points}/${d.max}`;
    html += `<div class="dosha-card ${status}">
      <span class="name">${dn} Dosha &nbsp;<span class="small">${pointsTxt}</span></span>

    </div>`;
  for (const [nm, mng] of [[SELF_DATA.input.name, mangA],[inpG.name, mangB]]) {
    let status, statusTxt;
    if (!mng.isMangal) { status = "no_dosha"; statusTxt = "DOSHA INVALID"; }
    else if (mng.exceptions.length > 0) { status = "cancelled"; statusTxt = "DOSHA INVALID"; }
    else { status = "active"; statusTxt = "DOSHA VALID"; }
    html += `<div class="dosha-card ${status}">
      <span class="name">${nm}'s Mangal Dosha</span>
      <span class="status">${statusTxt}</span>
      <div style="clear:both"></div>
      <div class="dosha-finding"><b>For this chart:</b><br>
        Mars sign: <b>${SIGNS[mng.marsSign]}</b>.

        From Moon: house ${mng.houseFromMoon}${mng.fromMoon?' <span class="badge bad">in dosha house</span>':''}.
        From Venus: house ${mng.houseFromVenus}${mng.fromVenus?' <span class="badge bad">in dosha house</span>':''}.
      </div>
      ${mangalVerdictBlock(mng)}
    </div>`;
  }
  // Mutual neutralisation
  if (mangA.isMangal && mangB.isMangal && mangA.exceptions.length === 0 && mangB.exceptions.length === 0) {
    html += `<div class="dosha-exc classical" style="margin-top:6px;"><b>Both partners are Manglik with no individual cancellation.</b> Traditional view: the dosha is mutually neutralised — both being Manglik balances out the affliction.</div>`;
  }

  document.getElementById("matchResult").innerHTML = html;
}

// Renders the full block of a dosha card: rule description, chart-specific
// finding, verdict, and exceptions (only when classical dosha is active).
function doshaBlock(name, d) {
  const desc = DOSHA_DESCRIPTIONS[name];
  const det = d.details;

  // 1. Rule description (always)
  let html = `<div class="dosha-desc">${desc}</div>`;

  // 2. Chart-specific finding
  html += `<div class="dosha-finding"><b>For this chart:</b><br>${chartFinding(name, d)}</div>`;

  // 3. Verdict + exceptions
  if (d.status === "no_dosha") {
    html += `<div class="dosha-exc classical"><b>Verdict:</b> ${verdictNoDosha(name, d)}</div>`;
  } else if (d.status === "cancelled") {
    html += `<div class="dosha-exc classical">
      <b>Dosha is present</b> by classical configuration. However, the following <b>classical exception(s)</b> cancel it:
      <ul>${d.classicalExc.map(e => `<li>${e}</li>`).join("")}</ul>
      <b>Verdict:</b> Dosha is fully cancelled by classical rule. The match is considered acceptable on this count.
    </div>`;
  } else if (d.status === "partial") {
    html += `<div class="dosha-exc classical">
      <b>Dosha is present</b> and <b>no classical exception applies</b>. The classical rules for cancellation (same Moon-sign lord, or mutual-friend Moon-sign lords) do not hold for this pair.
    </div>`;
    html += `<div class="dosha-exc modern">
      <b>However, a modern/non-classical softening factor applies:</b>
      <ul>${d.modernExc.map(e => `<li>${e}</li>`).join("")}</ul>
      <b>Verdict:</b> Treat as partially acceptable — the dosha is not classically cancelled, but modern astrologers may consider it weakened. Consult before deciding.
    </div>`;
  } else { // active
    html += `<div class="dosha-exc modern" style="background:rgba(231,76,60,0.08);border-left-color:var(--bad);">
      <b>Dosha is present</b> and <b>no recognised exception applies</b> for this pair. Neither the classical cancellation rules nor any common modern mitigation hold.
      <br><b>Verdict:</b> Dosha is active. Traditional remedies vary by family/lineage — consult a qualified astrologer.
    </div>`;
  }
  return html;
}

// ---------- MANGAL DOSHA ----------
function mangalDosha(positions) {
  // Mars in 1, 2, 4, 7, 8, or 12 from Lagna creates Mangal Dosha
  // Also check from Moon and Venus
  const ascSign = Math.floor(positions.As.sidereal / 30);
  const marsSign = Math.floor(positions.Ma.sidereal / 30);
  const moonSign = Math.floor(positions.Mo.sidereal / 30);
  const venusSign = Math.floor(positions.Ve.sidereal / 30);

  const houseFromLagna = ((marsSign - ascSign + 12) % 12) + 1;
  const houseFromMoon = ((marsSign - moonSign + 12) % 12) + 1;
  const houseFromVenus = ((marsSign - venusSign + 12) % 12) + 1;

  const dosha_houses = [1,2,4,7,8,12];
  const fromLagna = dosha_houses.includes(houseFromLagna);
  const fromMoon = dosha_houses.includes(houseFromMoon);
  const fromVenus = dosha_houses.includes(houseFromVenus);
  const isMangal = fromLagna || fromMoon || fromVenus;

  const exceptions = [];
  if (isMangal) {
    // Common exceptions:
    // 1. Mars in own sign or exaltation
    if (OWN_SIGNS.Ma.includes(marsSign)) exceptions.push(`Mars is in its own sign (${SIGNS[marsSign]}) — Mangal Dosha is nullified.`);
    if (EXALT.Ma[0] === marsSign) exceptions.push(`Mars is exalted in ${SIGNS[marsSign]} — Mangal Dosha is nullified.`);
    // 2. Mars conjunct or aspected by Jupiter or Moon
    const jupSign = Math.floor(positions.Ju.sidereal / 30);
    if (jupSign === marsSign) exceptions.push("Mars is conjunct Jupiter — Jupiter's benefic influence cancels Mangal Dosha.");
    if (moonSign === marsSign) exceptions.push("Mars is conjunct Moon — Mangal Dosha is significantly reduced.");
    // 3. Mars in Cancer (4th house = Mars in 4th from Ar lagna for someone) - not generic
    // 4. Mars in 2nd in Gemini/Virgo; in 4th in Aries/Sc; in 7th in Cn/Cp; in 8th in Sg/Pi; in 12th in Ta/Li (per some texts)
    const benignPlacements = {
      1: [], 2:[2,5], 4:[0,7], 7:[3,9], 8:[8,11], 12:[1,6]
    };
    if (benignPlacements[houseFromLagna] && benignPlacements[houseFromLagna].includes(marsSign))
      exceptions.push(`Mars in ${SIGNS[marsSign]} in house ${houseFromLagna} is considered benign — Mangal Dosha is cancelled.`);
    // 5. After age 28, Mangal Dosha is said to weaken (general belief)
  }
  return {
    isMangal, exceptions,
    houseFromLagna, houseFromMoon, houseFromVenus,
    fromLagna, fromMoon, fromVenus, marsSign, ascSign
  };
}

function mangalVerdictBlock(m) {
  if (!m.isMangal) {
    return `<div class="dosha-exc classical"><b>Verdict:</b> Mars is not in any of the Manglik houses (1, 2, 4, 7, 8, 12) from Lagna, Moon, or Venus. No Mangal Dosha.</div>`;
  }
  if (m.exceptions.length > 0) {
    return `<div class="dosha-exc classical">
      <b>Dosha is raised</b> — Mars sits in a Manglik house. However, the following classical exception(s) cancel it:
      <ul>${m.exceptions.map(e=>`<li>${e}</li>`).join("")}</ul>
      <b>Verdict:</b> Mangal Dosha is cancelled.
    </div>`;
  }
  return `<div class="dosha-exc modern" style="background:rgba(231,76,60,0.08);border-left-color:var(--bad);">
    <b>Dosha is active.</b> Mars is in one or more Manglik houses (1, 2, 4, 7, 8, or 12) from Lagna, Moon, or Venus, and no classical exception applies.
    <br><b>Verdict:</b> Mangal Dosha is active. Traditional remedies include Hanuman Chalisa, Mangal mantras, and matching with another Manglik partner (mutual neutralisation).
  </div>`;
}

// ---------- HINDU PANCHANG ENGINE ----------

const TITHI_NAMES = ["Pratipada","Dwitiya","Tritiya","Chaturthi","Panchami","Shashthi","Saptami","Ashtami","Navami","Dashami","Ekadashi","Dwadashi","Trayodashi","Chaturdashi","Purnima","Pratipada","Dwitiya","Tritiya","Chaturthi","Panchami","Shashthi","Saptami","Ashtami","Navami","Dashami","Ekadashi","Dwadashi","Trayodashi","Chaturdashi","Amavasya"];
const YOGA_NAMES = ["Vishkambha","Preeti","Ayushman","Saubhagya","Shobhana","Atiganda","Sukarma","Dhriti","Shoola","Ganda","Vriddhi","Dhruva","Vyaghata","Harshana","Vajra","Siddhi","Vyatipata","Variyana","Parigha","Shiva","Siddha","Sadhya","Shubha","Shukla","Brahma","Indra","Vaidhriti"];
// Yogas that are classically inauspicious (avoid auspicious activities)
const YOGA_INAUSPICIOUS = new Set(["Vishkambha","Atiganda","Shoola","Ganda","Vyaghata","Vajra","Vyatipata","Parigha","Vaidhriti"]);
// Karana naming: 0..55 cycle through 7 movable, 56..59 are 4 fixed karanas
function karanaForNum(k) {
  const MOV = ["Bava","Balava","Kaulava","Taitila","Garaja","Vanija","Vishti"];
  const FIX = ["Shakuni","Chatushpada","Naga","Kimstughna"];
  if (k <= 55) return MOV[k % 7];
  return FIX[k - 56];
}
// Hindu solar months by Sun's sidereal sign
// Lunar month name approximation: when Sun is in sidereal sign N, the lunar
// month is roughly named for the next Purnima's nakshatra, which corresponds
// to one sign back. So: Sun in Pisces → Chaitra, Sun in Aries → Vaishakha, …
const HINDU_SOLAR_MONTH = ["Vaishakha","Jyeshtha","Ashadha","Shravana","Bhadrapada","Ashwina","Kartika","Margashirsha","Pausha","Magha","Phalguna","Chaitra"];
const RITU_NAMES = ["Vasanta","Vasanta","Grishma","Grishma","Varsha","Varsha","Sharad","Sharad","Hemanta","Hemanta","Shishira","Shishira"];

// Choghadia naming + auspiciousness
const CHOGHADIA_TYPE = {
  "Udveg":"bad","Char":"neutral","Labh":"good","Amrit":"good",
  "Kaal":"bad","Shubh":"good","Rog":"bad"
};
// Starting choghadia for DAY (by weekday 0=Sun..6=Sat); sequence cycles: Udveg,Char,Labh,Amrit,Kaal,Shubh,Rog
const CHOG_DAY_START = ["Udveg","Amrit","Rog","Labh","Shubh","Char","Kaal"];
// Starting choghadia for NIGHT (by weekday of sunset)
const CHOG_NIGHT_START = ["Shubh","Char","Kaal","Udveg","Amrit","Rog","Labh"];
const CHOG_SEQ = ["Udveg","Char","Labh","Amrit","Kaal","Shubh","Rog"];
function chogNext(name) { return CHOG_SEQ[(CHOG_SEQ.indexOf(name)+1) % 7]; }

// Rahu / Yamaganda / Gulika slot (1-indexed out of 8) per weekday (0=Sun..6=Sat)
const RAHU_SLOT     = [8, 2, 7, 5, 6, 4, 3];
const YAMA_SLOT     = [4, 3, 2, 1, 7, 6, 5];
const GULIKA_SLOT   = [7, 6, 5, 4, 3, 2, 1];

// Sarvartha Siddhi: weekday → set of nakshatra indexes (0-26)
const SARVARTHA_SIDDHI = {
  0:[12,18,11,20,25,7,0],    // Sun
  1:[3,4,7,16,21],            // Mon
  2:[0,2,8],                   // Tue
  3:[2,3,4,16,12],             // Wed
  4:[26,16,0,6,7],             // Thu
  5:[16,0,26,21],              // Fri
  6:[21,3,14]                  // Sat
};
// Amrita Siddhi: weekday → nakshatra
const AMRITA_SIDDHI = {0:12, 1:4, 2:0, 3:16, 4:7, 5:26, 6:3};

// Returns a {sunrise, sunset, solarNoon} struct as fractional hours (0..24) in local civil time for date Y/M/D.
function sunRiseSet(year, month, day, lat, lon, tz) {
  // Use 0h UT of the local date for an integer n (NOAA/Wikipedia algorithm)
  const jd0 = julianDay(year, month, day, 0);
  const nJ = Math.round(jd0 - 2451545.0 + 0.0008);
  const Jstar = nJ - lon/360;
  const M = mod360(357.5291 + 0.98560028 * Jstar);
  const C = 1.9148*sind(M) + 0.0200*sind(2*M) + 0.0003*sind(3*M);
  const lambda = mod360(M + C + 180 + 102.9372);
  const Jtransit = 2451545.0 + Jstar + 0.0053*sind(M) - 0.0069*sind(2*lambda);
  const delta = Math.asin(sind(lambda) * sind(23.44)) / DEG;
  const cosH = (sind(-0.83) - sind(lat)*sind(delta)) / (cosd(lat)*cosd(delta));
  if (cosH > 1)  return { sunrise: null, sunset: null, solarNoon: null, polar:"night" };
  if (cosH < -1) return { sunrise: null, sunset: null, solarNoon: null, polar:"day" };
  const H = Math.acos(cosH) / DEG;
  const Jset = Jtransit + H/360;
  const Jrise = Jtransit - H/360;
  // JD → local civil hour-of-day (0..24)
  function jdToLocalHour(j) {
    // (j + 0.5) gives midnight-UT-anchored date; fractional part = UT hour fraction of day
    const utHour = ((j + 0.5) - Math.floor(j + 0.5)) * 24;
    let h = utHour + tz;
    while (h < 0)  h += 24;
    while (h >= 24) h -= 24;
    return h;
  }
  return {
    sunrise: jdToLocalHour(Jrise),
    sunset:  jdToLocalHour(Jset),
    solarNoon: jdToLocalHour(Jtransit),
    dayLengthHrs: ((Jset - Jrise) * 24)
  };
}

function fmtTime(h) {
  if (h === null || h === undefined || isNaN(h)) return "—";
  const hh = Math.floor(h);
  const mm = Math.floor((h - hh) * 60);
  return `${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}`;
}
function addHrs(h, add) { let r = h + add; while (r < 0) r += 24; while (r >= 24) r -= 24; return r; }

function kaalSlot(slotNum, sunrise, dayLen) {
  // Returns {start, end} in fractional hours, given 1-indexed slot of 8
  const slotLen = dayLen / 8;
  return { start: addHrs(sunrise, slotLen * (slotNum-1)), end: addHrs(sunrise, slotLen * slotNum) };
}

// Compute 8 day choghadia + 8 night choghadia slots
function computeChoghadia(weekday, sunrise, sunset, dayLen) {
  const daySlotLen = dayLen / 8;
  const nightLen = 24 - dayLen;
  const nightSlotLen = nightLen / 8;
  const day = [];
  let cur = CHOG_DAY_START[weekday];
  for (let i = 0; i < 8; i++) {
    day.push({
      name: cur, type: CHOGHADIA_TYPE[cur],
      start: addHrs(sunrise, daySlotLen * i),
      end:   addHrs(sunrise, daySlotLen * (i+1))
    });
    cur = chogNext(cur);
  }
  // Night choghadia uses weekday of sunset's day; for our purposes use the same weekday (close enough)
  const night = [];
  cur = CHOG_NIGHT_START[weekday];
  for (let i = 0; i < 8; i++) {
    night.push({
      name: cur, type: CHOGHADIA_TYPE[cur],
      start: addHrs(sunset, nightSlotLen * i),
      end:   addHrs(sunset, nightSlotLen * (i+1))
    });
    cur = chogNext(cur);
  }
  return { day, night };
}

// Special auspicious yogas based on weekday + nakshatra
function specialYogas(weekday, nakIdx, yogaName) {
  const list = [];
  // Guru Pushya: Thursday + Pushya (nakshatra idx 7)
  if (weekday === 4 && nakIdx === 7) list.push({name:"Guru Pushya Yoga", type:"good", note:"One of the most auspicious yogas — Thursday + Pushya nakshatra. Excellent for new ventures, learning, financial commitments."});
  // Ravi Pushya: Sunday + Pushya
  if (weekday === 0 && nakIdx === 7) list.push({name:"Ravi Pushya Yoga", type:"good", note:"Sunday + Pushya nakshatra — highly auspicious for gold purchase, new beginnings, spiritual practices."});
  // Sarvartha Siddhi
  if (SARVARTHA_SIDDHI[weekday] && SARVARTHA_SIDDHI[weekday].includes(nakIdx))
    list.push({name:"Sarvartha Siddhi Yoga", type:"good", note:"Auspicious yoga — successful completion of all undertakings."});
  // Amrita Siddhi
  if (AMRITA_SIDDHI[weekday] === nakIdx)
    list.push({name:"Amrita Siddhi Yoga", type:"good", note:"Highly auspicious — like nectar. Excellent for all auspicious work except marriage (per some traditions)."});
  // Yoga inauspicious
  if (YOGA_INAUSPICIOUS.has(yogaName))
    list.push({name:`${yogaName} Yoga`, type:"bad", note:"Considered an inauspicious yoga in classical Panchang — avoid major auspicious activities."});
  return list;
}

// Compute full panchang for a given local date
function computePanchang(year, month, day, lat, lon, tz) {
  const jdNoonUT = julianDay(year, month, day, 12 - tz);
  // Sun & Moon at noon
  const sunTrop = sunLongitude(jdNoonUT);
  const moonTrop = moonLongitude(jdNoonUT);
  const ay = ayanamsa(jdNoonUT);
  const sunSid = mod360(sunTrop - ay);
  const moonSid = mod360(moonTrop - ay);

  // Tithi (lunar day): difference (Moon - Sun) / 12°
  const diff = mod360(moonTrop - sunTrop);
  const tithiNum = Math.floor(diff / 12);  // 0..29
  const tithiInDeg = diff - tithiNum * 12; // 0..12 elapsed in current tithi
  const paksha = tithiNum < 15 ? "Shukla" : "Krishna";
  const tithiName = TITHI_NAMES[tithiNum];

  // Nakshatra & pada
  const nak = nakshatraOf(moonSid);
  // Yoga: (Sun + Moon) / (360/27)
  const yogaSum = mod360(sunTrop + moonTrop);
  const yogaNum = Math.floor(yogaSum * 27 / 360);
  const yogaName = YOGA_NAMES[yogaNum];
  // Karana: 2 per tithi (60 total in a lunar month)
  const karanaNum = Math.floor(diff / 6);
  const karanaName = karanaForNum(karanaNum);

  // Hindu solar month & ritu by Sun's sidereal sign
  const sunSign = Math.floor(sunSid / 30);
  const hinduMonth = HINDU_SOLAR_MONTH[sunSign];
  const ritu = RITU_NAMES[sunSign];

  // Weekday
  const localJD = julianDay(year, month, day, 12);
  const weekday = jdWeekday(localJD);

  // Sunrise/Sunset
  const sun = sunRiseSet(year, month, day, lat, lon, tz);

  let rahu = null, yama = null, gulika = null, abhijit = null, brahma = null, choghadia = null;
  if (sun.sunrise !== null) {
    rahu   = kaalSlot(RAHU_SLOT[weekday], sun.sunrise, sun.dayLengthHrs);
    yama   = kaalSlot(YAMA_SLOT[weekday], sun.sunrise, sun.dayLengthHrs);
    gulika = kaalSlot(GULIKA_SLOT[weekday], sun.sunrise, sun.dayLengthHrs);
    // Abhijit Muhurta: centered on solar noon, length = dayLength/15 (one muhurta)
    const muhurtLen = sun.dayLengthHrs / 15;
    abhijit = { start: addHrs(sun.solarNoon, -muhurtLen/2), end: addHrs(sun.solarNoon, muhurtLen/2) };
    // Brahma Muhurta: 96-48 min before sunrise
    brahma = { start: addHrs(sun.sunrise, -96/60), end: addHrs(sun.sunrise, -48/60) };
    choghadia = computeChoghadia(weekday, sun.sunrise, sun.sunset, sun.dayLengthHrs);
  }

  // Special yogas
  const yogas = specialYogas(weekday, nak.idx, yogaName);

  return {
    weekday,
    tithiNum, tithiName, paksha, tithiInDeg,
    nakshatra: nak,
    yogaName, yogaNum, isYogaBad: YOGA_INAUSPICIOUS.has(yogaName),
    karanaName, karanaNum,
    hinduMonth, ritu, sunSign,
    sun, rahu, yama, gulika, abhijit, brahma, choghadia,
    specialYogas: yogas,
    moonSign: Math.floor(moonSid / 30),
    moonSid, sunSid
  };
}

// ---------- CALENDAR (TRAVEL DIRECTIONS + PANCHANG) ----------
// Moon's direction by Rashi (sign-based / Chandra Disha):
//   Fire signs (Ar, Le, Sg) → East
//   Earth signs (Ta, Vi, Cp) → South
//   Air signs   (Ge, Li, Aq) → West
//   Water signs (Cn, Sc, Pi) → North
const MOON_DIR_BY_SIGN = ["E","S","W","N","E","S","W","N","E","S","W","N"];

// Disha Shool (direction to avoid) by weekday (0=Sun ... 6=Sat)
//   Sun → West, Mon → East, Tue → North, Wed → North,
//   Thu → South, Fri → West, Sat → East
const DISHA_SHOOL_BY_WEEKDAY = ["W","E","N","N","S","W","E"];
const WEEKDAY_NAMES = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const WEEKDAY_SHORT = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

const DIR_NAME = {N:"North", E:"East", S:"South", W:"West"};
const DIR_ARROW = {N:"↑", E:"→", S:"↓", W:"←"};
// Clockwise next direction = "right of" facing that direction
const DIR_RIGHT = {N:"E", E:"S", S:"W", W:"N"};

// Get weekday from JD (0=Sun..6=Sat)
function jdWeekday(jd) {
  return Math.floor(jd + 1.5) % 7;
}

// Compute travel-direction info for a given local date
function travelDirectionsFor(year, month, day, tz) {
  // Use noon local time → noon UT-tz to roughly center the day
  const utHour = 12 - tz;
  const jd = julianDay(year, month, day, utHour);
  // Weekday (use noon local; +1.5 trick works on the JD)
  // Adjust JD slightly for local weekday boundary:
  const localJD = julianDay(year, month, day, 12); // noon local treated as if UT
  const weekday = jdWeekday(localJD);

  const ay = ayanamsa(jd);
  const moonSid = mod360(moonLongitude(jd) - ay);
  const moonSign = Math.floor(moonSid / 30);
  const moonDir = MOON_DIR_BY_SIGN[moonSign];
  const blocked = DISHA_SHOOL_BY_WEEKDAY[weekday];
  const nak = nakshatraOf(moonSid);

  const primary = moonDir;
  const secondary = DIR_RIGHT[moonDir];
  // Determine which of (primary, secondary) are blocked
  const primaryBlocked = primary === blocked;
  const secondaryBlocked = secondary === blocked;

  // Travel-friendly directions in priority order, removing Disha Shool
  const good = [];
  if (!primaryBlocked) good.push(primary);
  if (!secondaryBlocked && !good.includes(secondary)) good.push(secondary);
  return {
    jd, weekday, moonSid, moonSign, moonDir, blocked, nak,
    primary, secondary, primaryBlocked, secondaryBlocked, good
  };
}

let CAL_MODE = "day";       // day | week | month | year

function renderCalendar() {

  CAL_DATE = new Date(today.getFullYear(), today.getMonth(), today.getDate());
  const html = `
    <div class="cal-toolbar">
      <button class="nav-btn" onclick="calNav(-1)">◀</button>
      <input id="calDate" type="date" value="${ymd(CAL_DATE)}" onchange="calJump(this.value)"/>
      <button class="nav-btn" onclick="calNav(1)">▶</button>
      <button class="nav-btn" onclick="calToday()">Today</button>
      <div class="modes">
        <button data-mode="day" class="active" onclick="calMode('day')">Day</button>
        <button data-mode="week" class="inactive" onclick="calMode('week')">Week</button>
        <button data-mode="month" class="inactive" onclick="calMode('month')">Month</button>
        <button data-mode="year" class="inactive" onclick="calMode('year')">Year</button>
      </div>
    </div>
    <p class="small">Travel directions are derived from the Moon's sign at noon (<b>primary = Moon's direction</b>, <b>secondary = its clockwise right</b>) and filtered by <b>Disha Shool</b> (the direction to avoid on each weekday). Crossed = blocked direction for that day.</p>
    <div id="calBody"></div>
  `;
  document.getElementById("pane-panchang").innerHTML = html;
  drawCalBody();
}
const renderPanchangPane = renderCalendar;

function ymd(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function calNav(dir) {
  const d = new Date(CAL_DATE);
  if (CAL_MODE === "day") d.setDate(d.getDate() + dir);
  else if (CAL_MODE === "week") d.setDate(d.getDate() + dir*7);
  else if (CAL_MODE === "month") d.setMonth(d.getMonth() + dir);
  else if (CAL_MODE === "year") d.setFullYear(d.getFullYear() + dir);
  CAL_DATE = d;
  const di = document.getElementById("calDate"); if (di) di.value = ymd(d);
  drawCalBody();
}
function calJump(v) {
  if (!v) return;
  const [y,m,d] = v.split("-").map(Number);
  CAL_DATE = new Date(y, m-1, d);
  drawCalBody();
}
function calToday() {
  const t = new Date();
  CAL_DATE = new Date(t.getFullYear(), t.getMonth(), t.getDate());
  const di = document.getElementById("calDate"); if (di) di.value = ymd(CAL_DATE);
  drawCalBody();
}
function calMode(m) {
  CAL_MODE = m;
  document.querySelectorAll(".cal-toolbar .modes button").forEach(b => {
    if (b.dataset.mode === m) { b.classList.add("active"); b.classList.remove("inactive"); }
    else { b.classList.remove("active"); b.classList.add("inactive"); }
  });
  drawCalBody();
}

function drawCalBody() {
  const body = document.getElementById("calBody");
  if (!body) return;
  const tz = CURRENT ? CURRENT.input.tz : 5.5;
  if (CAL_MODE === "day") body.innerHTML = renderCalDay(CAL_DATE, tz);
  else if (CAL_MODE === "week") body.innerHTML = renderCalWeek(CAL_DATE, tz);
  else if (CAL_MODE === "month") body.innerHTML = renderCalMonth(CAL_DATE, tz);
  else if (CAL_MODE === "year") body.innerHTML = renderCalYear(CAL_DATE, tz);
}

function renderCalDay(date, tz) {
  const Y = date.getFullYear(), M = date.getMonth()+1, D = date.getDate();
  const info = travelDirectionsFor(Y, M, D, tz);
  const lat = CURRENT ? CURRENT.input.lat : 28.6139;
  const lon = CURRENT ? CURRENT.input.lon : 77.2090;
  const pan = computePanchang(Y, M, D, lat, lon, tz);
  const headline = `${t(WEEKDAY_NAMES[info.weekday])}, ${D} ${monthName(M)} ${Y}`;
  const fests = festivalsForPanchang(pan);
  const festHtml = fests.length ? `
    <div style="margin-top:14px;">

      </div>`).join("")}
    </div>` : "";
  // Today's reminders (if any) — mark "once"/"yearly"/"monthly" fires when viewing today
  const today = new Date();
  if (ymd(date) === ymd(new Date(today.getFullYear(), today.getMonth(), today.getDate()))) {
    markRemindersFiredFor(date);
  }
  const matchedReminders = remindersForDate(date);
  const remindersHtml = matchedReminders.length ? `
    <div class="festival" style="margin-top:14px;">
      <div class="emoji">🔔</div>
      <div class="text">
        <div class="label">Your reminders</div>

        ${matchedReminders.filter(r=>r.message).map(r=>`<div class="small" style="color:var(--text-2);margin-top:4px;">${escapeHtml(r.message)}</div>`).join("")}
      </div>
    </div>` : "";

  // ---- Direction block (existing) ----
  const dirOrder = ["N","E","S","W"];
  let dirsHtml = '<div class="dir-row">';
  for (const d of dirOrder) {
    let cls = "", label = "";
    if (d === info.blocked) { cls = "dir-blocked"; label = "Disha Shool"; }
    else if (d === info.primary && !info.primaryBlocked) { cls = "dir-primary"; label = "Primary (Moon)"; }
    else if (d === info.secondary && !info.secondaryBlocked) { cls = "dir-secondary"; label = "Secondary"; }
    else label = "—";
    dirsHtml += `<div class="one">
      <div class="dir-arrow ${cls}">${DIR_ARROW[d]}</div>
      <div class="dir-name ${cls}">${d}</div>
      <div class="label">${label}</div>
    </div>`;
  }
  dirsHtml += '</div>';
  const recList = info.good.length
    ? info.good.map(d => `<b style="color:var(--good)">${DIR_NAME[d]} (${d})</b>`).join(" &nbsp;•&nbsp; ")
    : `<span class="badge bad">Both Moon's direction and its right are blocked today — travel sparingly.</span>`;

  // ---- Special yogas block ----
  let yogasHtml = "";
  if (pan.specialYogas.length > 0) {
    yogasHtml = `<div style="margin-top:14px;">
      <h4 style="color:var(--accent);margin-bottom:6px;">Special Yogas Today</h4>` +
      pan.specialYogas.map(y => `<div class="info-cell" style="border-left-color:${y.type==='good'?'var(--good)':'var(--bad)'};margin-bottom:6px;">
        <div class="lbl">${y.type==='good'?'Auspicious':'Inauspicious'}</div>
        <div class="val">${y.name}</div>
        <div class="small">${y.note}</div>
      </div>`).join("") +
      `</div>`;
  }

  // ---- Panchang block ----
  const panchangHtml = `
    <h4 style="color:var(--accent);margin-top:14px;">${t('Panchang')}</h4>
    <div class="info-row">
      <div class="info-cell"><div class="lbl">${t('Tithi')}</div><div class="val">${t(pan.paksha)} ${t(pan.tithiName)}</div></div>
      <div class="info-cell"><div class="lbl">${t('Nakshatra')}</div><div class="val">${pan.nakshatra.name} (Pada ${pan.nakshatra.pada})</div></div>
      <div class="info-cell"><div class="lbl">${t('Yoga')}</div><div class="val">${pan.yogaName} ${pan.isYogaBad?`<span class="badge bad">${t('Inauspicious')}</span>`:''}</div></div>
      <div class="info-cell"><div class="lbl">${t('Karana')}</div><div class="val">${pan.karanaName}</div></div>
      <div class="info-cell"><div class="lbl">${t('Vaar')}</div><div class="val">${t(WEEKDAY_NAMES[pan.weekday])}</div></div>
      <div class="info-cell"><div class="lbl">${t('Hindu Month')} / ${t('Ritu')}</div><div class="val">${t(pan.hinduMonth)} / ${t(pan.ritu)}</div></div>
      <div class="info-cell"><div class="lbl">${t('Moon Sign')}</div><div class="val">${SIGNS[pan.moonSign]}</div></div>
      <div class="info-cell"><div class="lbl">${t('Sun Sign')}</div><div class="val">${SIGNS[pan.sunSign]}</div></div>
    </div>
  `;

  // ---- Sunrise/Sunset & Muhurtas ----
  const sun = pan.sun;
  const sunHtml = sun.sunrise === null ? "" : `
    <h4 style="color:var(--accent);margin-top:14px;">Sun Timings & Muhurtas <span class="small">(at lat ${lat.toFixed(2)}, lon ${lon.toFixed(2)})</span></h4>

      <div class="info-cell"><div class="lbl">Sunset</div><div class="val">${fmtTime(sun.sunset)}</div></div>
      <div class="info-cell"><div class="lbl">Day Length</div><div class="val">${sun.dayLengthHrs.toFixed(2)} hrs</div></div>
      <div class="info-cell" style="border-left-color:var(--good);"><div class="lbl">Abhijit Muhurta <span class="badge good">Auspicious</span></div><div class="val">${fmtTime(pan.abhijit.start)} – ${fmtTime(pan.abhijit.end)}</div></div>
      <div class="info-cell" style="border-left-color:var(--good);"><div class="lbl">Brahma Muhurta <span class="badge good">Auspicious</span></div><div class="val">${fmtTime(pan.brahma.start)} – ${fmtTime(pan.brahma.end)}</div></div>
      <div class="info-cell" style="border-left-color:var(--bad);"><div class="lbl">Rahu Kaal <span class="badge bad">Avoid</span></div><div class="val">${fmtTime(pan.rahu.start)} – ${fmtTime(pan.rahu.end)}</div></div>
      <div class="info-cell" style="border-left-color:var(--bad);"><div class="lbl">Yamaganda <span class="badge bad">Avoid</span></div><div class="val">${fmtTime(pan.yama.start)} – ${fmtTime(pan.yama.end)}</div></div>
      <div class="info-cell" style="border-left-color:var(--bad);"><div class="lbl">Gulika Kaal <span class="badge bad">Avoid</span></div><div class="val">${fmtTime(pan.gulika.start)} – ${fmtTime(pan.gulika.end)}</div></div>
    </div>
  `;

  // ---- Choghadia table ----
  const chogHtml = pan.choghadia ? `
    <h4 style="color:var(--accent);margin-top:14px;">Choghadia <span class="small">(good = green, bad = red, neutral = gold)</span></h4>
    <div class="twin-cols">
      <div>
        <table>
          <thead><tr><th colspan="3" style="text-align:center;">Day Choghadia (Sunrise → Sunset)</th></tr><tr><th>Slot</th><th>Time</th><th>Type</th></tr></thead>

        </table>
      </div>
      <div>
        <table>
          <thead><tr><th colspan="3" style="text-align:center;">Night Choghadia (Sunset → Sunrise)</th></tr><tr><th>Slot</th><th>Time</th><th>Type</th></tr></thead>
          <tbody>${pan.choghadia.night.map(c => `<tr style="border-left:3px solid var(--${c.type==='good'?'good':c.type==='bad'?'bad':'accent'});${isCurrentChoghadia(c, date)?'background:var(--accent-soft);':''}"><td><b>${c.name}</b>${isCurrentChoghadia(c, date)?' <span class="chip accent" style="padding:1px 6px;font-size:9px;">NOW</span>':''}</td><td>${fmtTime(c.start)} – ${fmtTime(c.end)}</td><td>${c.type}</td></tr>`).join("")}</tbody>
        </table>
      </div>
    </div>

  return `
    <div class="dir-card">
      <h3 style="color:var(--accent);text-align:center;">${headline}</h3>
      ${dirsHtml}

        Good to travel: ${recList}
      </div>
      <div style="text-align:center;margin-top:10px;">
        <span class="badge bad">Avoid direction: ${DIR_NAME[info.blocked]} (${info.blocked}) — ${WEEKDAY_NAMES[info.weekday]} Disha Shool</span>
      </div>
      ${remindersHtml}

      ${yogasHtml}
      ${panchangHtml}

      ${chogHtml}

}

function renderCalWeek(date, tz) {
  // Week starts on Sunday containing this date
  const start = new Date(date);
  start.setDate(start.getDate() - start.getDay());
  let html = '<div class="week-grid">';
  const today = new Date();
  const todayStr = ymd(new Date(today.getFullYear(), today.getMonth(), today.getDate()));
  const lat = CURRENT ? CURRENT.input.lat : 28.6139;
  const lon = CURRENT ? CURRENT.input.lon : 77.2090;
  for (let i = 0; i < 7; i++) {
    const d = new Date(start); d.setDate(start.getDate() + i);
    const info = travelDirectionsFor(d.getFullYear(), d.getMonth()+1, d.getDate(), tz);
    const pan = computePanchang(d.getFullYear(), d.getMonth()+1, d.getDate(), lat, lon, tz);
    const isToday = ymd(d) === todayStr;
    const goodDirs = info.good.map(x => `<span style="color:var(--good)">${DIR_ARROW[x]} ${x}</span>`).join("  ");
    const yogaLine = pan.specialYogas.length
      ? `<div class="small" style="color:var(--good);margin-top:4px;">★ ${pan.specialYogas.map(y=>y.name.replace(' Yoga','')).join(', ')}</div>` : "";
    html += `<div class="day-card ${isToday?'today':''}" onclick="calJumpAndDay('${ymd(d)}')">
      <div class="d-wd">${WEEKDAY_SHORT[d.getDay()]}</div>
      <div class="d-date">${d.getDate()} ${monthName(d.getMonth()+1)}</div>
      <div class="d-dirs">${goodDirs || '<span style="color:var(--bad)">—</span>'}</div>
      <div class="d-moon">☾ ${SIGNS_SH[info.moonSign]} • ${pan.paksha[0]}.${pan.tithiNum%15+1} ${pan.nakshatra.name.slice(0,4)}</div>
      <div class="d-block">✗ ${info.blocked} • ${fmtTime(pan.sun.sunrise)}↑ ${fmtTime(pan.sun.sunset)}↓</div>
      ${yogaLine}
    </div>`;
  }
  html += '</div>';
  return html;
}

function calJumpAndDay(s) {
  calJump(s);
  calMode('day');
}

function renderCalMonth(date, tz) {
  const y = date.getFullYear(), m = date.getMonth();
  const first = new Date(y, m, 1);
  const lastDay = new Date(y, m+1, 0).getDate();
  const startDow = first.getDay();
  const today = new Date();
  const todayStr = ymd(new Date(today.getFullYear(), today.getMonth(), today.getDate()));

  let html = `<h3 style="color:var(--accent);text-align:center;margin-bottom:10px;">${monthName(m+1)} ${y}</h3>`;
  html += '<div class="month-grid">';
  for (const wd of ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"]) html += `<div class="mh">${wd}</div>`;
  for (let i = 0; i < startDow; i++) html += '<div class="month-cell empty"></div>';
  const lat = CURRENT ? CURRENT.input.lat : 28.6139;
  const lon = CURRENT ? CURRENT.input.lon : 77.2090;
  for (let d = 1; d <= lastDay; d++) {
    const info = travelDirectionsFor(y, m+1, d, tz);
    const pan = computePanchang(y, m+1, d, lat, lon, tz);
    const dateObj = new Date(y, m, d);
    const isToday = ymd(dateObj) === todayStr;
    const dirs = info.good.map(x => DIR_ARROW[x]+x).join(" ");
    // Yoga badges: highlight Guru Pushya etc, Ekadashi, Purnima, Amavasya
    const yogaBadges = [];
    pan.specialYogas.forEach(sy => {
      const cls = sy.type === 'good' ? 'good' : 'bad';
      const short = sy.name === "Guru Pushya Yoga" ? "GP" : sy.name === "Ravi Pushya Yoga" ? "RP" : sy.name === "Sarvartha Siddhi Yoga" ? "SS" : sy.name === "Amrita Siddhi Yoga" ? "AS" : "!";
      yogaBadges.push(`<span class="badge ${cls}" title="${sy.name}" style="padding:0 4px;font-size:9px;">${short}</span>`);
    });
    if (pan.tithiName === "Ekadashi") yogaBadges.push('<span class="badge good" style="padding:0 4px;font-size:9px;" title="Ekadashi">EK</span>');
    if (pan.tithiName === "Purnima") yogaBadges.push('<span class="badge good" style="padding:0 4px;font-size:9px;" title="Purnima (Full Moon)">PM</span>');
    if (pan.tithiName === "Amavasya") yogaBadges.push('<span class="badge warn" style="padding:0 4px;font-size:9px;" title="Amavasya (New Moon)">AM</span>');
    // Festival indicator
    const fests = festivalsForPanchang(pan);
    let festLine = "";
    if (fests.length > 0) {
      const fName = LANG === 'hi' ? fests[0].hi : fests[0].en;
      festLine = `<div class="small" style="color:var(--good);font-size:9px;margin-top:2px;line-height:1.1;" title="${fests.map(f=>LANG==='hi'?f.hi:f.en).join(', ')}">🪔 ${fName.length>14?fName.slice(0,13)+'…':fName}</div>`;
    }
    html += `<div class="month-cell ${isToday?'today':''}" onclick="calJumpAndDay('${ymd(dateObj)}')">
      <div class="mc-date">${d} <span class="small" style="font-weight:normal;">${pan.paksha==='Shukla'?'S':'K'} ${pan.tithiNum%15+1}</span></div>
      <div class="mc-dirs">${dirs || '—'}</div>
      <div class="mc-block">✗${info.blocked} ${yogaBadges.join('')}</div>
      ${festLine}
    </div>`;
  }
  html += '</div>';
  html += `<p class="small" style="margin-top:10px;">Each cell: date • tithi (S=Shukla, K=Krishna) • good directions • Disha Shool. Badges: <b>GP</b>=Guru Pushya, <b>RP</b>=Ravi Pushya, <b>SS</b>=Sarvartha Siddhi, <b>AS</b>=Amrita Siddhi, <b>EK</b>=Ekadashi, <b>PM</b>=Purnima, <b>AM</b>=Amavasya. Click any day for full Panchang.</p>`;
  return html;
}

function renderCalYear(date, tz) {
  const y = date.getFullYear();
  const today = new Date();
  const todayStr = ymd(new Date(today.getFullYear(), today.getMonth(), today.getDate()));
  let html = `<h3 style="color:var(--accent);text-align:center;margin-bottom:10px;">${y}</h3>`;
  html += '<div class="year-grid">';
  for (let m = 0; m < 12; m++) {
    const lastDay = new Date(y, m+1, 0).getDate();
    const startDow = new Date(y, m, 1).getDay();
    html += `<div class="year-month"><h4>${monthName(m+1)}</h4><div class="yg">`;
    for (const wd of ["S","M","T","W","T","F","S"]) html += `<div class="yh">${wd}</div>`;
    for (let i = 0; i < startDow; i++) html += '<div class="yc empty"></div>';
    const lat = CURRENT ? CURRENT.input.lat : 28.6139;
    const lon = CURRENT ? CURRENT.input.lon : 77.2090;
    for (let d = 1; d <= lastDay; d++) {
      const info = travelDirectionsFor(y, m+1, d, tz);
      const pan = computePanchang(y, m+1, d, lat, lon, tz);
      const dateObj = new Date(y, m, d);
      const isToday = ymd(dateObj) === todayStr;
      const dirs = info.good.map(x => x).join("");
      // Highlight specials with a dot color
      let dotCls = "";
      if (pan.specialYogas.some(s => s.type === 'good')) dotCls = "style=\"background:rgba(106,176,76,0.15);\"";
      else if (pan.tithiName === 'Ekadashi' || pan.tithiName === 'Purnima') dotCls = "style=\"background:rgba(212,160,23,0.10);\"";
      else if (pan.tithiName === 'Amavasya') dotCls = "style=\"background:rgba(243,156,18,0.10);\"";
      html += `<div class="yc ${isToday?'today':''}" ${dotCls} onclick="calJumpAndDay('${ymd(dateObj)}')">
        <div class="dt">${d}</div>
        <div class="dr">${dirs || '·'}</div>
      </div>`;
    }
    html += '</div></div>';
  }
  html += '</div>';
  return html;
}

function t(key) {
  if (LANG === "hi" && I18N[key] && I18N[key].hi) return I18N[key].hi;
  return key;
}

function applyLanguage() {
  // Replace text in elements with data-lbl
  document.querySelectorAll("[data-lbl]").forEach(el => {
    const k = el.dataset.lbl;
    el.textContent = t(k);
  });
  document.getElementById("langBtn").textContent = LANG === "hi" ? "A" : "अ";
  // Re-render data-dependent panes
  if (SELF_DATA) {
    if (document.getElementById("pane-panchang").classList.contains("active")) renderPanchangPane();
    if (document.getElementById("pane-muhurat").classList.contains("active")) renderMuhuratPane();
    if (document.getElementById("pane-settings").classList.contains("active")) renderSettings();
  }
}

function toggleLang() {
  LANG = LANG === "en" ? "hi" : "en";
  localStorage.setItem("kundliLang", LANG);
  applyLanguage();
}

// ============================================================
function updateThemeIcon(theme) {
  const tb = document.getElementById("themeBtn"); if (!tb) return;
  tb.innerHTML = theme === "dark" ? '<svg><use href="#i-moon"/></svg>' : '<svg><use href="#i-sun"/></svg>';
}
function toggleTheme() {
  const cur = document.documentElement.getAttribute("data-theme") || "dark";
  const next = cur === "dark" ? "light" : "dark";
  document.documentElement.setAttribute("data-theme", next);
  localStorage.setItem("kundliTheme", next);
  updateThemeIcon(next);
}
(function initTheme() {
  const saved = localStorage.getItem("kundliTheme") ||
    (window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark");
  document.documentElement.setAttribute("data-theme", saved);
  updateThemeIcon(saved);
})();

function renderDietarySection(pan) {
  const wpTithi = (pan.tithiNum % 15) + 1;   // 1..15
  const tithiData = TITHI_AVOID[wpTithi - 1] || null;
  const vaarData  = VAAR_AVOID[pan.weekday];
  const maasData  = MAAS_GUIDANCE[pan.hinduMonth];
  const nakData   = NAKSHATRA_VRIKSHA[pan.nakshatra.idx];

  const variantHtml = (v) => v ? `<div class="small" style="color:var(--muted);margin-top:2px;font-style:italic;">${v}</div>` : "";
  const reasonHtml  = (r) => r ? `<div class="small" style="color:var(--muted);margin-top:2px;">→ ${r}</div>` : "";

  let inner = "";
  // Nakshatra Vriksha
  if (nakData) {
    inner += `<div class="info-cell" style="border-left-color:var(--good);margin-bottom:8px;">
      <div class="lbl">${t('Nakshatra Vriksha')} — ${pan.nakshatra.name}</div>
      <div class="val" style="font-size:14px;">🌳 ${nakData.tree}</div>
      ${variantHtml(nakData.variant)}
      <div class="small" style="margin-top:4px;">Tradition: plant and nurture this tree; avoid eating its produce or harming it. Strongest for your janma nakshatra.</div>
    </div>`;
  }
  // Tithi — use actual tithi name from panchang (so Shukla 15 shows "Purnima", Krishna 15 shows "Amavasya")
  if (tithiData) {
    inner += `<div class="info-cell" style="border-left-color:var(--bad);margin-bottom:8px;">
      <div class="lbl">${t('Tithi')} ${t(pan.tithiName)} — ${t('Avoid')}</div>
      <div class="val" style="font-size:14px;">🚫 ${tithiData.avoid}</div>
      ${variantHtml(tithiData.variant)}
      ${reasonHtml(tithiData.reason)}
    </div>`;
  }
  // Vaar
  if (vaarData) {
    inner += `<div class="info-cell" style="border-left-color:var(--bad);margin-bottom:8px;">
      <div class="lbl">${t(WEEKDAY_NAMES[pan.weekday])} (${vaarData.graha}) — ${t('Avoid')}</div>
      <div class="val" style="font-size:14px;">🚫 ${vaarData.avoid}</div>
    </div>`;
  }
  // Maas
  if (maasData) {
    inner += `<div class="info-cell" style="margin-bottom:8px;">
      <div class="lbl">${t(pan.hinduMonth)} (${maasData.approx})</div>
      <div class="val" style="font-size:14px;"><span style="color:var(--bad)">🚫 ${t('Avoid')}:</span> ${maasData.avoid}</div>
      <div class="val" style="font-size:14px;margin-top:4px;"><span style="color:var(--good)">✓ ${t('Prefer')}:</span> ${maasData.prefer}</div>
      ${variantHtml(maasData.variant)}
    </div>`;
  }

  const disclaimer = `<div class="small" style="margin-top:8px;color:var(--muted);font-style:italic;line-height:1.5;">
    These notes come from traditional Hindu texts (Brahmavaivarta Purana and traditional dohas) and from classical Vedic astrology. They are presented as cultural and scriptural guidance — the texts frame them partly in health terms, but this is not clinical nutrition or medical advice. Regional traditions differ on several entries.
  </div>`;

  return `<details open style="margin-top:14px;">
    <summary style="color:var(--accent);font-weight:600;cursor:pointer;">${t('Traditional Dietary Guidance')}</summary>
    <div style="margin-top:10px;">${inner}${disclaimer}</div>
  </details>`;
}

function festivalsForPanchang(pan) {
  // within-paksha 1-indexed tithi
  const wpTithi = (pan.tithiNum % 15) + 1;
  const fests = [];
  for (const f of FESTIVALS) {
    if (f.p !== pan.paksha) continue;
    if (f.t !== wpTithi) continue;
    if (f.m && f.m !== pan.hinduMonth) continue;
    fests.push(f);
  }
  // Makar Sankranti: Sun in Capricorn (sidereal sign 9) — special solar event
  if (pan.sunSign === 9) {
    // Mark only first day of solar Capricorn — approximation: tithi-independent. Skip for now or check date.
  }
  return fests;
}

// MUHURAT PANE — calendar with day/week/month/year toggle
// ============================================================
let MUHURAT_MODE = "day";   // day | week | month | year

function renderMuhuratPane() {
  if (!SELF_DATA) return;
  const date = CAL_DATE || new Date();
  // Toolbar (same as Panchang)
  let toolbarHtml = `
    <div class="cal-toolbar">
      <button class="nav-btn" onclick="muhuratNav(-1)">◀</button>
      <input id="muhuratDate" type="date" value="${ymd(date)}" onchange="muhuratJump(this.value)"/>
      <button class="nav-btn" onclick="muhuratNav(1)">▶</button>
      <button class="nav-btn" onclick="muhuratToday()">${t('Today')}</button>
      <div class="modes">
        <button data-mhm="day"   class="${MUHURAT_MODE==='day'?'active':'inactive'}"   onclick="muhuratMode('day')">${t('Day')}</button>
        <button data-mhm="week"  class="${MUHURAT_MODE==='week'?'active':'inactive'}"  onclick="muhuratMode('week')">${t('Week')}</button>
        <button data-mhm="month" class="${MUHURAT_MODE==='month'?'active':'inactive'}" onclick="muhuratMode('month')">${t('Month')}</button>
        <button data-mhm="year"  class="${MUHURAT_MODE==='year'?'active':'inactive'}"  onclick="muhuratMode('year')">${t('Year')}</button>
      </div>
    </div>
  `;
  let body = "";
  if      (MUHURAT_MODE === "day")   body = renderMuhuratDay(date);
  else if (MUHURAT_MODE === "week")  body = renderMuhuratWeek(date);
  else if (MUHURAT_MODE === "month") body = renderMuhuratMonth(date);
  else if (MUHURAT_MODE === "year")  body = renderMuhuratYear(date);
  document.getElementById("pane-muhurat").innerHTML = toolbarHtml + body;
  // Ensure the live Hindu Clock ticker is running iff the clock card is on-screen
  if (document.getElementById("hinduClockCard")) startHinduClock();
  else stopHinduClock();
}

function muhuratMode(m) { MUHURAT_MODE = m; renderMuhuratPane(); }
function muhuratNav(dir) {
  const d = new Date(CAL_DATE);
  if (MUHURAT_MODE === "day") d.setDate(d.getDate()+dir);
  else if (MUHURAT_MODE === "week") d.setDate(d.getDate()+dir*7);
  else if (MUHURAT_MODE === "month") d.setMonth(d.getMonth()+dir);
  else if (MUHURAT_MODE === "year") d.setFullYear(d.getFullYear()+dir);
  CAL_DATE = d;
  renderMuhuratPane();
}
function muhuratJump(v) { if (!v) return; const [y,m,d]=v.split("-").map(Number); CAL_DATE = new Date(y,m-1,d); renderMuhuratPane(); }
function muhuratToday() { const t = new Date(); CAL_DATE = new Date(t.getFullYear(), t.getMonth(), t.getDate()); renderMuhuratPane(); }
function muhuratJumpAndDay(s) { muhuratJump(s); muhuratMode('day'); }

function renderMuhuratDay(date) {

        <div class="info-cell"><div class="lbl">${t('Sunset')}</div><div class="val">${fmtTime(sun.sunset)}</div></div>
        <div class="info-cell"><div class="lbl">${t('Day Length')}</div><div class="val">${sun.dayLengthHrs.toFixed(2)} h</div></div>
        <div class="info-cell" style="border-left-color:var(--good);"><div class="lbl">${t('Abhijit Muhurta')} <span class="badge good">${t('Auspicious')}</span></div><div class="val">${fmtTime(pan.abhijit.start)} – ${fmtTime(pan.abhijit.end)}</div></div>
        <div class="info-cell" style="border-left-color:var(--good);"><div class="lbl">${t('Brahma Muhurta')} <span class="badge good">${t('Auspicious')}</span></div><div class="val">${fmtTime(pan.brahma.start)} – ${fmtTime(pan.brahma.end)}</div></div>
        <div class="info-cell" style="border-left-color:var(--bad);"><div class="lbl">${t('Rahu Kaal')} <span class="badge bad">${t('Avoid')}</span></div><div class="val">${fmtTime(pan.rahu.start)} – ${fmtTime(pan.rahu.end)}</div></div>
        <div class="info-cell" style="border-left-color:var(--bad);"><div class="lbl">${t('Yamaganda')} <span class="badge bad">${t('Avoid')}</span></div><div class="val">${fmtTime(pan.yama.start)} – ${fmtTime(pan.yama.end)}</div></div>

            <tbody>${pan.choghadia.day.map(c => `<tr style="border-left:3px solid var(--${c.type==='good'?'good':c.type==='bad'?'bad':'accent'});${isCurrentChoghadia(c, date)?'background:var(--accent-soft);':''}"><td><b>${c.name}</b>${isCurrentChoghadia(c, date)?' <span class="chip accent" style="padding:1px 6px;font-size:9px;">NOW</span>':''}</td><td>${fmtTime(c.start)} – ${fmtTime(c.end)}</td><td>${c.type}</td></tr>`).join("")}</tbody>

// ---- Muhurat WEEK view ----
function renderMuhuratWeek(date) {
  const start = new Date(date); start.setDate(start.getDate() - start.getDay());
  const tz = CURRENT ? CURRENT.input.tz : 5.5;
  const lat = CURRENT ? CURRENT.input.lat : 28.6139;
  const lon = CURRENT ? CURRENT.input.lon : 77.2090;
  const today = new Date();
  const todayStr = ymd(new Date(today.getFullYear(), today.getMonth(), today.getDate()));
  let html = '<div class="week-grid">';
  for (let i = 0; i < 7; i++) {
    const d = new Date(start); d.setDate(start.getDate() + i);
    const pan = computePanchang(d.getFullYear(), d.getMonth()+1, d.getDate(), lat, lon, tz);
    const isToday = ymd(d) === todayStr;
    const yogaLine = pan.specialYogas.length
      ? `<div class="small" style="color:var(--good);margin-top:4px;">★ ${pan.specialYogas.map(y=>y.name.replace(' Yoga','')).join(', ')}</div>` : "";
    html += `<div class="day-card ${isToday?'today':''}" onclick="muhuratJumpAndDay('${ymd(d)}')">
      <div class="d-wd">${t(WEEKDAY_SHORT[d.getDay()])}</div>
      <div class="d-date">${d.getDate()} ${monthName(d.getMonth()+1)}</div>
      <div class="d-moon" style="margin-top:6px;">☀ ${fmtTime(pan.sun.sunrise)} – ${fmtTime(pan.sun.sunset)}</div>
      <div class="small" style="margin-top:4px;color:var(--good);">${t('Abhijit Muhurta')}: ${fmtTime(pan.abhijit.start)}–${fmtTime(pan.abhijit.end)}</div>
      <div class="small" style="color:var(--bad);">${t('Rahu Kaal')}: ${fmtTime(pan.rahu.start)}–${fmtTime(pan.rahu.end)}</div>
      ${yogaLine}
    </div>`;
  }
  html += '</div>';
  return html;
}

// ---- Muhurat MONTH view ----
function renderMuhuratMonth(date) {
  const y = date.getFullYear(), m = date.getMonth();
  const first = new Date(y, m, 1);
  const lastDay = new Date(y, m+1, 0).getDate();
  const startDow = first.getDay();
  const tz = CURRENT ? CURRENT.input.tz : 5.5;
  const lat = CURRENT ? CURRENT.input.lat : 28.6139;
  const lon = CURRENT ? CURRENT.input.lon : 77.2090;
  const today = new Date();
  const todayStr = ymd(new Date(today.getFullYear(), today.getMonth(), today.getDate()));
  let html = `<h3 style="color:var(--accent);text-align:center;margin-bottom:10px;">${monthName(m+1)} ${y}</h3>`;
  html += '<div class="month-grid">';
  for (const wd of ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"]) html += `<div class="mh">${t(wd)}</div>`;
  for (let i = 0; i < startDow; i++) html += '<div class="month-cell empty"></div>';
  for (let d = 1; d <= lastDay; d++) {
    const pan = computePanchang(y, m+1, d, lat, lon, tz);
    const dateObj = new Date(y, m, d);
    const isToday = ymd(dateObj) === todayStr;
    // Auspiciousness signal
    let bgTint = "";
    const goodYogas = pan.specialYogas.filter(s => s.type === 'good').length;
    const badYogas  = pan.specialYogas.filter(s => s.type === 'bad').length;
    if (goodYogas > 0) bgTint = "background:rgba(106,176,76,0.12);";
    else if (badYogas > 0) bgTint = "background:rgba(231,76,60,0.10);";
    const yogaShort = pan.specialYogas.map(s => {
      const sh = s.name === "Guru Pushya Yoga" ? "GP" : s.name === "Ravi Pushya Yoga" ? "RP" : s.name === "Sarvartha Siddhi Yoga" ? "SS" : s.name === "Amrita Siddhi Yoga" ? "AS" : "!";
      const cls = s.type === 'good' ? 'good' : 'bad';
      return `<span class="badge ${cls}" style="padding:0 4px;font-size:9px;" title="${s.name}">${sh}</span>`;
    }).join('');
    html += `<div class="month-cell ${isToday?'today':''}" style="${bgTint}" onclick="muhuratJumpAndDay('${ymd(dateObj)}')">
      <div class="mc-date">${d}</div>
      <div class="small" style="font-size:10px;color:var(--good);">☀ ${fmtTime(pan.sun.sunrise)}</div>
      <div class="small" style="font-size:10px;color:var(--bad);">R ${fmtTime(pan.rahu.start)}</div>
      <div style="text-align:center;margin-top:2px;">${yogaShort}</div>
    </div>`;
  }
  html += '</div>';
  html += `<p class="small" style="margin-top:10px;">Each cell: date • sunrise time • Rahu Kaal start • yoga badges (<b>GP</b>=Guru Pushya, <b>RP</b>=Ravi Pushya, <b>SS</b>=Sarvartha Siddhi, <b>AS</b>=Amrita Siddhi). Green-tinted days have auspicious yogas; red-tinted have inauspicious ones.</p>`;
  return html;
}

// ---- Muhurat YEAR view ----
function renderMuhuratYear(date) {
  const y = date.getFullYear();
  const tz = CURRENT ? CURRENT.input.tz : 5.5;
  const lat = CURRENT ? CURRENT.input.lat : 28.6139;
  const lon = CURRENT ? CURRENT.input.lon : 77.2090;
  const today = new Date();
  const todayStr = ymd(new Date(today.getFullYear(), today.getMonth(), today.getDate()));
  let html = `<h3 style="color:var(--accent);text-align:center;margin-bottom:10px;">${y}</h3>`;
  html += '<div class="year-grid">';
  for (let m = 0; m < 12; m++) {
    const lastDay = new Date(y, m+1, 0).getDate();
    const startDow = new Date(y, m, 1).getDay();
    html += `<div class="year-month"><h4>${monthName(m+1)}</h4><div class="yg">`;
    for (const wd of ["S","M","T","W","T","F","S"]) html += `<div class="yh">${wd}</div>`;
    for (let i = 0; i < startDow; i++) html += '<div class="yc empty"></div>';
    for (let d = 1; d <= lastDay; d++) {
      const pan = computePanchang(y, m+1, d, lat, lon, tz);
      const dateObj = new Date(y, m, d);
      const isToday = ymd(dateObj) === todayStr;
      let bgTint = "";
      const goodYogas = pan.specialYogas.filter(s => s.type === 'good').length;
      const badYogas  = pan.specialYogas.filter(s => s.type === 'bad').length;
      if (goodYogas > 0) bgTint = "background:rgba(106,176,76,0.18);";
      else if (badYogas > 0) bgTint = "background:rgba(231,76,60,0.12);";
      const marker = goodYogas > 0 ? "★" : badYogas > 0 ? "✗" : "·";
      const markCls = goodYogas > 0 ? "var(--good)" : badYogas > 0 ? "var(--bad)" : "var(--muted)";
      html += `<div class="yc ${isToday?'today':''}" style="${bgTint}" onclick="muhuratJumpAndDay('${ymd(dateObj)}')">
        <div class="dt">${d}</div>
        <div style="font-size:9px;color:${markCls};">${marker}</div>
      </div>`;
    }
    html += '</div></div>';
  }
  html += '</div>';
  html += `<p class="small" style="margin-top:10px;">★ = day has an auspicious yoga (Guru Pushya, Ravi Pushya, Sarvartha Siddhi, or Amrita Siddhi). ✗ = day has an inauspicious yoga (Vyatipata, Vaidhriti, etc.). Click any day for full muhurat detail.</p>`;
  return html;
}

//   kundliSelf     → last-used Self birth input
//   kundliPartner  → last-used Partner birth input
//   kundliProfiles → array of named profiles: { name, input, savedAt }
function loadJSON(k) { try { return JSON.parse(localStorage.getItem(k) || "null"); } catch { return null; } }
function saveJSON(k, v) { localStorage.setItem(k, JSON.stringify(v)); }
function saveSelfInput(inp)    { saveJSON("kundliSelf", inp); }
function saveSelfInputFromForm(){ const inp = getInput("1"); if (inp) saveSelfInput(inp); }
function loadSelfInput()       { return loadJSON("kundliSelf"); }
function savePartnerInput(inp) { saveJSON("kundliPartner", inp); }
function loadPartnerInput()    { return loadJSON("kundliPartner"); }
function loadProfiles()        { return loadJSON("kundliProfiles") || []; }
function saveProfiles(arr)     { saveJSON("kundliProfiles", arr); }

function populateSelfForm(inp) {
  if (!inp) return;
  document.getElementById("name1").value = inp.name || "Native";
  document.getElementById("dob1").value  = `${inp.year}-${String(inp.month).padStart(2,'0')}-${String(inp.day).padStart(2,'0')}`;
  const h = Math.floor(inp.hour);
  const m = Math.floor((inp.hour - h) * 60);
  const s = Math.floor((((inp.hour - h) * 60) - m) * 60);
  document.getElementById("tob1").value = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  document.getElementById("lat1").value = inp.lat;
  document.getElementById("lon1").value = inp.lon;
  document.getElementById("tz1").value  = inp.tz;
}

function saveCurrentAsProfile() {
  if (!SELF_DATA) { alert("Generate a kundli first, then save it as a profile."); return; }
  const nameEl = document.getElementById("profileName");
  const name = (nameEl ? nameEl.value.trim() : "") || SELF_DATA.input.name || `Profile ${loadProfiles().length + 1}`;
  const arr = loadProfiles();
  arr.push({ name, input: SELF_DATA.input, savedAt: Date.now() });
  saveProfiles(arr);
  if (nameEl) nameEl.value = "";
  renderSettings();
}

function loadProfileToForm(idx) {
  const arr = loadProfiles();
  const p = arr[idx]; if (!p) return;
  populateSelfForm(p.input);
  generateChart();
  navTo("kundli");
}

function deleteProfileAndRefresh(idx) {
  const arr = loadProfiles();
  appConfirm(`Delete profile "${arr[idx].name}"?`, () => {
    arr.splice(idx, 1);
    saveProfiles(arr);
    renderSettings();
  }, { yesText: "Delete", dangerous: true });
}

// Read partner-form values without computing (for save before match)
function readPartnerFormInput() {
  const dob = document.getElementById("dobG"); if (!dob || !dob.value) return null;
  const tob = document.getElementById("tobG"); if (!tob || !tob.value) return null;
  const [y,m,d] = dob.value.split("-").map(Number);
  const [hh,mm,ss] = tob.value.split(":").map(Number);
  const tz = parseFloat(document.getElementById("tzG").value);
  const lat = parseFloat(document.getElementById("latG").value);
  const lon = parseFloat(document.getElementById("lonG").value);
  const localHour = hh + (mm||0)/60 + ((ss||0))/3600;
  return {
    name: (document.getElementById("nameG").value || "Partner"),
    year: y, month: m, day: d, hour: localHour, tz, lat, lon,
    jd: julianDay(y, m, d, localHour - tz)
  };
}

function populatePartnerForm(inp) {
  if (!inp) return;
  document.getElementById("nameG").value = inp.name || "Partner";
  document.getElementById("dobG").value  = `${inp.year}-${String(inp.month).padStart(2,'0')}-${String(inp.day).padStart(2,'0')}`;
  const h = Math.floor(inp.hour);
  const m = Math.floor((inp.hour - h) * 60);
  const s = Math.floor((((inp.hour - h) * 60) - m) * 60);
  document.getElementById("tobG").value = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  document.getElementById("latG").value = inp.lat;
  document.getElementById("lonG").value = inp.lon;
  document.getElementById("tzG").value  = inp.tz;
}

// Opens from 📁 Saved or 💾 Save buttons on Kundli (target='self') / Milan (target='partner').

let SAVED_TARGET = "self";
let FOCUS_SAVE = false;  // true when opened via 💾 Save (focus the name input)

// Pulls the current name from the active form, falling back to in-memory data.
function currentNameFor(target) {
  if (target === "self") {
    const el = document.getElementById("name1");
    if (el && el.value && el.value.trim()) return el.value.trim();
    if (SELF_DATA) return SELF_DATA.input.name;
    return "";
  } else {
    const el = document.getElementById("nameG");
    if (el && el.value && el.value.trim()) return el.value.trim();
    if (PARTNER_DATA) return PARTNER_DATA.input.name;
    return "";
  }
}

function openSavedModal(target, focusSave) {
  SAVED_TARGET = target;
  FOCUS_SAVE = !!focusSave;
  renderSavedModal();
  document.getElementById("savedKundliModal").style.display = "block";
  // After render, focus the name input if opened via Save
  if (FOCUS_SAVE) {
    setTimeout(() => {
      const i = document.getElementById("modalSaveName");
      if (i) { i.focus(); i.select(); }
    }, 50);
  }
}
function closeSavedModal() {
  document.getElementById("savedKundliModal").style.display = "none";
}

// the active tab. Whatever tab the user is on stays active — Self loads regenerate

// kundli to another is now immediate.
function loadSavedToTarget(idx) {
  const arr = loadProfiles();
  const p = arr[idx]; if (!p) return;
  closeSavedModal();
  if (SAVED_TARGET === "self") {
    populateSelfForm(p.input);
    generateChart();   // re-renders all panes; active tab is preserved
  } else {
    populatePartnerForm(p.input);

    if (SELF_DATA) runMatch();

}

// ============================================================
// HINDU CLOCK — live ghati / pal / vipal + 8-pahar system.
// 60 ghati per day, 1 ghati = 24 min, 1 ghati = 60 pal (1 pal = 24 sec),
// 1 pal = 60 vipal (1 vipal = 0.4 sec). Pahars: NOT fixed 3-hour blocks —
// each is one-quarter of the ACTUAL day or night length (sunrise→sunset / sunset→next-sunrise).
// 1 pahar = 7.5 ghatis. Day and night pahars differ in length (only ~equal at the equinox).
// ============================================================

// Standard 8-pahar dataset (index 1..8). Sanskrit + colloquial + descriptive note.
const PAHAR_DATA = [
  { num:1, period:"day",   sanskrit:"Purvahna",  colloquial:"Pehla pahar",          note:"Begins at sunrise; early morning." },
  { num:2, period:"day",   sanskrit:"Madhyahna", colloquial:"Do-pahar",             note:"Around midday; the everyday word 'dopahar' (afternoon) derives from this." },
  { num:3, period:"day",   sanskrit:"Aparahna",  colloquial:"Seh pahar",            note:"Afternoon; 'seh pahar' loosely came to mean evening in common speech." },
  { num:4, period:"day",   sanskrit:"Sayahna",   colloquial:"Chautha pahar",        note:"Late afternoon; ends at sunset." },
  { num:5, period:"night", sanskrit:"Pradosh",   colloquial:"Pehla pahar (raat)",   note:"Begins at sunset; early night." },
  { num:6, period:"night", sanskrit:"Nishith",   colloquial:"Do-pahar (raat)",      note:"Late night, around midnight." },
  { num:7, period:"night", sanskrit:"Triyama",   colloquial:"Seh pahar (raat)",     note:"Deep night / pre-dawn." },
  { num:8, period:"night", sanskrit:"Usha",      colloquial:"Chautha pahar (raat)", note:"Dawn pahar; ends at sunrise. Brahma muhurta falls within this pahar." }
];

// Returns ghati/pal/vipal-since-sunrise + isDay only. Pahar is now in computePahar().
function hinduClockState(nowH, sunrise, sunset) {
  if (sunrise === null || sunset === null || isNaN(sunrise) || isNaN(sunset))
    return { ghati:0, pal:0, vipal:0, isDay:true };
  const isDay = (nowH >= sunrise && nowH < sunset);
  let elapsed; // hours since sunrise (always positive)
  if (nowH >= sunrise) elapsed = nowH - sunrise;
  else elapsed = (24 - sunrise) + nowH;
  const totalSec = elapsed * 3600;
  const ghati = Math.floor(totalSec / 1440);
  const pal   = Math.floor((totalSec - ghati * 1440) / 24);
  const vipal = Math.floor((totalSec - ghati * 1440 - pal * 24) / 0.4);
  return { ghati, pal, vipal, isDay };
}

// Compute the current pahar — one-quarter of the actual day/night interval.
// Critical: pahars are NOT fixed 3-hour blocks. Day = sunrise→sunset / 4; Night = sunset→next sunrise / 4.
// Handles the post-midnight-before-sunrise case correctly by using *yesterday's* sunset.
// Returns { available, num(1-8), period, sanskrit, colloquial, note, startHour, endHour, progress, paharLengthMin }.
// On polar / no-sunrise-or-sunset edge cases returns { available:false } and the UI shows a fallback message.
function computePahar(now, lat, lon, tz) {
  const y = now.getFullYear(), m = now.getMonth()+1, d = now.getDate();
  const sunToday = sunRiseSet(y, m, d, lat, lon, tz);
  const nowH = now.getHours() + now.getMinutes()/60 + now.getSeconds()/3600;

  if (sunToday.sunrise === null || isNaN(sunToday.sunrise) ||
      sunToday.sunset  === null || isNaN(sunToday.sunset)) {
    return { available:false, reason:"No sunrise or sunset at this location/date (polar)." };
  }

  // ---- DAY PAHAR ----
  if (nowH >= sunToday.sunrise && nowH < sunToday.sunset) {
    const dayLen = sunToday.sunset - sunToday.sunrise;
    const inDay = nowH - sunToday.sunrise;
    const plen = dayLen / 4;
    const idx = Math.min(3, Math.floor(inDay / plen));   // 0..3 → pahars 1..4
    const data = PAHAR_DATA[idx];
    return {
      available: true,
      num: data.num, period: "day",
      sanskrit: data.sanskrit, colloquial: data.colloquial, note: data.note,
      startHour: sunToday.sunrise + idx * plen,
      endHour:   sunToday.sunrise + (idx + 1) * plen,
      progress:  (inDay - idx * plen) / plen,
      paharLengthMin: plen * 60
    };
  }

  // ---- NIGHT PAHAR ----
  // Two sub-cases: after today's sunset (night spans into tomorrow), OR
  // before today's sunrise (night STARTED yesterday at yesterday's sunset).
  let nightStartH, nightLen, inNight;
  if (nowH >= sunToday.sunset) {
    // Need tomorrow's sunrise to bound the night
    const tmrw = new Date(now.getTime() + 86400000);
    const sunTmrw = sunRiseSet(tmrw.getFullYear(), tmrw.getMonth()+1, tmrw.getDate(), lat, lon, tz);
    if (sunTmrw.sunrise === null || isNaN(sunTmrw.sunrise))
      return { available:false, reason:"Tomorrow's sunrise unavailable (polar transition)." };
    nightStartH = sunToday.sunset;
    nightLen = (24 - sunToday.sunset) + sunTmrw.sunrise;
    inNight = nowH - sunToday.sunset;
  } else {
    // Post-midnight, pre-today-sunrise — use yesterday's sunset
    const yest = new Date(now.getTime() - 86400000);
    const sunYest = sunRiseSet(yest.getFullYear(), yest.getMonth()+1, yest.getDate(), lat, lon, tz);
    if (sunYest.sunset === null || isNaN(sunYest.sunset))
      return { available:false, reason:"Yesterday's sunset unavailable (polar transition)." };
    nightStartH = sunYest.sunset;             // hour-of-day on yesterday, but we treat the timeline linearly
    nightLen = (24 - sunYest.sunset) + sunToday.sunrise;
    inNight = (24 - sunYest.sunset) + nowH;
  }
  const plen = nightLen / 4;
  const idx = Math.min(3, Math.floor(inNight / plen));   // 0..3 → pahars 5..8
  const data = PAHAR_DATA[4 + idx];
  // For display: start/end on the 0..24 wall clock (may wrap past midnight).
  let startHour = nightStartH + idx * plen;
  let endHour   = nightStartH + (idx + 1) * plen;
  while (startHour >= 24) startHour -= 24;
  while (endHour   >= 24) endHour   -= 24;
  return {
    available: true,
    num: data.num, period: "night",
    sanskrit: data.sanskrit, colloquial: data.colloquial, note: data.note,
    startHour, endHour,
    progress: (inNight - idx * plen) / plen,
    paharLengthMin: plen * 60
  };
}

function renderHinduClock() {
  const now = new Date();
  const lat = CURRENT ? CURRENT.input.lat : 28.6139;
  const lon = CURRENT ? CURRENT.input.lon : 77.2090;
  const tz  = CURRENT ? CURRENT.input.tz  : 5.5;
  const sun = sunRiseSet(now.getFullYear(), now.getMonth()+1, now.getDate(), lat, lon, tz);
  const nowH = now.getHours() + now.getMinutes()/60 + now.getSeconds()/3600;
  const s = hinduClockState(nowH, sun.sunrise, sun.sunset);
  const p = computePahar(now, lat, lon, tz);
  const ts = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
  // Pahar block — the only part of this card that changed.
  // Shows: number 1-8 of 8, Sanskrit + colloquial name, period (day/night), actual start/end times, progress.
  let paharHtml;
  if (!p.available) {
    paharHtml = `
      <div class="clock-row">
        <div><div class="lbl">Current Pahar</div>
          <div class="val">Unavailable</div>
          <div class="sub" style="font-size:11px;color:var(--text-3);">${p.reason || 'No sunrise/sunset at this location/date.'}</div>
        </div>
        <div class="right">${ts}</div>
      </div>
      <div class="clock-progress"><div style="width:0%;"></div></div>
    `;
  } else {
    const paharMin = Math.round(p.paharLengthMin);
    paharHtml = `
      <div class="clock-row">
        <div style="flex:1;min-width:0;">
          <div class="lbl">Current Pahar · ${p.num} / 8 · ${p.period === 'day' ? 'Day' : 'Night'}</div>
          <div class="val">${p.sanskrit}
            <span class="chip" style="font-size:10px;padding:2px 7px;margin-left:6px;vertical-align:middle;">${p.colloquial}</span>
          </div>
          <div class="sub" style="color:var(--text-2);font-family:'JetBrains Mono',monospace;font-size:11px;margin-top:3px;">
            ${fmtTime(p.startHour)} – ${fmtTime(p.endHour)} · ${paharMin} min long
          </div>
        </div>
        <div class="right">${ts}</div>
      </div>
      <div class="clock-progress"><div style="width:${Math.floor(p.progress*100)}%;"></div></div>
    `;
  }
  return `
    <div id="hinduClockCard" class="clock-card">
      <div class="section-h" style="padding:0;color:var(--accent);">Hindu Clock <span class="sub" style="color:var(--text-3);">since today's sunrise · ${s.isDay ? 'Day' : 'Night'}</span></div>
      <div class="clock-grid">
        <div class="unit ghati"><div class="val">${String(s.ghati).padStart(2,'0')}</div><div class="lbl">Ghati</div><div class="sub">24 min each</div></div>
        <div class="unit"><div class="val">${String(s.pal).padStart(2,'0')}</div><div class="lbl">Pal</div><div class="sub">24 sec each</div></div>
        <div class="unit"><div class="val">${String(s.vipal).padStart(2,'0')}</div><div class="lbl">Vipal</div><div class="sub">0.4 sec each</div></div>
      </div>
      ${paharHtml}
    </div>
  `;
}

let HINDU_CLOCK_TIMER = null;

    const el = document.getElementById("hinduClockCard");

    el.outerHTML = renderHinduClock();
  };
